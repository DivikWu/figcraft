name: Release Gate

on:
  workflow_dispatch:

jobs:
  release-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (Biome)
        run: npm run lint

      - name: Check schema-generated files
        run: npm run check:schema-generated

      - name: Typecheck
        run: npm run typecheck

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build workspace shell and published package
        run: npm run build

      - name: Upload release-gate artifacts
        uses: actions/upload-artifact@v7
        with:
          name: figcraft-release-gate-artifacts
          path: |
            packages/figcraft-design/dist/
            dist/mcp-server/
            dist/relay/
            dist/plugin/
