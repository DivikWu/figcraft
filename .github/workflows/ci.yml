name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check schema-generated files
        run: npm run check:schema-generated

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Benchmark gate
        run: npm run ci:bench

      - name: Build workspace shell and published package
        run: npm run build
