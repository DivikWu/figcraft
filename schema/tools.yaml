        effect: 1

# ═══════════════════════════════════════════════════════════════
# TOOLSET: components-advanced (13 tools)
# ═══════════════════════════════════════════════════════════════

create_component:
  description: >-
    Create a component with layout, fill, stroke, inline children, and component properties in one call.
    Delegates to create_frame internally — all Opinion Engine inferences apply automatically.
    TEXT properties auto-bind to child text nodes via componentPropertyName.
    Accepts all create_frame params via passthrough — only common params listed here.

    Omit x/y to auto-position below existing content. For fixed-height components (buttons),
    pass height + layoutSizingVertical:"FIXED" to prevent Opinion Engine HUG override.
    When role is set (e.g. "button"), Harness auto-injects fillVariableName/fontColorVariableName
    from designContext.defaults — no need to pass them explicitly.

    Workflow: create_component → nodes(method:"clone") → create_component_set (auto-layouts + auto-positions).
  toolset: core
  write: true
  access: create
  handler: bridge
  params:
    name:
      type: string
      description: 'Component name (default: "Component")'
    description:
      type: string
      description: Component description
    role:
      type: string
      description: "Semantic role (e.g. 'button', 'input', 'card'). Stored as plugin data for lint identification."
    width:
      type: number
      description: "Width in px (omit for HUG)"
    height:
      type: number
      description: "Height in px (omit for HUG)"
    # ── Fill ──
    fill:
      type: string
      description: "Fill color hex or variable/style name — auto-binds to matching token"
    fillVariableId:
      type: string
      description: "Bind fill to a variable by ID (e.g. defaults.buttonEmphasis.id). Direct binding — zero name resolution."
    fillVariableName:
      type: string
      description: "Bind fill to a color variable by name (e.g. 'button/primary'). Prefer fillVariableId when ID is available."
    strokeColor:
      type: string
      description: "Stroke color hex — auto-binds to matching variable/style"
    strokeVariableName:
      type: string
      description: "Bind stroke to a color variable by name"
    # ── Layout ──
    layoutMode:
      type: enum
      values: [HORIZONTAL, VERTICAL]
      description: "Auto-layout direction (auto-inferred from padding/spacing/children)"
    itemSpacing:
      type: number
      description: "Spacing between children"
    padding:
      type: number
      description: "Shorthand — sets all 4 padding edges"
    primaryAxisAlignItems:
      type: enum
      values: [MIN, CENTER, MAX, SPACE_BETWEEN]
    counterAxisAlignItems:
      type: enum
      values: [MIN, CENTER, MAX]
    cornerRadius:
      type: number
    # ── Parent ──
    parentId:
      type: string
      description: "Parent node ID"
    # ── Inline children ──
    children:
      type: array
      items:
        type: object
        additionalProperties: true
        fields:
          type:
            type: enum
            values: [frame, text, rectangle, ellipse, instance, svg, icon]
            description: "Child node type"
      description: >-
        Inline child nodes [{type, ...params, componentPropertyName?}].
        Text children with componentPropertyName auto-create TEXT component properties.
        Text children also accept textStyleName, fontColorVariableId (preferred), fontColorVariableName.
        Icon children accept colorVariableName for icon color binding.
    # ── Component properties ──
    properties:
      type: array
      description: >-
        Non-text component properties: [{propertyName, type:'BOOLEAN'|'INSTANCE_SWAP'|'SLOT', defaultValue}].
        TEXT properties are created automatically from children with componentPropertyName.
    # ── Batch mode ──
    items:
      type: array
      description: >-
        Batch mode: array of create_component param objects. When provided, creates multiple components in one call.
        Each item accepts the same params as create_component (name, fill, fillVariableName, children, etc.).
        Per-item errors do not block others. Max 20 components per batch.
        Returns {created, total, items: [{id, name, ok, error?}]}.
    # ── Dry run ──
    dryRun:
      type: boolean
      description: "When true, validates params without creating. Returns inferences and correctedPayload."
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      type:
        type: string
        required: true
      width:
        type: number
        required: true
      height:
        type: number
        required: true
      visible:
        type: boolean
        required: true
      _libraryBindings:
        type: array
        description: "Token/style bindings applied during creation"
      _hints:
        type: array
        description: "Smart default inferences applied"
      _warnings:
        type: array
        description: "Non-fatal issues during creation"
      _children:
        type: array
        description: "Created child node IDs"
      _lintSummary:
        type: object
        description: "Quick lint summary after creation. Run lint_fix_all to fix violations."
  examples:
    - id: "80:1"
      name: "Button / Primary"
      type: "COMPONENT"
      width: 160
      height: 48
      visible: true

create_component_set:
  description: >-
    Combine multiple existing components into a variant set (ComponentSet).
    Auto-layouts variants in grid and auto-positions below existing content.
    Enforces a soft variant cap (default 30). Override via variantLimit param.
  toolset: core
  write: true
  access: create
  handler: bridge
  params:
    componentIds:
      type: array
      required: true
      items: string
      description: Component node IDs to combine into a variant set
    name:
      type: string
      description: Name for the variant set
    variantLimit:
      type: number
      description: >-
        Maximum number of variants allowed. Default: 30. Pass 0 to disable the
        check entirely. Override only when you have a deliberate reason to exceed
        30 (e.g. a core button with size × style × state axes legitimately at 48).
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      type:
        type: string
        required: true
      width:
        type: number
        required: true
      height:
        type: number
        required: true
      visible:
        type: boolean
        required: true
  examples:
    - id: "81:1"
      name: "Button"
      type: "COMPONENT_SET"
      width: 320
      height: 48
      visible: true

update_component:
  description: "Update a component's name, description, or size."
  toolset: components-advanced
  write: true
  access: edit
  handler: bridge
  params:
    nodeId:
      type: string
      required: true
      description: Component node ID
    name:
      type: string
      description: New component name
    description:
      type: string
      description: New component description
    width:
      type: number
      description: New width in px
    height:
      type: number
      description: New height in px
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      type:
        type: string
        required: true
      width:
        type: number
        required: true
      height:
        type: number
        required: true
      visible:
        type: boolean
        required: true
  examples:
    - id: "80:1"
      name: "Button / Secondary"
      type: "COMPONENT"
      width: 160
      height: 48
      visible: true

delete_component:
  description: Delete a component node.
  toolset: components-advanced
  write: true
  access: edit
  handler: bridge
  params:
    nodeId:
      type: string
      required: true
      description: Component node ID to delete
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
  examples:
    - ok: true

create_instance:
  description: >-
    Create component instances with optional variant selection, property overrides, and smart sizing.
    Supports local components (by ID) and library components (by key).
    Workflow: search_design_system(query:"button") → create_instance with componentKey + variantProperties.
  toolset: components-advanced
  write: true
  access: create
  handler: bridge
  params:
    componentId:
      type: string
      description: "Local component or component set node ID. For library components, use componentKey or componentSetKey instead."
    componentKey:
      type: string
      description: "Library component key (from search_design_system or libraryComponents). Imports the component from the team library. Tries as standalone component first, then as component set."
    componentSetKey:
      type: string
      description: "Library component set key. Imports the full component set (with all variants) from the team library. Use with variantProperties to pick a specific variant."
    variantProperties:
      type: object
      description: 'Pick variant e.g. {"Style":"Secondary","Size":"Large"}'
    properties:
      type: object
      description: 'Set component properties inline e.g. {"Label":"Click me","ShowIcon":true}. Only matches properties explicitly exposed by the component author (TEXT/BOOLEAN/VARIANT/INSTANCE_SWAP types). For arbitrary inner text nodes (placeholders, helper text, error copy) not exposed as properties, use textOverrides instead.'
    textOverrides:
      type: object
      description: >-
        Batch override inner TextNode characters not exposed as component properties.
        Keys match by: (1) path "Content/Label" — suffix path match,
        (2) numeric string "0","1" — Nth text node in walk order,
        (3) plain string "Label" — TextNode.name exact match.
        Example: {"Label":"Email address","Placeholder":"you@example.com","Helper":"We never share your email"}.
        Mixed-font text nodes use a prevail fallback (dominant font is loaded and applied).
        Unmatched keys emit a warning pointing to text_scan for discovery.
    parentId:
      type: string
      description: "Parent node ID"
    x:
      type: number
      description: "X position"
    y:
      type: number
      description: "Y position"
    width:
      type: number
      description: "Override width (resize)"
    height:
      type: number
      description: "Override height (resize)"
    layoutSizingHorizontal:
      type: enum
      values: [FIXED, HUG, FILL]
      description: "Horizontal sizing in auto-layout parent"
    layoutSizingVertical:
      type: enum
      values: [FIXED, HUG, FILL]
      description: "Vertical sizing in auto-layout parent"
    name:
      type: string
      description: "Instance layer name"
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
      type:
        type: string
  examples:
    - id: "60:1"
      name: "Button"
      type: "INSTANCE"

create_instances:
  description: >-
    Batch create component instances with variant selection, property overrides, and contextual sizing.
    Pass sizing:"contextual" to auto-infer FILL on cross-axis from parent auto-layout.
    Each item may pass textOverrides to update inner text nodes not exposed as component properties.
  toolset: components-advanced
  write: true
  access: create
  handler: bridge
  params:
    items:
      type: array
      required: true
      description: 'Array of {componentId, variantProperties?, properties?, textOverrides?, parentId?, sizing?, layoutSizingHorizontal?, ...}'
      items:
        type: object
  response:
    type: object
    fields:
      results:
        type: array
        required: true

create_component_from_node:
  description: >-
    Convert an existing frame/group to a component.
    When exposeText is true (default), all text children are auto-discovered and
    exposed as editable TEXT component properties.
  toolset: core
  write: true
  access: create
  handler: bridge
  params:
    nodeId:
      type: string
      required: true
      description: "Node ID to convert to component"
    name:
      type: string
      description: "Rename the component (default: keeps current name)"
    exposeText:
      type: boolean
      description: "Auto-expose text children as editable TEXT properties (default: true)"
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string

layout_component_set:
  description: >-
    Auto-layout variants in a grid after combineAsVariants. Parses variant names to determine grid position.
    Call this after create_component_set — without it, all variants stack at (0,0).
  toolset: core
  write: true
  access: edit
  handler: bridge
  params:
    nodeId:
      type: string
      required: true
      description: ComponentSet node ID
    gap:
      type: number
      description: 'Gap between variants in px (default: 20)'
    padding:
      type: number
      description: 'Padding inside ComponentSet frame (default: 40)'
    columnAxis:
      type: string
      description: >-
        Which variant property to use as columns (default: last property in variant name).
        Typically "State" — the axis designers scan horizontally.
    rowAxes:
      type: array
      items: string
      description: >-
        Which variant properties to use as rows (default: all except columnAxis).
        Order matters — first axis varies slowest.
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      componentSetId:
        type: string
        required: true
      positioned:
        type: number
        required: true
      grid:
        type: object
        fields:
          columns:
            type: number
          rows:
            type: number
          columnAxis:
            type: string
          rowAxes:
            type: array
            items: string
      size:
        type: object
        fields:
          width:
            type: number
          height:
            type: number
  examples:
    - ok: true
      componentSetId: "81:1"
      positioned: 18
      grid:
        columns: 3
        rows: 6
        columnAxis: "State"
        rowAxes: ["Size", "Style"]
      size:
        width: 560
        height: 480

bind_component_property:
  description: >-
    Wire one or more component properties to child nodes across all variants in a single call.
    Finds child nodes by name and sets componentPropertyReferences.
    Works on both Component and ComponentSet (iterates all variants).
    PREFERRED: pass `bindings` as an array to wire multiple properties in one call —
    a typical Button has 4-6 properties (Label / Icon / ShowIcon / State / ...) and
    batching them cuts round-trips.
    Legacy: omit `bindings` and pass `propertyName + targetNodeSelector + nodeProperty` for a single binding.
  toolset: components-advanced
  write: true
  access: edit
  handler: bridge
  params:
    nodeId:
      type: string
      required: true
      description: Component or ComponentSet node ID
    bindings:
      type: array
      description: >-
        Array of bindings (preferred). Each item has {propertyName, targetNodeSelector, nodeProperty}.
        When provided, propertyName/targetNodeSelector/nodeProperty at the top level are ignored.
      items:
        type: object
        fields:
          propertyName:
            type: string
            required: true
          targetNodeSelector:
            type: string
            required: true
          nodeProperty:
            type: enum
            values: [characters, visible, mainComponent]
            required: true
    propertyName:
      type: string
      description: '(Legacy single binding) Component property name (e.g. "Label", "Show Icon")'
    targetNodeSelector:
      type: string
      description: '(Legacy single binding) Child node name to match via recursive search'
    nodeProperty:
      type: enum
      values: [characters, visible, mainComponent]
      description: >-
        (Legacy single binding) Which node property to bind:
        characters → TEXT property (text nodes),
        visible → BOOLEAN property (any node),
        mainComponent → INSTANCE_SWAP property (instance nodes)
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      bindingsProcessed:
        type: number
        required: true
      variantsTargeted:
        type: number
        required: true
      totalBound:
        type: number
        required: true
      totalNotFound:
        type: number
        required: true
      results:
        type: array
        required: true
        items:
          type: object
          fields:
            propertyName:
              type: string
              required: true
            bound:
              type: number
              required: true
            notFound:
              type: number
              required: true
      errors:
        type: array
        items:
          type: object
          fields:
            variantName:
              type: string
            propertyName:
              type: string
            error:
              type: string
  examples:
    - ok: true
      bindingsProcessed: 4
      variantsTargeted: 6
      totalBound: 24
      totalNotFound: 0
      results:
        - propertyName: "Label"
          bound: 6
          notFound: 0
        - propertyName: "ShowIcon"
          bound: 6
          notFound: 0

swap_instance:
  description: Swap an existing instance to a different component.
