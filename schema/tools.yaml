# TOOLSET: library (7 tools)
# ═══════════════════════════════════════════════════════════════

list_library_collections:
  description: >-
    List all available team library variable collections.
    Returns collection key, name, and library name.
  toolset: library
  write: false
  handler: bridge
  params: {}
  response:
    type: array
    items:
      type: object
      fields:
        key:
          type: string
          required: true
        name:
          type: string
          required: true
        libraryName:
          type: string
          required: true
  examples:
    - - key: "VarCollectionKey:1"
        name: "Color"
        libraryName: "Acme DS"

list_library_variables:
  description: List all variables in a specific team library collection.
  toolset: library
  write: false
  handler: bridge
  params:
    collectionKey:
      type: string
      required: true
      description: The library collection key
  response:
    type: object
    fields:
      count:
        type: number
        required: true
      variables:
        type: array
        required: true
        items:
          type: object
          fields:
            key:
              type: string
              required: true
            name:
              type: string
              required: true
            resolvedType:
              type: string
              required: true
  examples:
    - count: 1
      variables:
        - key: "VariableKey:1"
          name: "color/brand/primary"
          resolvedType: "COLOR"

import_library_variable:
  description: >-
    Import a team library variable into the current file by key.
    Returns the imported variable details.
  toolset: library
  write: true
  access: create
  handler: bridge
  params:
    variableKey:
      type: string
      required: true
      description: The library variable key to import
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      resolvedType:
        type: string
        required: true
      description:
        type: string
      key:
        type: string
        required: true
  examples:
    - id: "VariableID:9:1"
      name: "color/brand/primary"
      resolvedType: "COLOR"
      description: "Primary brand color"
      key: "VariableKey:1"

list_library_styles:
  description: >-
    List published styles (TEXT, FILL, EFFECT, GRID) from a Figma library file via REST API.
    Returns metadata only (name, key, type, description).
    Requires Figma OAuth authentication (run figma_login first).
  toolset: library
  write: false
  handler: custom
  params:
    fileKey:
      type: string
      required: true
      description: "Figma file key of the library file (from URL: figma.com/design/<fileKey>/...)"
    styleType:
      type: enum
      values: [TEXT, FILL, EFFECT, GRID]
      description: Filter by style type. Omit to return all types.
  response:
    type: object
    fields:
      count:
        type: number
        required: true
      styles:
        type: array
        required: true
        items:
          type: object
          fields:
            key:
              type: string
              required: true
            file_key:
              type: string
              required: true
            node_id:
              type: string
              required: true
            style_type:
              type: string
              required: true
            name:
              type: string
              required: true
            description:
              type: string
  examples:
    - count: 1
      styles:
        - key: "StyleKey:1"
          file_key: "abc123"
          node_id: "1:2"
          style_type: "TEXT"
          name: "Text/Heading/L"
          description: "Display heading"

get_library_style_details:
  description: >-
    Fetch full properties (font, color, effects) for specific library styles via REST API.
    Use after list_library_styles.
  toolset: library
  write: false
  handler: custom
  params:
    fileKey:
      type: string
      required: true
      description: Figma file key
    styles:
      type: array
      required: true
      items: object
      description: Style entries from list_library_styles
  response:
    type: object
    fields:
      count:
        type: number
        required: true
      styles:
        type: array
        required: true
        items:
          type: object
          fields:
            key:
              type: string
              required: true
            file_key:
              type: string
              required: true
            node_id:
              type: string
              required: true
            style_type:
              type: string
              required: true
            name:
              type: string
              required: true
            description:
              type: string
            properties:
              type: object
              required: true
  examples:
    - count: 1
      styles:
        - key: "StyleKey:1"
          file_key: "abc123"
          node_id: "1:2"
          style_type: "TEXT"
          name: "Text/Heading/L"
          description: "Display heading"
          properties:
            fontFamily: "Inter"
            fontSize: 32

sync_library_styles:
  description: >-
    One-step sync: discover all published styles from a Figma library file, fetch their full properties,
    and register them for auto-application. Combines list + detail + register into a single call.
  toolset: library
  write: true
  access: create
  handler: custom
  params:
    fileKey:
      type: string
      required: true
      description: Figma file key of the library file
    library:
      type: string
      required: true
      description: Library name for registration
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      discovered:
        type: object
        required: true
        fields:
          total:
            type: number
            required: true
          text:
            type: number
            required: true
          fill:
            type: number
            required: true
          effect:
            type: number
            required: true
      diff:
        type: object
        required: true
      registered:
        type: unknown
        required: true
  examples:
    - ok: true
      discovered:
        total: 12
        text: 4
        fill: 6
        effect: 2
      diff:
        added: []
        removed: []
        modified: []
        unchanged: 12
      registered:
        ok: true
        registered:
          textStyles: 4
          paintStyles: 6
          effectStyles: 2

import_library_style:
  description: >-
    Import a published library style into the current file by key.
    Works for TEXT, PAINT, and EFFECT styles.
  toolset: library
  write: true
  access: create
  handler: custom
  params:
    styleKey:
      type: string
      required: true
      description: The style key (from list_library_styles)
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      type:
        type: string
        required: true
      key:
        type: string
        required: true
      description:
        type: string
  examples:
    - id: "Style:21"
      name: "Text/Heading/L"
      type: "TEXT"
      key: "StyleKey:1"
      description: "Display heading"

# ═══════════════════════════════════════════════════════════════
# TOOLSET: shapes-vectors (6 tools)
