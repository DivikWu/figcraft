        required: true
        items:
          type: object
          fields:
            modeId:
              type: string
              required: true
            name:
              type: string
              required: true
      results:
        type: object
        required: true
  examples:
    - collectionId: "VariableCollectionId:1:2"
      modes:
        - modeId: "1:0"
          name: "Light"
        - modeId: "1:1"
          name: "Dark"
      results:
        Light:
          variables:
            created: 8
            updated: 0
            skipped: 0
            failed: 0
            failures: []
          styles:
            created: 2
            updated: 0
            skipped: 0
            failed: 0
            failures: []
          totalTokens: 10

diff_tokens:
  description: >-
    Compare DTCG tokens against current Figma variables.
    Shows which tokens are in-sync, ahead, behind, or missing.
  toolset: tokens
  write: false
  handler: custom
  params:
    filePath:
      type: string
      required: true
      description: Path to DTCG JSON file
    collectionName:
      type: string
      description: Collection to compare against
  response:
    type: object
    fields:
      summary:
        type: object
        required: true
        fields:
          inSync:
            type: number
            required: true
          dtcgAhead:
            type: number
            required: true
          missingInFigma:
            type: number
            required: true
          missingInDtcg:
            type: number
            required: true
      diff:
        type: array
        required: true
        items:
          type: object
          fields:
            path:
              type: string
              required: true
            status:
              type: string
              required: true
            dtcgValue:
              type: unknown
            figmaValue:
              type: unknown
  examples:
    - summary:
        inSync: 8
        dtcgAhead: 1
        missingInFigma: 2
        missingInDtcg: 0
      diff:
        - path: "color.brand.primary"
          status: "in-sync"
          dtcgValue: "#7c3aed"
          figmaValue: "#7c3aed"
        - path: "spacing.lg"
          status: "missing-in-figma"
          dtcgValue: 24

