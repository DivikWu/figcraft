# ═══════════════════════════════════════════════════════════════
# ENDPOINT TOOLS (resource-oriented API with method dispatch)
# ═══════════════════════════════════════════════════════════════

nodes:
  description: >-
    Node operations — get, list, update, delete, clone, insert_child.
    For creating nodes, use create_document (batch) or shapes/text endpoints.
  toolset: core
  handler: endpoint
  methods:
    get:
      description: Get detailed node info by ID (supports Figma URLs)
      maps_to: get_node_info
      write: false
      response:
        type: object
        fields:
          id:
            type: string
            required: true
          name:
            type: string
            required: true
          type:
            type: string
            required: true
          width:
            type: number
          height:
            type: number
          children:
            type: array
            items:
              type: object
              fields:
                id:
                  type: string
                  required: true
                name:
                  type: string
                  required: true
                type:
                  type: string
                  required: true
      examples:
        - id: "1:23"
          name: "Auth Screen"
          type: "FRAME"
          width: 402
          height: 874
          children:
            - id: "1:24"
              name: "Login Form"
              type: "FRAME"
      params:
        nodeId:
          type: string
          required: true
          description: 'Node ID or Figma URL'
    list:
      description: Search nodes by name, optionally filter by type
      maps_to: search_nodes
      write: false
      response:
        type: object
        fields:
          count:
            type: number
            required: true
          nodes:
            type: array
            required: true
            items:
              type: object
              fields:
                id:
                  type: string
                  required: true
                name:
                  type: string
                  required: true
                type:
                  type: string
                  required: true
          _error:
            type: string
          _sizeKB:
            type: number
          _limitKB:
            type: number
          method:
            type: string
          warning:
            type: string
          hints:
            type: array
            items: string
          _preview:
            type: string
      examples:
        - count: 1
          nodes:
            - id: "1:10"
              name: "Login Button"
              type: "FRAME"
      params:
        query:
          type: string
          required: true
          description: Search query
        types:
          type: array
          items: string
          description: Filter by node types
        limit:
          type: number
          description: Max results (default 50)
    update:
      description: Update properties on one or more nodes
      maps_to: patch_nodes
      write: true
      access: edit
      response:
        type: object
        fields:
          results:
            type: array
            required: true
            items:
              type: object
              fields:
                nodeId:
                  type: string
                  required: true
                ok:
                  type: boolean
                  required: true
                error:
                  type: string
      examples:
        - results:
            - nodeId: "30:1"
              ok: true
      params:
        patches:
          type: array
          required: true
          items:
            type: object
            fields:
              nodeId:
                type: string
                required: true
              props:
                type: record
                required: true
                valueType: unknown
    delete:
      description: Delete nodes by ID
      maps_to: delete_nodes
      write: true
      access: edit
      response:
        type: object
        fields:
          results:
            type: array
            required: true
            items:
              type: object
              fields:
                nodeId:
                  type: string
                  required: true
                ok:
                  type: boolean
                  required: true
                error:
                  type: string
      examples:
        - results:
            - nodeId: "30:1"
              ok: true
      params:
        nodeIds:
          type: array
          required: true
          items: string
    clone:
      description: Clone a node
      maps_to: clone_node
      write: true
      access: create
      response:
        type: object
        fields:
          id:
            type: string
            required: true
          name:
            type: string
            required: true
          type:
            type: string
            required: true
          width:
            type: number
          height:
            type: number
      examples:
        - id: "60:1"
          name: "Cloned Card"
          type: "FRAME"
          width: 320
          height: 180
      params:
        nodeId:
          type: string
          required: true
    insert_child:
      description: Move a node into a parent container
      maps_to: insert_child
      write: true
      access: edit
      response:
        type: object
        fields:
          ok:
            type: boolean
            required: true
          error:
            type: string
      examples:
        - ok: true
      params:
        parentId:
          type: string
          required: true
        childId:
          type: string
          required: true
        index:
          type: number

text:
  description: >-
    Text node operations — create text nodes and update text content.
  toolset: core
  handler: endpoint
  methods:
    create:
      description: Create a text node with specified content and font
      maps_to: create_text
      write: true
      access: create
      response:
        type: object
        fields:
          id:
            type: string
            required: true
          name:
            type: string
            required: true
          type:
            type: string
            required: true
          characters:
            type: string
          fontSize:
            type: number
          autoBound:
            type: record
            valueType: unknown
      examples:
        - id: "30:2"
          name: "Hero Title"
