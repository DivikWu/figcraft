rename_collection_mode:
  description: Rename an existing mode in a variable collection.
  toolset: variables
  write: true
  access: edit
  handler: bridge
  params:
    collectionId:
      type: string
      required: true
      description: Collection ID
    modeId:
      type: string
      required: true
      description: Mode ID to rename
