      description: Sync composite design tokens to Figma Styles
      maps_to: sync_styles
      write: true
      access: create
      response:
        type: object
        fields:
          created:
            type: number
            required: true
          updated:
            type: number
            required: true
          skipped:
            type: number
            required: true
          failed:
            type: number
            required: true
          failures:
            type: array
            required: true
            items:
              type: object
              fields:
                path:
                  type: string
                  required: true
                error:
                  type: string
                  required: true
      examples:
        - created: 2
          updated: 1
          skipped: 0
          failed: 0
          failures: []
      params:
        tokens:
          type: array
          required: true
          items: object
    create_text:
      description: Create a new text style
      maps_to: create_text_style
      write: true
      access: create
      response:
        type: object
        fields:
          id:
            type: string
            required: true
          name:
            type: string
            required: true
          fontSize:
            type: number
          alreadyExists:
            type: boolean
      examples:
        - id: "S:style1"
          name: "Text/Heading/L"
          fontSize: 32
      params:
        name:
          type: string
          required: true
        fontFamily:
          type: string
        fontStyle:
          type: string
        fontWeight:
          type: number
        fontSize:
          type: number
        lineHeight:
          type: unknown
        letterSpacing:
          type: unknown
        description:
          type: string
    create_effect:
      description: Create a new effect style (shadow, blur)
      maps_to: create_effect_style
      write: true
      access: create
      response:
        type: object
        fields:
          id:
            type: string
            required: true
          name:
            type: string
            required: true
          alreadyExists:
            type: boolean
      examples:
        - id: "S:effect1"
          name: "Shadow/Card/Default"
      params:
        name:
          type: string
          required: true
        description:
          type: string
        effects:
          type: array
          required: true
          items: object

# ═══════════════════════════════════════════════════════════════
# TOOLSET DESCRIPTIONS (for list_toolsets display)
# ═══════════════════════════════════════════════════════════════

_toolset_descriptions:
  variables: "Variable & collection management — create, update, delete variables, collections, modes, aliases, bindings."
  tokens: "DTCG token sync — parse, diff, sync, reverse-sync design tokens between JSON files and Figma."
  styles: "Style management — create, update, delete paint/text/effect styles, sync composite tokens."
  components-advanced: "Advanced component ops — create components, manage variants/properties/overrides, audit."
  library-import: "Library import — browse and import library variables, styles, and components into the local file (design system authoring)."
  shapes-vectors: "Shape primitives & vectors — stars, polygons, sections, boolean ops, flatten."
  annotations: "Annotations — add, read, batch-set, and clear annotations on nodes."
  prototype: "Prototype interactions — get/add/remove/set reactions, analyze prototype flows and navigation."
  lint: "Granular lint — individual check, fix, rules list, compliance report (beyond lint_fix_all)."
  auth: "Figma OAuth — login, logout, check auth status."
  pages: "Page management — create and rename pages."
  staging: "Staged workflow — preview changes before finalizing. Stage, commit, discard, and list staged nodes."
  debug: "Debug tools — execute arbitrary JS in the Plugin sandbox. Not available by default; use load_toolset('debug') to enable."

# Quick-start hints appended to load_toolset responses.
# Guides agents toward the correct endpoint + method after loading a toolset.
_toolset_quickstart:
  variables: 'Write tools enabled. variables_ep is already available (core) — use variables_ep(method: "list_collections") to browse, variables_ep(method: "list") to list all. This toolset adds write operations: rename_collection, create_variable_alias, etc.'
  tokens: 'sync_tokens({ filePath: "path/to/tokens.json" }) to sync DTCG tokens to Figma.'
  styles: 'Write tools enabled. styles_ep is already available (core) — use styles_ep(method: "list") to browse. This toolset adds write operations: register_library_styles, etc.'
  components-advanced: 'components(method: "list") to list local components.'

