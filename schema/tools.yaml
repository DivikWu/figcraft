      failed: 0

add_component_property:
  description: >-
    Add a new property to a component or component set.
    Supported types: BOOLEAN, TEXT, INSTANCE_SWAP, VARIANT, SLOT.
  toolset: components-advanced
  write: true
  access: create
  handler: bridge
  params:
    nodeId:
      type: string
      required: true
      description: Component or ComponentSet node ID
    propertyName:
      type: string
      required: true
      description: Property name
    type:
      type: enum
      values: [BOOLEAN, TEXT, INSTANCE_SWAP, VARIANT, SLOT]
      required: true
      description: Property type
    defaultValue:
      type: unknown
      required: true
      description: 'Default value. String or boolean for most types. Can be a VariableAlias object ({ type: "VARIABLE_ALIAS", id: "..." }) to bind to a variable.'
    preferredValues:
      type: array
      items: object
      description: 'Preferred values for INSTANCE_SWAP and SLOT properties. Array of {type: "COMPONENT"|"COMPONENT_SET", key: string}.'
    description:
      type: string
      description: 'Property description (only supported for SLOT properties)'
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      key:
        type: string
        description: 'The property key with Figma suffix (e.g. "Label#0:1"). Use this key for componentPropertyReferences.'
      properties:
        type: array
        items: string
      error:
        type: string
  examples:
    - ok: true
      key: "Label#0:1"
      properties: ["State", "Label#0:1"]

update_component_property:
  description: >-
    Update an existing component property (rename, change default value, preferred values, or description).
    preferredValues is supported for INSTANCE_SWAP and SLOT properties.
    description is supported for SLOT properties only.
  toolset: components-advanced
  write: true
  access: edit
  handler: bridge
  params:
    nodeId:
      type: string
      required: true
      description: Component or ComponentSet node ID
    propertyName:
      type: string
      required: true
      description: Current property name
    newName:
      type: string
      description: New property name
    defaultValue:
      type: unknown
      description: New default value
    preferredValues:
      type: array
      items:
        type: object
      description: "Preferred values for INSTANCE_SWAP or SLOT properties. Array of {type: 'COMPONENT'|'COMPONENT_SET', key: string}."
    description:
      type: string
      description: Description for SLOT properties only
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      properties:
        type: array
        items: string
      error:
        type: string
  examples:
    - ok: true
      properties: ["State", "Label"]

delete_component_property:
  description: Remove a property from a component or component set.
  toolset: components-advanced
  write: true
  access: edit
  handler: bridge
  params:
    nodeId:
      type: string
      required: true
      description: Component or ComponentSet node ID
    propertyName:
      type: string
      required: true
      description: Property name to delete
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      properties:
        type: array
        items: string
      error:
        type: string
  examples:
    - ok: true
      properties: ["State"]

audit_components:
  description: >-
    Audit all components on the current page for structural health.
    Reports: missing descriptions, unexposed text nodes, empty components,
    single-variant sets, and property counts. Use for design system maintenance.
  toolset: components-advanced
  write: false
  handler: bridge
  params:
    nodeIds:
      type: array
      items: string
      description: "Specific node IDs to audit (default: entire page)"
  response:
    type: object
    fields:
      summary:
        type: object
        required: true
        fields:
          totalComponents:
            type: number
            required: true
          totalIssues:
            type: number
            required: true
      components:
        type: array
        required: true
        items: object
      issues:
        type: array
        required: true
        items:
          type: object
          fields:
            nodeId:
              type: string
              required: true
            name:
              type: string
              required: true
            issue:
              type: string
              required: true
  examples:
    - summary:
        totalComponents: 4
        totalIssues: 1
      components:
        - id: "80:1"
          name: "Button / Primary"
          propertyCount: 2
      issues:
        - nodeId: "80:1"
          name: "Button / Primary"
          issue: "Missing description"

get_code_connect_metadata:
  description: >-
    Return structured Code Connect metadata for a COMPONENT or COMPONENT_SET.
    Does NOT generate template files — Figma's official `figma connect create` CLI is the
    de-facto standard for that (supports React, React Native, HTML, Web Components, SwiftUI,
    Jetpack Compose, hits REST API directly, no Desktop required).

    What figcraft adds: in-session structured metadata (properties with bare names stripped
    of Figma's #id suffix, variant option lists, INSTANCE_SWAP preferredValues, slot info)
    that agents can consume WITHOUT shelling out to the CLI — useful when an agent has just
    modified the component in the same session. The returned metadata is also a great input
    for an LLM that will read project source files to generate a template aligned to the
    project's actual component API.

    Workflow:
      1. Users wanting a template file: run `npx figma connect create "<figmaUrl>" --token <T>`
      2. Agents needing fresh data after figcraft edits: call this tool
      3. LLMs generating project-aligned templates: feed the metadata + read project source
  toolset: components-advanced
  write: false
  handler: bridge
  params:
    nodeId:
      type: string
      required: true
      description: COMPONENT or COMPONENT_SET node id
    fileKey:
      type: string
      description: "Optional Figma file key — when provided, figmaUrl is fully populated; otherwise <FILE_KEY> placeholder is emitted"
  response:
    type: object
    fields:
      componentName:
        type: string
        required: true
      nodeId:
        type: string
        required: true
      isComponentSet:
        type: boolean
        required: true
      remote:
        type: boolean
        required: true
      description:
        type: string
      figmaUrl:
        type: string
        required: true
      properties:
        type: array
        required: true
        items:
          type: object
          fields:
            bareName:
              type: string
              required: true
              description: "Property name with #id suffix stripped — use this in Code Connect files"
            figmaKey:
              type: string
              required: true
            type:
              type: string
              required: true
            defaultValue:
              type: string
            variantOptions:
              type: array
              items: string
      slots:
        type: object
        required: true
        fields:
          textSlots:
            type: array
            required: true
            items:
              type: object
              fields:
                name:
                  type: string
                  required: true
                characters:
                  type: string
                  required: true
          instanceSlots:
            type: array
            required: true
            items:
              type: object
              fields:
                name:
                  type: string
                  required: true
                mainComponentName:
                  type: string
      summary:
        type: object
        required: true
        fields:
          propertyCount:
            type: number
            required: true
          textProperties:
            type: number
            required: true
          booleanProperties:
            type: number
            required: true
          instanceSwapProperties:
            type: number
            required: true
          variantProperties:
            type: number
            required: true
          slotProperties:
            type: number
            required: true
          textSlotCount:
            type: number
            required: true
          instanceSlotCount:
            type: number
            required: true
  examples:
    - componentName: "Button"
      nodeId: "80:1"
      isComponentSet: true
      remote: false
      figmaUrl: "https://figma.com/design/abc/Button?node-id=80-1"
      properties:
        - bareName: "Label"
          figmaKey: "Label#42:0"
          type: "TEXT"
          defaultValue: "Button"
        - bareName: "Style"
          figmaKey: "Style"
          type: "VARIANT"
          variantOptions: ["Primary", "Secondary", "Ghost"]
      slots:
        textSlots:
          - name: "label"
            characters: "Button"
        instanceSlots: []
      summary:
        propertyCount: 2
        textProperties: 1
        booleanProperties: 0
        instanceSwapProperties: 0
        variantProperties: 1
        slotProperties: 0
        textSlotCount: 1
        instanceSlotCount: 0

preflight_library_publish:
  description: >-
    Pre-publish health check: scan all components, variables, and styles in a single pass,
    return structured blockers + warnings with fix suggestions. Run this before manually
    publishing a library in Figma. Complements lint_fix_all — this tool focuses on
    structural readiness (descriptions, scopes, code syntax), while lint_fix_all handles
    token compliance and contrast. Publishing itself must be triggered manually via
    the Figma Assets panel (Plugin API does not expose publish).
  toolset: components-advanced
  write: false
  handler: bridge
  params:
    checkComponents:
      type: boolean
      description: "Check components and component sets (default: true)"
    checkVariables:
      type: boolean
      description: "Check local variables for scopes and code syntax (default: true)"
    checkStyles:
      type: boolean
      description: "Check local paint/text/effect styles for descriptions (default: true)"
  response:
    type: object
    fields:
      ready:
        type: boolean
        required: true
        description: "True when there are no blockers (warnings are OK)"
      summary:
        type: object
        required: true
        fields:
          components:
            type: number
            required: true
          componentSets:
            type: number
            required: true
          variables:
            type: number
            required: true
          styles:
            type: number
            required: true
          blockerCount:
            type: number
            required: true
          warningCount:
            type: number
            required: true
      blockers:
        type: array
        required: true
        items:
          type: object
          fields:
            severity:
              type: string
              required: true
            category:
              type: string
              required: true
            target:
              type: string
              required: true
            nodeId:
              type: string
            message:
              type: string
              required: true
            suggestion:
              type: string
      warnings:
        type: array
        required: true
        items:
          type: object
          fields:
            severity:
              type: string
              required: true
            category:
              type: string
              required: true
            target:
              type: string
              required: true
            nodeId:
              type: string
            message:
              type: string
              required: true
            suggestion:
              type: string
  examples:
    - ready: false
      summary:
        components: 12
        componentSets: 3
        variables: 48
        styles: 6
        blockerCount: 2
        warningCount: 5
      blockers:
        - severity: "blocker"
          category: "component"
          target: "Button"
          nodeId: "80:1"
          message: "Component set missing description"
          suggestion: 'update_component(nodeId:"80:1", description:"...")'

# ═══════════════════════════════════════════════════════════════
# TOOLSET: library (7 tools)
# ═══════════════════════════════════════════════════════════════

list_library_collections:
  description: >-
    List all available team library variable collections.
    Returns collection key, name, and library name.
  toolset: library-import
  write: false
  handler: bridge
  params: {}
  response:
    type: array
    items:
      type: object
      fields:
        key:
          type: string
          required: true
        name:
          type: string
          required: true
        libraryName:
          type: string
          required: true
  examples:
    - - key: "VarCollectionKey:1"
        name: "Color"
        libraryName: "Acme DS"

list_library_variables:
  description: List all variables in a specific team library collection.
  toolset: library-import
  write: false
  handler: bridge
  params:
    collectionKey:
      type: string
      required: true
      description: The library collection key
  response:
    type: object
    fields:
      count:
        type: number
        required: true
      variables:
        type: array
        required: true
        items:
          type: object
          fields:
            key:
              type: string
              required: true
            name:
              type: string
              required: true
            resolvedType:
              type: string
              required: true
  examples:
    - count: 1
      variables:
        - key: "VariableKey:1"
          name: "color/brand/primary"
          resolvedType: "COLOR"

import_library_variable:
  description: >-
    Import a team library variable into the current file by key.
    Returns the imported variable details.
  toolset: library-import
  write: true
  access: create
  handler: bridge
  params:
    variableKey:
      type: string
      required: true
      description: The library variable key to import
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      resolvedType:
        type: string
        required: true
      description:
        type: string
      key:
        type: string
        required: true
  examples:
    - id: "VariableID:9:1"
      name: "color/brand/primary"
      resolvedType: "COLOR"
      description: "Primary brand color"
      key: "VariableKey:1"

list_library_styles:
  description: >-
    List published styles (TEXT, FILL, EFFECT, GRID) from a Figma library file via REST API.
    Returns metadata only (name, key, type, description).
    Requires Figma OAuth authentication (run figma_login first).
  toolset: library-import
  write: false
  handler: custom
  params:
    fileKey:
      type: string
      required: true
      description: "Figma file key of the library file (from URL: figma.com/design/<fileKey>/...)"
    styleType:
      type: enum
      values: [TEXT, FILL, EFFECT, GRID]
      description: Filter by style type. Omit to return all types.
  response:
    type: object
    fields:
      count:
        type: number
        required: true
      styles:
        type: array
        required: true
        items:
          type: object
          fields:
            key:
              type: string
              required: true
            file_key:
              type: string
              required: true
            node_id:
              type: string
              required: true
            style_type:
              type: string
              required: true
            name:
              type: string
              required: true
            description:
              type: string
  examples:
    - count: 1
      styles:
        - key: "StyleKey:1"
          file_key: "abc123"
          node_id: "1:2"
          style_type: "TEXT"
          name: "Text/Heading/L"
          description: "Display heading"

get_library_style_details:
  description: >-
    Fetch full properties (font, color, effects) for specific library styles via REST API.
    Use after list_library_styles.
  toolset: library-import
  write: false
  handler: custom
  params:
    fileKey:
      type: string
      required: true
      description: Figma file key
    styles:
      type: array
      required: true
      items: object
      description: Style entries from list_library_styles
  response:
    type: object
    fields:
      count:
        type: number
        required: true
      styles:
        type: array
        required: true
        items:
          type: object
          fields:
            key:
              type: string
              required: true
            file_key:
              type: string
              required: true
            node_id:
              type: string
              required: true
            style_type:
              type: string
              required: true
            name:
              type: string
              required: true
            description:
              type: string
            properties:
              type: object
              required: true
  examples:
    - count: 1
      styles:
        - key: "StyleKey:1"
          file_key: "abc123"
          node_id: "1:2"
          style_type: "TEXT"
          name: "Text/Heading/L"
          description: "Display heading"
          properties:
            fontFamily: "Inter"
            fontSize: 32

sync_library_styles:
  description: >-
    One-step sync: discover all published styles from a Figma library file, fetch their full properties,
    and register them for auto-application. Combines list + detail + register into a single call.
  toolset: library-import
  write: true
  access: create
  handler: custom
  params:
    fileKey:
      type: string
      required: true
      description: Figma file key of the library file
    library:
      type: string
      required: true
      description: Library name for registration
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      discovered:
        type: object
        required: true
        fields:
          total:
            type: number
            required: true
          text:
            type: number
            required: true
          fill:
            type: number
            required: true
          effect:
            type: number
            required: true
      diff:
        type: object
        required: true
      registered:
        type: unknown
        required: true
  examples:
    - ok: true
      discovered:
        total: 12
        text: 4
        fill: 6
        effect: 2
      diff:
        added: []
        removed: []
        modified: []
        unchanged: 12
      registered:
        ok: true
        registered:
          textStyles: 4
          paintStyles: 6
          effectStyles: 2

import_library_style:
  description: >-
    Import a published library style into the current file by key.
    Works for TEXT, PAINT, and EFFECT styles.
  toolset: library-import
  write: true
  access: create
  handler: custom
  params:
    styleKey:
      type: string
      required: true
      description: The style key (from list_library_styles)
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      type:
        type: string
        required: true
      key:
        type: string
        required: true
      description:
        type: string
  examples:
    - id: "Style:21"
      name: "Text/Heading/L"
      type: "TEXT"
      key: "StyleKey:1"
      description: "Display heading"

# ═══════════════════════════════════════════════════════════════
# TOOLSET: shapes-vectors (6 tools)
# ═══════════════════════════════════════════════════════════════

create_line:
  description: Create a line node. Specify length and optional rotation.
  toolset: shapes-vectors
  write: true
  access: create
  handler: bridge
  params:
    name:
      type: string
      description: Node name
    x:
      type: number
      description: X position
    y:
      type: number
      description: Y position
    length:
      type: number
      description: "Line length in px (default: 100)"
    rotation:
      type: number
      description: "Rotation in degrees (0 = horizontal)"
    parentId:
      type: string
      description: Parent node ID
    stroke:
      type: string
      description: "Stroke color as hex (default: #000000)"
    strokeWeight:
      type: number
      description: "Stroke weight (default: 1)"
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      type:
        type: string
        required: true
      width:
        type: number
        required: true
      height:
        type: number
        required: true
      visible:
        type: boolean
        required: true
  examples:
    - id: "90:1"
      name: "Divider"
      type: "LINE"
      width: 320
      height: 0
      visible: true

create_star:
  description: Create a star shape node.
  toolset: shapes-vectors
  write: true
  access: create
  handler: bridge
  params:
    name:
      type: string
      description: Node name
    x:
      type: number
      description: X position
    y:
      type: number
      description: Y position
    width:
      type: number
      description: "Width (default: 100)"
    height:
      type: number
      description: "Height (default: 100)"
    pointCount:
      type: number
      description: "Number of points (default: 5)"
    innerRadius:
      type: number
      description: "Inner radius ratio 0-1 (default: 0.382)"
    fill:
      type: string
      description: Fill color as hex
    parentId:
      type: string
      description: Parent node ID
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      type:
        type: string
        required: true
      width:
        type: number
        required: true
      height:
        type: number
        required: true
      visible:
        type: boolean
        required: true
  examples:
    - id: "90:2"
      name: "Star"
      type: "STAR"
      width: 100
      height: 100
      visible: true

create_polygon:
  description: Create a regular polygon shape node.
  toolset: shapes-vectors
  write: true
  access: create
  handler: bridge
  params:
    name:
      type: string
      description: Node name
    x:
      type: number
      description: X position
    y:
      type: number
      description: Y position
    width:
      type: number
      description: "Width (default: 100)"
    height:
      type: number
      description: "Height (default: 100)"
    pointCount:
      type: number
      description: "Number of sides (default: 3 = triangle)"
    fill:
      type: string
      description: Fill color as hex
    parentId:
      type: string
      description: Parent node ID
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      type:
        type: string
        required: true
      width:
        type: number
        required: true
      height:
        type: number
        required: true
      visible:
        type: boolean
        required: true
  examples:
    - id: "90:3"
      name: "Triangle"
      type: "POLYGON"
      width: 100
      height: 100
      visible: true

create_rectangle:
  description: >-
    Create a rectangle shape node with optional fill, stroke, corner radius, and opacity.
    For simple shapes that don't need auto-layout or children — use create_frame for containers.
  toolset: shapes-vectors
  write: true
  access: create
  handler: bridge
  params:
    name:
      type: string
      description: 'Node name (default: "Rectangle")'
    <<: [*shape_position, *shape_fill, *shape_stroke, *shape_appearance]
    strokeAlign:
      type: enum
      values: [INSIDE, OUTSIDE, CENTER]
      description: "Stroke position (default: INSIDE)"
    cornerRadius:
      type: number
      description: Corner radius — sets all 4 corners uniformly
    topLeftRadius:
      type: number
      description: Top-left corner radius
    topRightRadius:
      type: number
      description: Top-right corner radius
    bottomRightRadius:
      type: number
      description: Bottom-right corner radius
    bottomLeftRadius:
      type: number
      description: Bottom-left corner radius
    parentId:
      type: string
      description: Parent node ID
  response:
    type: object
    fields:
      <<: *node_response
      _libraryBindings:
        type: array
        description: "Token/style bindings applied during creation"
  examples:
    - id: "90:4"
      name: "Card Background"
      type: "RECTANGLE"
      width: 320
      height: 200
      visible: true

create_ellipse:
  description: >-
    Create an ellipse (circle) shape node with optional fill, stroke, and opacity.
    For circles, set equal width and height. Supports token auto-binding.
  toolset: shapes-vectors
  write: true
  access: create
  handler: bridge
  params:
    name:
      type: string
      description: 'Node name (default: "Ellipse")'
    <<: [*shape_position, *shape_fill, *shape_stroke, *shape_appearance]
    parentId:
      type: string
      description: Parent node ID
  response:
    type: object
    fields:
      <<: *node_response
      _libraryBindings:
        type: array
        description: "Token/style bindings applied during creation"
  examples:
    - id: "90:5"
      name: "Avatar"
      type: "ELLIPSE"
      width: 48
      height: 48
      visible: true

create_section:
  description: >-
    Create a Figma Section node for organizing canvas content.
    Sections group frames without clipping and can be collapsed in Figma.
    Optionally move existing nodes inside by providing childIds.
    Auto-positions below existing content when x/y omitted.
  toolset: core
  write: true
  access: create
  handler: bridge
  params:
    name:
      type: string
      description: 'Section name (default: "Section")'
    width:
      type: number
      description: 'Section width in px (default: 1920)'
    height:
      type: number
      description: 'Section height in px (default: 1080)'
    x:
      type: number
      description: X position
    y:
      type: number
      description: Y position
    childIds:
      type: array
      items: string
      description: Node IDs to move inside the section
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      x:
        type: number
        required: true
      y:
        type: number
        required: true
  examples:
    - id: "91:1"
      name: "Onboarding"
      x: 0
      y: 0

group_nodes:
  description: >-
    Group multiple nodes into a Group node. All nodes must share the same parent.
  toolset: shapes-vectors
  write: true
  access: edit
  handler: bridge
  params:
    nodeIds:
      type: array
      required: true
      description: "Node IDs to group (must share the same parent, minimum 2)"
      items: string
    name:
      type: string
      description: "Group name (default: 'Group')"
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      type:
        type: string
        required: true
      childCount:
        type: number
        required: true
  examples:
    - id: "93:1"
      name: "Group"
      type: "GROUP"
      childCount: 3

flatten_node:
  description: >-
    Flatten a node (or group) into a single vector.
    Useful for converting complex shapes into a single editable path.
  toolset: shapes-vectors
  write: true
  access: edit
  handler: bridge
  params:
    nodeId:
      type: string
      required: true
      description: Node ID to flatten
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      type:
        type: string
        required: true
      width:
        type: number
        required: true
      height:
        type: number
        required: true
      visible:
        type: boolean
        required: true
      error:
        type: string
  examples:
    - id: "92:1"
      name: "Flattened Shape"
      type: "VECTOR"
      width: 120
      height: 120
      visible: true

boolean_operation:
  description: >-
    Apply a boolean operation to two or more vector/shape nodes.
    UNION merges shapes, SUBTRACT removes overlap from the first shape,
    INTERSECT keeps only the overlapping area, EXCLUDE keeps non-overlapping areas.
    All nodes must share the same parent. Returns the resulting BooleanOperation node.
  toolset: shapes-vectors
  write: true
  access: edit
  handler: bridge
  params:
    nodeIds:
      type: array
      required: true
      items: string
      description: Node IDs to combine (at least 2, order matters for SUBTRACT)
    operation:
      type: enum
      values: [UNION, SUBTRACT, INTERSECT, EXCLUDE]
      required: true
      description: Boolean operation type
    name:
      type: string
      description: Name for the resulting node
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      type:
        type: string
        required: true
      width:
        type: number
        required: true
      height:
        type: number
        required: true
      visible:
        type: boolean
        required: true
  examples:
    - id: "93:1"
      name: "Merged Shape"
      type: "BOOLEAN_OPERATION"
      width: 160
      height: 120
      visible: true

# ═══════════════════════════════════════════════════════════════
# TOOLSET: annotations (4 tools)
# ═══════════════════════════════════════════════════════════════

get_annotations:
  description: >-
    Get all annotations on the current page or a specific node.
    Returns each annotated node with its annotation labels.
  toolset: annotations
  write: false
  handler: bridge
  params:
    nodeId:
      type: string
      description: Node ID to inspect; omit to scan the entire current page
  response:
    type: object
    fields:
      nodes:
        type: array
        required: true
        items:
          type: object
          fields:
            nodeId:
              type: string
              required: true
            nodeName:
              type: string
              required: true
            annotations:
              type: array
              required: true
              items: object
      count:
        type: number
        required: true
  examples:
    - nodes:
        - nodeId: "100:1"
          nodeName: "Login Form"
          annotations:
            - label: "Check spacing"
              properties:
                - type: "design"
      count: 1

set_annotation:
  description: >-
    Add or replace an annotation on a node.
    Use replace=true to overwrite existing annotations; omit or set false to append.
  toolset: annotations
  write: true
  access: create
  handler: bridge
  params:
    nodeId:
      type: string
      required: true
      description: Target node ID
    label:
      type: string
      required: true
      description: Annotation text (Markdown supported)
    replace:
      type: boolean
      description: "If true, replaces all existing annotations on the node (default: false = append)"
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      nodeId:
        type: string
        required: true
      count:
        type: number
        required: true
  examples:
    - ok: true
      nodeId: "100:1"
      count: 2

set_multiple_annotations:
  description: Batch annotate multiple nodes in a single call. Each item can independently append or replace.
  toolset: annotations
  write: true
  access: create
  handler: bridge
  params:
    items:
      type: array
      required: true
      items:
        type: object
        fields:
          nodeId:
            type: string
            required: true
            description: Target node ID
          label:
            type: string
            required: true
            description: Annotation text
          replace:
            type: boolean
            description: If true, replaces existing annotations on this node
      description: List of annotation operations
  response:
    type: object
    fields:
      succeeded:
        type: number
        required: true
      failed:
        type: number
        required: true
      results:
        type: array
        required: true
        items: object
  examples:
    - succeeded: 2
      failed: 0
      results:
        - nodeId: "100:1"
          ok: true
        - nodeId: "100:2"
          ok: true

clear_annotations:
  description: Remove all figcraft lint annotations from specified nodes or the whole page.
  toolset: annotations
  write: true
  access: edit
  handler: bridge
  params:
    nodeIds:
      type: array
      items: string
      description: "Node IDs to clear (default: all on page)"
  response:
    type: object
    fields:
      cleared:
        type: number
        required: true
  examples:
    - cleared: 3

# ═══════════════════════════════════════════════════════════════
# TOOLSET: prototype (6 tools — 2 read + 4 write)
# ═══════════════════════════════════════════════════════════════

get_reactions:
  description: >-
    Get prototype reactions (interactions) on a specific node or all nodes on the current page.
    Returns trigger types and action types. Useful for analyzing prototype flows.
  toolset: prototype
  write: false
  handler: bridge
  params:
    nodeId:
      type: string
      description: Node ID to inspect; omit to scan the entire current page
  response:
    type: object
    fields:
      nodes:
        type: array
        required: true
        items:
          type: object
          fields:
            nodeId:
              type: string
              required: true
            nodeName:
              type: string
              required: true
            reactions:
              type: array
              required: true
              items: object
      count:
        type: number
        required: true
  examples:
    - nodes:
        - nodeId: "101:1"
          nodeName: "CTA Button"
          reactions:
            - trigger:
                type: "ON_CLICK"
              actions:
                - type: "NODE"
                  destinationId: "101:2"
      count: 1

analyze_prototype_flow:
  description: >-
    Analyze prototype interactions on the current page (or a subtree) and produce a structured flow graph.
    Returns: directed graph, entry points, dead ends, loops, trigger/action stats, Mermaid diagram, and Markdown docs.
  toolset: prototype
  write: false
  handler: custom
  params:
    nodeId:
      type: string
      description: Root node ID to analyze; omit to scan the entire current page
    format:
      type: enum
      values: [graph, mermaid, markdown, all]
      description: 'Output format (default: "all")'
  response:
    type: object
    fields:
      graph:
        type: object
      mermaid:
        type: string
      markdown:
        type: string
      message:
        type: string
      hint:
        type: string
  examples:
    - graph:
        stats:
          totalScreens: 2
          totalInteractions: 1
        nodes: []
        edges: []
      mermaid: "graph TD\n  A --> B"
      markdown: "# Prototype Flow Documentation"

add_reaction:
  description: >-
    Add a prototype reaction (interaction) to a node. Supports single node or batch mode via items array.
    Use this to wire up click/hover/press navigation between screens.
  toolset: prototype
  write: true
  access: create
  handler: bridge
  params:
    nodeId:
      type: string
      description: Target node ID (single mode)
    trigger:
      type: object
      description: >-
        Trigger definition (single mode). type is required: ON_CLICK, ON_HOVER, ON_PRESS, ON_DRAG,
        AFTER_TIMEOUT, MOUSE_ENTER, MOUSE_LEAVE, MOUSE_UP, MOUSE_DOWN.
        Optional: delay (ms), timeout (ms).
      fields:
        type:
          type: string
          required: true
        delay:
          type: number
        timeout:
          type: number
    actions:
      type: array
      description: >-
        Action definitions (single mode). Each action: type (NODE|BACK|CLOSE|URL),
        destinationId, navigation (NAVIGATE|SWAP|OVERLAY|SCROLL_TO|CHANGE_TO),
        transition ({type, duration, easing, direction}), url (for URL type).
      items:
        type: object
        fields:
          type:
            type: string
            required: true
          destinationId:
            type: string
          navigation:
            type: string
          url:
            type: string
          transition:
            type: object
            fields:
              type:
                type: string
                required: true
              duration:
                type: number
                required: true
              easing:
                type: object
              direction:
                type: string
          overlay:
            type: object
    items:
      type: array
      description: >-
        Batch mode: array of {nodeId, trigger, actions} objects.
        When provided, nodeId/trigger/actions params are ignored.
      items:
        type: object
        fields:
          nodeId:
            type: string
            required: true
          trigger:
            type: object
            required: true
          actions:
            type: array
            required: true
  response:
    type: object
    fields:
      ok:
        type: boolean
      reactionCount:
        type: number
      results:
        type: array
        items: object
  examples:
    - ok: true
      reactionCount: 1

remove_reaction:
  description: >-
    Remove prototype reactions from a node. Remove by index, by trigger type, or all at once.
  toolset: prototype
  write: true
  access: edit
  handler: bridge
  params:
    nodeId:
      type: string
      required: true
      description: Target node ID
    index:
      type: number
      description: Reaction index to remove (0-based)
    triggerType:
      type: string
      description: Remove all reactions with this trigger type (e.g. ON_CLICK)
    removeAll:
      type: boolean
      description: Remove all reactions from the node
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      removed:
        type: number
      remaining:
        type: number
      error:
        type: string
  examples:
    - ok: true
      removed: 1
      remaining: 0

set_reactions:
  description: >-
    Replace all prototype reactions on a node with a new set.
    Use this for full control over a node's interactions.
  toolset: prototype
  write: true
  access: edit
  handler: bridge
  params:
    nodeId:
      type: string
      required: true
      description: Target node ID
    reactions:
      type: array
      required: true
      description: >-
        Array of reaction specs. Each: {trigger: {type, delay?, timeout?}, actions: [{type, destinationId?, navigation?, transition?, url?}]}
      items:
        type: object
        fields:
          trigger:
            type: object
            required: true
            fields:
              type:
                type: string
                required: true
              delay:
                type: number
              timeout:
                type: number
          actions:
            type: array
            required: true
            items:
              type: object
              fields:
                type:
                  type: string
                  required: true
                destinationId:
                  type: string
                navigation:
                  type: string
                url:
                  type: string
                transition:
                  type: object
                overlay:
                  type: object
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      reactionCount:
        type: number
      error:
        type: string
  examples:
    - ok: true
      reactionCount: 2

connect_screens:
  description: >-
    Batch-connect screens with prototype interactions. Provide an array of connections,
    each specifying source node, destination node, trigger, and optional transition.
    After wiring, runs analyze_prototype_flow to validate the resulting flow graph
    and report dead ends or missing connections.
  toolset: prototype
  write: true
  access: create
  handler: custom
  params:
    connections:
      type: array
      required: true
      description: >-
        Array of screen connections. Each: {sourceNodeId, destinationNodeId,
        trigger (ON_CLICK default), navigation (NAVIGATE default), transition?}
      items:
        type: object
        fields:
          sourceNodeId:
            type: string
            required: true
          destinationNodeId:
            type: string
            required: true
          trigger:
            type: string
          navigation:
            type: string
          transition:
            type: object
    analyze:
      type: boolean
      description: "Run flow analysis after connecting (default: true)"
  response:
    type: object
    fields:
      connected:
        type: number
        required: true
      total:
        type: number
        required: true
      failures:
        type: array
        items: object
      flowAnalysis:
        type: object
      hint:
        type: string
  examples:
    - connected: 3
      total: 3
      flowAnalysis:
        totalScreens: 4
        totalInteractions: 3
        entryPoints: []
        deadEnds: []
        loops: 0

# ═══════════════════════════════════════════════════════════════
# TOOLSET: lint (4 tools)
# ═══════════════════════════════════════════════════════════════

lint_check:
  description: >-
    Run design lint rules on selected nodes or the current page.
    Checks colors, typography, spacing, border radius against tokens,
    and WCAG contrast/target-size compliance.
    TIP: For a one-step check+fix, use lint_fix_all instead.
  toolset: lint
  write: false
  handler: custom
  params:
    nodeIds:
      type: array
      items: string
      description: "Node IDs to lint (default: selection or page)"
    rules:
      type: array
      items: string
      description: "Rule names to run (default: all)"
    categories:
      type: array
      items: string
      description: "Rule categories to run: token, layout, naming, wcag, component"
    offset:
      type: number
      description: Pagination offset
    limit:
      type: number
      description: Pagination limit
    maxViolations:
      type: number
      description: Stop after collecting this many violations
    annotate:
      type: boolean
      description: Add annotations to violated nodes in Figma
    useStoredTokens:
      type: string
      description: Name of cached token set to use
    minSeverity:
      type: enum
      values: [error, warning, info, hint]
      description: "Minimum severity to include (default: all). Use 'warning' to hide hints/info."
  response:
    type: object
    fields:
      summary:
        type: object
        required: true
        fields:
          total:
            type: number
            required: true
          pass:
            type: number
            required: true
          violations:
            type: number
            required: true
      categories:
        type: array
        required: true
        items:
          type: object
          fields:
            rule:
              type: string
              required: true
            count:
              type: number
              required: true
            nodes:
              type: array
              required: true
              items: object
      pagination:
        type: object
      scope:
        type: object
  examples:
    - summary:
        total: 10
        pass: 8
        violations: 2
      categories:
        - rule: "default-name"
          count: 1
          nodes:
            - nodeId: "1:2"
              nodeName: "Frame 1"
              suggestion: "Rename the frame semantically."
              autoFixable: false
      scope:
        type: "page"
        count: 1
        pageName: "Page 1"

lint_fix:
  description: >-
    Auto-fix lint violations that are marked as autoFixable.
    Pass the violations array from a lint_check result.
  toolset: lint
  write: true
  access: edit
  handler: custom
  params:
    violations:
      type: array
      required: true
      items: object
      description: Violations to fix (from lint_check result)
  response:
    type: object
    fields:
      fixed:
        type: number
        required: true
      failed:
        type: number
        required: true
      errors:
        type: array
        required: true
        items:
          type: object
          fields:
            nodeId:
              type: string
              required: true
            error:
              type: string
              required: true
  examples:
    - fixed: 2
      failed: 0
      errors: []

lint_rules:
  description: List all available lint rules with descriptions.
  toolset: lint
  write: false
  handler: bridge
  params: {}
  response:
    type: object
    fields:
      rules:
        type: array
        required: true
        items:
          type: object
          fields:
            name:
              type: string
              required: true
            description:
              type: string
              required: true
            category:
              type: string
              required: true
            severity:
              type: string
              required: true
  examples:
    - rules:
        - name: "default-name"
          description: "Flags default Figma layer names."
          category: "naming"
          severity: "warning"

set_lint_ignore:
  description: >-
    Set lint rule exclusions on a specific node.
    Use to prevent specific lint rules from flagging a node (e.g. decorative elements that should not be treated as buttons).
    Pass rules as comma-separated names or "*" to exclude all rules. Pass empty string to clear.
  toolset: lint
  write: true
  access: edit
  handler: custom
  params:
    nodeId:
      type: string
      required: true
      description: Node ID to set lint exclusion on
    rules:
      type: string
      required: true
      description: 'Comma-separated rule names to ignore (e.g. "button-structure,wcag-target-size") or "*" for all. Empty string to clear.'
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
  examples:
    - ok: true

lint_stats:
  description: >-
    Show lint rule violation statistics for the current session.
    Tracks how often each rule triggers, helping identify which design patterns
    cause the most issues. Use to understand which rules need the most attention.
  toolset: lint
  write: false
  handler: custom
  params:
    sortBy:
      type: enum
      values: [frequency, name]
      description: "Sort order: frequency (most violations first, default) or name (alphabetical)"
  response:
    type: object
  examples:
    - sortBy: frequency
      description: "Returns session stats sorted by violation frequency"

verify_design:
  # harness: session=[record-verification]
  description: >-
    Compound verification: runs lint_fix_all + export_image in a single call.
    Returns lint report and optional screenshot. Use after creating UI to verify
    quality and get a visual preview in one round-trip.
  toolset: core
  write: true
  access: create
  handler: custom
  params:
    nodeId:
      type: string
      description: "Node ID to verify (default: current page)"
    fix:
      type: boolean
      description: "Auto-fix violations (default: true)"
    exportImage:
      type: boolean
      description: "Include screenshot (default: true)"
    exportScale:
      type: number
      description: "Image scale factor (default: 0.5)"
  response:
    type: object
  examples:
    - nodeId: "1:23"
      fix: true
      exportImage: true
      description: "Lint + fix + export screenshot in one call"

compliance_report:
  description: >-
    Generate a comprehensive design system compliance report.
    Combines lint results, component audit, and token coverage into a single report.
  toolset: lint
  write: false
  handler: custom
  params:
    nodeIds:
      type: array
      items: string
      description: "Scope to specific nodes (default: entire page)"
    useStoredTokens:
      type: string
      description: Name of cached token set for lint
  response:
    type: object
    fields:
      overallScore:
        type: number
        required: true
      lint:
        type: object
        required: true
      components:
        type: object
        required: true
  examples:
    - overallScore: 92
      lint:
        score: 95
        nodesChecked: 20
        passed: 19
        violations: 1
      components:
        score: 89
        total: 8
        issues: 1

# ═══════════════════════════════════════════════════════════════
# TOOLSET: auth (3 tools)
# ═══════════════════════════════════════════════════════════════

figma_login:
  description: >-
    Start Figma OAuth 2.0 login. Returns an authorization URL for the user to open in their browser.
    Requires FIGMA_CLIENT_ID env var.
  toolset: auth
  write: false
  handler: custom
  params: {}
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      url:
        type: string
        required: true
      message:
        type: string
        required: true
  examples:
    - ok: true
      url: "https://www.figma.com/oauth?client_id=example"
      message: "Please open this URL in your browser to authorize figcraft with Figma."

figma_logout:
  description: Clear stored Figma OAuth credentials.
  toolset: auth
  write: false
  handler: custom
  params: {}
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      message:
        type: string
        required: true
  examples:
    - ok: true
      message: "Figma credentials cleared."

figma_auth_status:
  description: >-
    Check current Figma authentication status (pat, oauth, or none).
    NOTE: Auth status is NOT required before most operations — the plugin handles auth.
  toolset: auth
  write: false
  handler: custom
  params: {}
  response:
    type: object
    fields:
      method:
        type: string
        required: true
      expiresAt:
        type: number
  examples:
    - method: "oauth"
      expiresAt: 1893456000000

# ═══════════════════════════════════════════════════════════════
# TOOLSET: pages (3 tools)
# ═══════════════════════════════════════════════════════════════

create_page:
  description: Create a new page in the document.
  toolset: pages
  write: true
  access: create
  handler: bridge
  params:
    name:
      type: string
      required: true
      description: Page name
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
  examples:
    - id: "0:3"
      name: "Marketing"

rename_page:
  description: Rename an existing page.
  toolset: pages
  write: true
  access: edit
  handler: bridge
  params:
    pageId:
      type: string
      required: true
      description: Page ID
    name:
      type: string
      required: true
      description: New page name
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      id:
        type: string
      name:
        type: string
      error:
        type: string
  examples:
    - ok: true
      id: "0:3"
      name: "Marketing"

delete_node:
  description: Delete a node by ID.
  toolset: pages
  write: true
  access: edit
  handler: bridge
  params:
    nodeId:
      type: string
      required: true
      description: Node ID to delete
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      error:
        type: string
  examples:
    - ok: true

# ═══════════════════════════════════════════════════════════════
# TOOLSET: staging (4 tools)
# ═══════════════════════════════════════════════════════════════

stage_changes:
  description: >-
    Mark nodes as staged (preview). Staged nodes are shown at reduced opacity with an annotation.
    Use commit_changes to finalize or discard_changes to remove them.
  toolset: staging
  write: true
  access: edit
  handler: custom
  params:
    nodeIds:
      type: array
      items: string
      required: true
      description: Node IDs to stage
  response:
    type: object
    fields:
      staged:
        type: number
        required: true
      errors:
        type: array
        items: object
      stagedNodeIds:
        type: array
        items: string
  examples:
    - staged: 3
      errors: []
      stagedNodeIds: ["1:23", "1:24", "1:25"]

commit_changes:
  description: >-
    Finalize staged nodes — restores original opacity and removes staging annotations.
    If no nodeIds provided, commits all currently staged nodes.
  toolset: staging
  write: true
  access: edit
  handler: custom
  params:
    nodeIds:
      type: array
      items: string
      description: "Node IDs to commit (default: all staged)"
  response:
    type: object
    fields:
      committed:
        type: number
        required: true
      errors:
        type: array
        items: object
      remainingStaged:
        type: array
        items: string
  examples:
    - committed: 3
      errors: []
      remainingStaged: []

discard_changes:
  description: >-
    Remove staged nodes from the canvas entirely.
    If no nodeIds provided, discards all currently staged nodes.
  toolset: staging
  write: true
  access: edit
  handler: custom
  params:
    nodeIds:
      type: array
      items: string
      description: "Node IDs to discard (default: all staged)"
  response:
    type: object
    fields:
      discarded:
        type: number
        required: true
      errors:
        type: array
        items: object
      remainingStaged:
        type: array
        items: string
  examples:
    - discarded: 2
      errors: []
      remainingStaged: ["1:25"]

list_staged:
  description: List all currently staged nodes.
  toolset: staging
  write: false
  handler: custom
  response:
    type: object
    fields:
      staged:
        type: array
        items: object
        required: true
      count:
        type: number
        required: true
  examples:
    - staged:
        - nodeId: "1:23"
          name: "Login Screen"
      count: 1

# ═══════════════════════════════════════════════════════════════
# ENDPOINT TOOLS (resource-oriented API with method dispatch)
# ═══════════════════════════════════════════════════════════════

nodes:
  description: >-
    Node operations — get, list, update, delete.
  toolset: core
  handler: endpoint
  methods:
    get:
      description: Get detailed node info by ID (supports Figma URLs). Auto-degrades large nodes to prevent response_too_large.
      maps_to: get_node_info
      write: false
      params:
        nodeId:
          type: string
          required: true
          description: 'Node ID or Figma URL'
        detail:
          type: enum
          values: [summary, standard, full]
          description: 'Detail level (default: full). Use summary for tree browsing, standard for inspection, full for editing. Auto-degrades for large nodes.'
        maxDepth:
          type: number
          description: 'Maximum tree depth to traverse. Deep children auto-degrade to summary. Use 1-2 for large component sets.'
      response:
        type: object
        fields:
          id:
            type: string
            required: true
          name:
            type: string
            required: true
          type:
            type: string
            required: true
          width:
            type: number
          height:
            type: number
          children:
            type: array
            items:
              type: object
              fields:
                id:
                  type: string
                  required: true
                name:
                  type: string
                  required: true
                type:
                  type: string
                  required: true
      examples:
        - id: "1:23"
          name: "Auth Screen"
          type: "FRAME"
          width: 402
          height: 874
          children:
            - id: "1:24"
              name: "Login Form"
              type: "FRAME"
    get_batch:
      description: Get multiple nodes in a single request (reduces round-trips)
      maps_to: get_node_info_batch
      write: false
      params:
        nodeIds:
          type: array
          items: string
          required: true
          description: 'Array of node IDs to fetch'
        detail:
          type: enum
          values: [summary, standard, full]
          description: 'Detail level (default: standard)'
      response:
        type: object
        fields:
          count:
            type: number
            required: true
          nodes:
            type: array
            required: true
      examples:
        - nodeIds: ["1:1", "1:2", "1:3"]
          detail: standard
    list:
      description: Search nodes by name, optionally filter by type
      maps_to: search_nodes
      write: false
      response:
        type: object
        fields:
          count:
            type: number
            required: true
          nodes:
            type: array
            required: true
            items:
              type: object
              fields:
                id:
                  type: string
                  required: true
                name:
                  type: string
                  required: true
                type:
                  type: string
                  required: true
          _error:
            type: string
          _sizeKB:
            type: number
          _limitKB:
            type: number
          method:
            type: string
          warning:
            type: string
          hints:
            type: array
            items: string
          _preview:
            type: string
      examples:
        - count: 1
          nodes:
            - id: "1:10"
              name: "Login Button"
              type: "FRAME"
      params:
        query:
          type: string
          required: true
          description: Search query
        types:
          type: array
          items: string
          description: >-
            Filter by SceneNode type (FRAME, TEXT, RECTANGLE, COMPONENT, INSTANCE,
            COMPONENT_SET, GROUP, VECTOR, ELLIPSE, LINE, STAR, POLYGON,
            BOOLEAN_OPERATION, SECTION, SLICE). NOT for VARIABLE / STYLE / library
            components — those live on other endpoints:
            variables_ep({method:"list"}) for variables,
            styles_ep({method:"list"}) for paint/text/effect styles,
            components({method:"list_library"}) for imported library components.
        limit:
          type: number
          description: Max results (default 50)
    update:
      description: >-
        Update properties on one or more nodes. Uses 5-phase ordered execution:
        (1) simple props (name, x, y, opacity, visible, layoutMode, padding, itemSpacing, alignment, clipsContent, layoutPositioning, gridRowCount, gridColumnCount, gridRowGap, gridColumnGap)
        → (2) fills/strokes/corners/effects
        → (3) layout sizing (layoutSizingHorizontal/Vertical)
        → (4) resize (width/height)
        → (5) text props (fontSize, fontName, textDecoration, textCase, textAlign, paragraphSpacing).
        Safe to send layoutMode + width + layoutSizing in the same patch — ordering is handled internally.
        ⚠️ fillVariableName/strokeVariableName/fontColorVariableName are create_frame aliases — NOT supported here.
        For post-creation variable binding use variables_ep(method:"set_binding") or variables_ep(method:"batch_bind").
        Strokes require Figma Paint format: [{type:"SOLID", color:{r:0,g:0,b:0}}], not hex strings.
      maps_to: patch_nodes
      write: true
      access: edit
      response:
        type: object
        fields:
          results:
            type: array
            required: true
            items:
              type: object
              fields:
                nodeId:
                  type: string
                  required: true
                ok:
                  type: boolean
                  required: true
                error:
                  type: string
      examples:
        - results:
            - nodeId: "30:1"
              ok: true
      params:
        patches:
          type: array
          required: true
          items:
            type: object
            fields:
              nodeId:
                type: string
                required: true
              props:
                type: record
                required: true
                valueType: unknown
        strict:
          type: boolean
          description: "When true, reject the entire patch if any property name is not recognized. Default: false (unknown props reported in _unknownProps but patch succeeds)."
    delete:
      description: Delete nodes by ID
      maps_to: delete_nodes
      write: true
      access: edit
      response:
        type: object
        fields:
          results:
            type: array
            required: true
            items:
              type: object
              fields:
                nodeId:
                  type: string
                  required: true
                ok:
                  type: boolean
                  required: true
                error:
                  type: string
      examples:
        - results:
            - nodeId: "30:1"
              ok: true
      params:
        nodeIds:
          type: array
          required: true
          items: string
    clone:
      description: Duplicate nodes with optional reparenting and repositioning
      maps_to: clone_nodes
      write: true
      access: create
      response:
        type: object
        fields:
          results:
            type: array
            required: true
            items:
              type: object
              fields:
                id:
                  type: string
                  required: true
                ok:
                  type: boolean
                  required: true
                error:
                  type: string
      examples:
        - results:
            - id: "50:1"
              ok: true
      params:
        items:
          type: array
          required: true
          description: "Array of {id, name?, parentId?, x?, y?}"
          items:
            type: object
            fields:
              id:
                type: string
                required: true
                description: "Node ID to clone"
              name:
                type: string
                description: "Rename the clone"
              parentId:
                type: string
                description: "Target parent (default: same parent)"
              x:
                type: number
                description: "X position"
              y:
                type: number
                description: "Y position"
    reparent:
      description: Move nodes into a new parent container
      maps_to: reparent_nodes
      write: true
      access: edit
      response:
        type: object
        fields:
          results:
            type: array
            required: true
            items:
              type: object
              fields:
                id:
                  type: string
                  required: true
                ok:
                  type: boolean
                  required: true
                error:
                  type: string
      examples:
        - results:
            - id: "30:1"
              ok: true
      params:
        items:
          type: array
          required: true
          description: "Array of {id, parentId, index?}"
          items:
            type: object
            fields:
              id:
                type: string
                required: true
              parentId:
                type: string
                required: true
                description: "New parent node ID"
              index:
                type: number
                description: "Insert position (default: append at end)"

text:
  description: >-
    Text node operations — update text content and style ranges.
  toolset: core
  handler: endpoint
  methods:
    set_content:
      description: Update the text content of an existing text node
      maps_to: set_text_content
      write: true
      access: edit
      response:
        type: object
        fields:
          ok:
            type: boolean
            required: true
          error:
            type: string
      examples:
        - ok: true
      params:
        nodeId:
          type: string
          required: true
          description: Text node ID
        content:
          type: string
          required: true
          description: New text content
    set_range:
      description: >-
        Apply styling to character ranges within a text node.
        Supports fontSize, fontName, fills, insert, delete, letterSpacing, lineHeight, textDecoration, textCase.
        Operations are applied sequentially — character indices may shift after insert/delete.
      maps_to: set_text_range
      write: true
      access: edit
      params:
        nodeId:
          type: string
          required: true
          description: Text node ID
        operations:
          type: array
          required: true
          description: "Array of range operations, applied sequentially"
          items:
            type: object
            fields:
              type:
                type: string
                required: true
                description: "Operation type: fontSize, fontName, fills, insert, delete, letterSpacing, lineHeight, textDecoration, textCase"
              start:
                type: number
                required: true
                description: "Start character index (0-based)"
              end:
                type: number
                description: "End character index (exclusive). Required for all types except insert."
              value:
                type: unknown
                required: true
                description: >-
                  Value for the operation.
                  fontSize: number. fontName: {family, style}.
                  fills: Paint[] (Figma fill array, colors 0-1 range).
                  insert: string (text to insert at start).
                  delete: true (deletes characters from start to end).
                  letterSpacing: {value, unit}. lineHeight: {value, unit}.
                  textDecoration: "UNDERLINE"|"STRIKETHROUGH"|"NONE".
                  textCase: "UPPER"|"LOWER"|"TITLE"|"ORIGINAL".
      response:
        type: object
        fields:
          ok:
            type: boolean
            required: true
          characterCount:
            type: number
          results:
            type: array
            items:
              type: object
              fields:
                index:
                  type: number
                ok:
                  type: boolean
                error:
                  type: string
      examples:
        - ok: true
          characterCount: 42
          results:
            - index: 0
              ok: true

components:
  description: >-
    Component operations — list, get, and inspect properties.
    Core methods are always available. Advanced methods require load_toolset("components-advanced").
  toolset: core
  handler: endpoint
  methods:
    list:
      description: List all components on the current page
      maps_to: list_components
      write: false
      response:
        type: object
        fields:
          count:
            type: number
            required: true
          components:
            type: array
            required: true
            items:
              type: object
              fields:
                id:
                  type: string
                  required: true
                name:
                  type: string
                  required: true
                description:
                  type: string
                key:
                  type: string
      examples:
        - count: 1
          components:
            - id: "12:1"
              name: "Button / Primary"
              key: "button-primary-key"
      params: {}
    list_library:
      description: List published components from a library file via REST API
      maps_to: list_library_components
      write: false
      response:
        type: object
        fields:
          count:
            type: number
            required: true
          components:
            type: array
            required: true
            items:
              type: object
              fields:
                key:
                  type: string
                  required: true
                name:
                  type: string
                  required: true
                description:
                  type: string
      examples:
        - count: 1
          components:
            - key: "library-button-primary"
              name: "Button / Primary"
              description: "Primary CTA button"
      params:
        fileKey:
          type: string
          description: Figma file key
    get:
      description: Get full details of a component by node ID
      maps_to: get_component
      write: false
      response:
        type: object
        fields:
          id:
            type: string
            required: true
          name:
            type: string
            required: true
          type:
            type: string
            required: true
          description:
            type: string
          key:
            type: string
          componentPropertyDefinitions:
            type: record
            valueType: unknown
      examples:
        - id: "12:1"
          name: "Button / Primary"
          type: "COMPONENT"
          description: "Main call-to-action button"
          key: "button-primary-key"
      params:
        nodeId:
          type: string
          required: true
          description: Component node ID
    list_properties:
      description: List all properties and variant options of a component
      maps_to: list_component_properties
      write: false
      response:
        type: object
        fields:
          properties:
            type: array
            required: true
            items:
              type: object
              fields:
                key:
                  type: string
                  required: true
                type:
                  type: string
                  required: true
                defaultValue:
                  type: unknown
                variantOptions:
                  type: array
                  items: string
      examples:
        - properties:
            - key: "State"
              type: "VARIANT"
              defaultValue: "Default"
              variantOptions: ["Default", "Pressed"]
      params:
        nodeId:
          type: string
          required: true
          description: Component or ComponentSet node ID

variables_ep:
  description: >-
    Variable operations — list, get, create, update, delete variables, collections, and modes.
    Efficient patterns: list returns all fields (name, scopes, codeSyntax, valuesByMode) — avoid individual get calls.
    Use batch_update to modify multiple variables in one call (supports name, description, scopes, codeSyntax).
  toolset: core
  handler: endpoint
  methods:
    list:
      description: List all local Figma variables
      maps_to: list_variables
      write: false
      response:
        type: object
        fields:
          count:
            type: number
            required: true
          variables:
            type: array
            required: true
            items:
              type: object
              fields:
                id:
                  type: string
                  required: true
                name:
                  type: string
                  required: true
                resolvedType:
                  type: string
                  required: true
                description:
                  type: string
                collectionId:
                  type: string
                  required: true
                collectionName:
                  type: string
                  required: true
                scopes:
                  type: array
                  required: true
                  items: string
                codeSyntax:
                  type: object
                  description: 'Code syntax per platform {WEB, ANDROID, iOS}. Present only when set.'
                valuesByMode:
                  type: record
                  required: true
                  valueType: unknown
      examples:
        - count: 1
          variables:
            - id: "VariableID:1:12"
              name: "color/brand/primary"
              resolvedType: "COLOR"
              description: "Primary brand color"
              collectionId: "VariableCollectionId:1:2"
              collectionName: "Primitives"
              scopes: ["ALL_FILLS"]
              valuesByMode:
                Default: "#7c3aed"
      params:
        collectionId:
          type: string
          description: Filter by collection ID
        type:
          type: string
          description: 'Filter by type: COLOR, FLOAT, STRING, BOOLEAN'
    get:
      description: Get detailed info for a specific variable
      maps_to: get_variable
      write: false
      response:
        type: object
        fields:
          id:
            type: string
            required: true
          name:
            type: string
            required: true
          resolvedType:
            type: string
            required: true
          description:
            type: string
          collectionId:
            type: string
            required: true
          collectionName:
            type: string
          scopes:
            type: array
            required: true
            items: string
          codeSyntax:
            type: unknown
          valuesByMode:
            type: record
            required: true
            valueType: unknown
          error:
            type: string
      examples:
        - id: "VariableID:1:12"
          name: "color/brand/primary"
          resolvedType: "COLOR"
          description: "Primary brand color"
          collectionId: "VariableCollectionId:1:2"
          collectionName: "Primitives"
          scopes: ["ALL_FILLS"]
          codeSyntax:
            WEB: "var(--color-brand-primary)"
          valuesByMode:
            Default: "#7c3aed"
      params:
        variableId:
          type: string
          required: true
    list_collections:
      description: List all local variable collections
      maps_to: list_collections
      write: false
      response:
        type: array
        items:
          type: object
          fields:
            id:
              type: string
              required: true
            name:
              type: string
              required: true
            modes:
              type: array
              required: true
              items:
                type: object
                fields:
                  modeId:
                    type: string
                    required: true
                  name:
                    type: string
                    required: true
            variableCount:
              type: number
              required: true
      examples:
        - - id: "VariableCollectionId:1:2"
            name: "Primitives"
            modes:
              - modeId: "1:0"
                name: "Default"
            variableCount: 12
      params: {}
    get_bindings:
      description: Get all variable bindings on a node
      maps_to: get_node_variables
      write: false
      response:
        type: object
        fields:
          nodeId:
            type: string
            required: true
          bindings:
            type: object
            required: true
          error:
            type: string
      examples:
        - nodeId: "1:24"
          bindings:
            fills:
              - variableId: "VariableID:1:12"
                variableName: "color/brand/primary"
                collectionId: "VariableCollectionId:1:2"
      params:
        nodeId:
          type: string
          required: true
    set_binding:
      description: Bind a variable to a node property
      maps_to: set_variable_binding
      write: true
      access: edit
      response:
        type: object
        fields:
          ok:
            type: boolean
            required: true
          error:
            type: string
      examples:
        - ok: true
      params:
        nodeId:
          type: string
          required: true
        field:
          type: string
          required: true
        variableId:
          type: string
          required: true
    create:
      description: Create a new Figma variable
      maps_to: create_variable
      write: true
      access: create
      response:
        type: object
        fields:
          id:
            type: string
            required: true
          name:
            type: string
            required: true
          resolvedType:
            type: string
            required: true
          error:
            type: string
      examples:
        - id: "VariableID:1:30"
          name: "spacing/md"
          resolvedType: "FLOAT"
      params:
        name:
          type: string
          required: true
        collectionId:
          type: string
          required: true
        resolvedType:
          type: enum
          values: [COLOR, FLOAT, STRING, BOOLEAN]
          required: true
        value:
          type: unknown
        modeId:
          type: string
        description:
          type: string
        scopes:
          type: array
          items: string
    update:
      description: Update an existing variable
      maps_to: update_variable
      write: true
      access: edit
      response:
        type: object
        fields:
          ok:
            type: boolean
            required: true
          id:
            type: string
          error:
            type: string
      examples:
        - ok: true
          id: "VariableID:1:30"
      params:
        variableId:
          type: string
          required: true
        name:
          type: string
        description:
          type: string
        scopes:
          type: array
          items: string
        value:
          type: unknown
        modeId:
          type: string
    batch_update:
      description: >-
        Update multiple variables in one call. Each item can set name, description, scopes, and/or value.
        Single-item failures do not block the batch.
      maps_to: batch_update_variables
      write: true
      access: edit
      response:
        type: object
        fields:
          updated:
            type: number
            required: true
          total:
            type: number
            required: true
          results:
            type: array
            required: true
      examples:
        - updated: 3
          total: 3
          results: [{ variableId: "VariableID:1:30", ok: true }]
      params:
        updates:
          type: array
          required: true
          description: >-
            Array of variable updates. Each: { variableId (required), name?, description?, scopes?, value?, modeId?, codeSyntax?: {WEB?, ANDROID?, iOS?} }
    delete:
      description: Delete a variable by ID
      maps_to: delete_variable
      write: true
      access: edit
      response:
        type: object
        fields:
          ok:
            type: boolean
            required: true
          error:
            type: string
      examples:
        - ok: true
      params:
        variableId:
          type: string
          required: true
    create_collection:
      description: Create a new variable collection
      maps_to: create_collection
      write: true
      access: create
      response:
        type: object
        fields:
          id:
            type: string
            required: true
          name:
            type: string
            required: true
          modes:
            type: array
            required: true
            items:
              type: object
              fields:
                modeId:
                  type: string
                  required: true
                name:
                  type: string
                  required: true
      examples:
        - id: "VariableCollectionId:1:2"
          name: "Semantic"
          modes:
            - modeId: "1:0"
              name: "Mode 1"
      params:
        name:
          type: string
          required: true
    delete_collection:
      description: Delete a variable collection
      maps_to: delete_collection
      write: true
      access: edit
      response:
        type: object
        fields:
          ok:
            type: boolean
            required: true
          error:
            type: string
      examples:
        - ok: true
      params:
        collectionId:
          type: string
          required: true
    batch_create:
      description: Create multiple variables at once
      maps_to: batch_create_variables
      write: true
      access: create
      response:
        type: object
        fields:
          created:
            type: number
            required: true
          skipped:
            type: number
            required: true
          failed:
            type: number
            required: true
          errors:
            type: array
            required: true
            items:
              type: object
              fields:
                name:
                  type: string
                  required: true
                error:
                  type: string
                  required: true
          collectionId:
            type: string
            required: true
      examples:
        - created: 2
          skipped: 0
          failed: 0
          errors: []
          collectionId: "VariableCollectionId:1:2"
      params:
        collectionName:
          type: string
          required: true
        modeName:
          type: string
        variables:
          type: array
          required: true
          items: object
    export:
      description: Export all Figma variables as DTCG-compatible flat list
      maps_to: export_variables
      write: false
      response:
        type: object
        fields:
          count:
            type: number
            required: true
          variables:
            type: array
            required: true
            items:
              type: object
              fields:
                path:
                  type: string
                  required: true
                type:
                  type: string
                  required: true
                valuesByMode:
                  type: record
                  required: true
                  valueType: unknown
                description:
                  type: string
                scopes:
                  type: array
                  items: string
                aliasOf:
                  type: record
                  valueType: string
      examples:
        - count: 1
          variables:
            - path: "color.brand.primary"
              type: "color"
              valuesByMode:
                Default: "#7c3aed"
              description: "Primary brand color"
              scopes: ["ALL_FILLS"]
      params:
        collectionId:
          type: string
    set_code_syntax:
      description: Set code syntax on a variable for Dev Mode (WEB/ANDROID/iOS)
      maps_to: set_variable_code_syntax
      write: true
      access: edit
      response:
        type: object
        fields:
          ok:
            type: boolean
            required: true
          variableId:
            type: string
            required: true
          variableName:
            type: string
            required: true
          applied:
            type: array
            items: string
      examples:
        - ok: true
          variableId: "VariableID:1:30"
          variableName: "color/bg/primary"
          applied: ["WEB", "iOS"]
      params:
        variableId:
          type: string
          required: true
        syntax:
          type: record
          required: true
          valueType: string
    batch_bind:
      description: Bind variables to multiple node properties in one call
      maps_to: batch_set_variable_binding
      write: true
      access: edit
      response:
        type: object
        fields:
          succeeded:
            type: number
            required: true
          failed:
            type: number
            required: true
          total:
            type: number
            required: true
          errors:
            type: array
            items: object
      examples:
        - succeeded: 108
          failed: 0
          total: 108
      params:
        bindings:
          type: array
          required: true
          items: object
    set_values_multi_mode:
      description: Set a variable's value across multiple modes in one call
      maps_to: set_variable_values_multi_mode
      write: true
      access: edit
      response:
        type: object
        fields:
          ok:
            type: boolean
            required: true
          variableId:
            type: string
            required: true
          variableName:
            type: string
            required: true
          set:
            type: number
            required: true
          total:
            type: number
            required: true
          errors:
            type: array
            items: object
      examples:
        - ok: true
          variableId: "VariableID:1:30"
          variableName: "color/bg/primary"
          set: 2
          total: 2
      params:
        variableId:
          type: string
          required: true
        valuesByMode:
          type: record
          required: true
          valueType: unknown
    extend_collection:
      description: >-
        Create an extended variable collection for multi-brand theming (Enterprise only).
        The extension inherits all modes and variables from the parent collection.
        Override variable values in the extension to create brand-specific themes.
      maps_to: extend_collection
      write: true
      access: create
      response:
        type: object
        fields:
          id:
            type: string
            required: true
          name:
            type: string
            required: true
          isExtension:
            type: boolean
            required: true
          rootVariableCollectionId:
            type: string
            required: true
          modes:
            type: array
            required: true
            items: object
          variableCount:
            type: number
            required: true
      examples:
        - id: "VariableCollectionId:2:1"
          name: "Brand A"
          isExtension: true
          rootVariableCollectionId: "VariableCollectionId:1:1"
          modes:
            - modeId: "2:0"
              name: "Light"
          variableCount: 50
      params:
        collectionId:
          type: string
          description: 'Local collection ID to extend (use for local collections)'
        collectionKey:
          type: string
          description: 'Collection key to extend (use for library collections)'
        name:
          type: string
          required: true
          description: 'Name for the extended collection'
    get_overrides:
      description: Get all variable overrides in an extended collection
      maps_to: get_collection_overrides
      write: false
      response:
        type: object
        fields:
          collectionId:
            type: string
            required: true
          collectionName:
            type: string
            required: true
          rootVariableCollectionId:
            type: string
            required: true
          overrideCount:
            type: number
            required: true
          overrides:
            type: array
            required: true
            items: object
      examples:
        - collectionId: "VariableCollectionId:2:1"
          collectionName: "Brand A"
          rootVariableCollectionId: "VariableCollectionId:1:1"
          overrideCount: 5
          overrides: []
      params:
        collectionId:
          type: string
          required: true
          description: 'Extended collection ID'
    remove_override:
      description: Remove all overrides for a variable in an extended collection
      maps_to: remove_collection_override
      write: true
      access: edit
      response:
        type: object
        fields:
          ok:
            type: boolean
            required: true
      examples:
        - ok: true
      params:
        collectionId:
          type: string
          required: true
          description: 'Extended collection ID'
        variableId:
          type: string
          required: true
          description: 'Variable ID to remove overrides for'

