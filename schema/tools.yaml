# FigCraft Tool Schema — Single Source of Truth
#
# Defines ALL tools with metadata (toolset, write flag, access level, description, params).
# Tools with `handler: bridge` get auto-generated TypeScript (Zod + bridge.request).
# Tools with `handler: custom` keep their hand-written TypeScript but still
# contribute to the generated registry (CORE_TOOLS, TOOLSETS, WRITE_TOOLS).
#
# Run: npm run schema
#
# Access levels (3-tier access control via FIGCRAFT_ACCESS env var):
#   read   — read-only tools (write: false). Always allowed.
#   create — tools that add NEW content without modifying existing nodes.
#            Allowed when FIGCRAFT_ACCESS=create or edit (default).
#   edit   — tools that modify or delete EXISTING content.
#            Allowed only when FIGCRAFT_ACCESS=edit (default).
#
# The `access` field is only meaningful when `write: true`.
# If `write: true` and `access` is omitted, defaults to `edit` (most restrictive).
#
# Param types: string, number, boolean, enum, array, object, record, unknown, tuple, ref
#   enum   → values: [A, B, C]
#   array  → items: { type: string }  (or shorthand items: string)
#   object → fields: { key: { type: ..., description: ... } }
#   record → valueType: unknown
#   tuple  → items: [number, number]
#   ref    → ref: shared_definition_name

# ─── Harness Pipeline (global rules) ───
# The following harness rules apply to ALL tools via wildcard matching:
#   enrichments: [verification-debt-remind, response-size-guard]
#   recovery: [connection-lost, node-deleted, response-too-large]
#   session: [error-journal]
# Per-tool harness rules are declared as comments on each tool definition below.
# Rule implementations: packages/core-mcp/src/harness/rules/
# Registration: packages/core-mcp/src/harness/index.ts

# ─── Reusable param groups (YAML anchors) ───
# Use <<: *anchor_name in tool params to merge shared param definitions.
# For multiple merges: <<: [*anchor_a, *anchor_b]

_mixins:
  shape_fill: &shape_fill
    fill:
      type: string
      description: "Fill color as hex (e.g. '#FFFFFF') — auto-binds to matching token"
    fillVariableName:
      type: string
      description: "Bind fill to a color variable by name (e.g. 'bg/primary')"
    fillStyleName:
      type: string
      description: "Apply paint style by name (e.g. 'Surface/Primary')"
  shape_stroke: &shape_stroke
    strokeColor:
      type: string
      description: "Stroke color hex — auto-binds to matching variable/style"
    strokeVariableName:
      type: string
      description: "Bind stroke to a color variable by name"
    strokeWeight:
      type: number
      description: "Stroke weight (default: 1)"
  shape_appearance: &shape_appearance
    opacity:
      type: number
      description: "Opacity 0-1"
    rotation:
      type: number
      description: Rotation in degrees
    visible:
      type: boolean
      description: "Show/hide (default: true)"
  shape_position: &shape_position
    x:
      type: number
      description: X position
    y:
      type: number
      description: Y position
    width:
      type: number
      description: "Width (default: 100)"
    height:
      type: number
      description: "Height (default: 100)"
  node_response: &node_response
    id:
      type: string
      required: true
    name:
      type: string
      required: true
    type:
      type: string
      required: true
    width:
      type: number
      required: true
    height:
      type: number
      required: true
    visible:
      type: boolean
      required: true

_param_definitions:
  # node_role, node_type, node_spec removed — creation tools removed

# ═══════════════════════════════════════════════════════════════
# CORE TOOLS (~33 always enabled)
# ═══════════════════════════════════════════════════════════════

# ─── Connection & Mode ───

ping:
  description: >-
    Test connectivity to the Figma plugin through the WebSocket relay.
    Returns connection status, round-trip latency, and version check.
  toolset: core
  write: false
  handler: custom
  params:
    channel:
      type: string
      description: Channel ID (defaults to current channel)
  response:
    type: object
    fields:
      connected:
        type: boolean
        required: true
      latency:
        type: string
      serverVersion:
        type: string
      pluginVersion:
        type: string
      versionWarning:
        type: string
      error:
        type: string
      _hint:
        type: string
      result:
        type: record
        valueType: unknown
  examples:
    - connected: true
      latency: "18ms"
      serverVersion: "0.1.0"
      pluginVersion: "0.1.0"
      _hint: "Connection OK. Proceed with your task — do NOT stop here."
      result:
        ok: true
        channel: "design-1"
    - connected: false
      error: "Cannot reach the FigCraft relay server."
      diagnosis:
        stage: "relay_not_running"
        steps:
          - "The relay server is not running or not reachable."
          - "Ensure FigCraft MCP is running in your IDE."
          - "If already running, try restarting the IDE or the Figma plugin."

get_mode:
  description: >-
    Get current mode, selected library, design context, and library components.
    Also verifies plugin connectivity (built-in ping).
    IMPORTANT: Call this before creating elements to get available design tokens and components.
    Returns { connected, mode, selectedLibrary, designContext, libraryComponents? }.
    designContext contains grouped tokens (text/surface/fill/border) and defaults mapping.
    libraryComponents (when library file URL is configured) lists available component sets with variants grouped by set, plus standalone components.
  toolset: core
  write: false
  handler: custom
  params: {}
  response:
    type: object
    fields:
      connected:
        type: boolean
        required: true
      latency:
        type: string
      versionWarning:
        type: string
      mode:
        type: enum
        values: [library, spec]
      selectedLibrary:
        type: string
      designContext:
        type: record
        valueType: unknown
      libraryComponents:
        type: object
        fields:
          componentSets:
            type: array
            items:
              type: object
              fields:
                key:
                  type: string
                  required: true
                name:
                  type: string
                  required: true
                description:
                  type: string
                  required: true
                variants:
                  type: array
                  items:
                    type: object
                    fields:
                      key:
                        type: string
                        required: true
                      name:
                        type: string
                        required: true
                      properties:
                        type: record
                        valueType: string
          standalone:
            type: array
            items:
              type: object
              fields:
                key:
                  type: string
                  required: true
                name:
                  type: string
                  required: true
                description:
                  type: string
                  required: true
      libraryComponentsError:
        type: string
      libraryComponentsUnavailable:
        type: boolean
      _hint:
        type: string
      error:
        type: string
  examples:
    - connected: true
      latency: "24ms"
      mode: "library"
      selectedLibrary: "Acme DS"
      designContext:
        source: "library"
        collections:
          - name: "Color"
            key: "VariableCollectionId:1:2"
      libraryComponents:
        componentSets:
          - key: "component-set-key"
            name: "Button"
            description: "Primary CTA button"
            variants:
              - key: "variant-key-1"
                name: "Type=Primary, Size=Medium, State=Default"
                properties:
                  Type: "Primary"
                  Size: "Medium"
                  State: "Default"
        standalone:
          - key: "standalone-key"
            name: "Logo"
            description: "Brand logo"
      _hint: "Library mode — tokens and components loaded. NEXT: Reply to user to gather missing preferences (UI type, platform). Do NOT call any more tools. If user provided everything, reply with design proposal instead."
    - connected: false
      error: "Relay is running, but no Figma plugin is connected."
      diagnosis:
        stage: "plugin_not_open"
        steps:
          - "Open your Figma file in the Figma desktop app."
          - "Run the FigCraft plugin (Plugins → FigCraft)."
          - "Wait for the plugin UI to show a channel ID, then try again."

set_mode:
  # harness: enrichments=[next-steps]
  description: >-
    Switch operation mode between "library" (Figma shared library)
    and "spec" (DTCG design spec documents). Also updates the Plugin UI toggle.
    In library mode, optionally specify which library to use.
  toolset: core
  write: false
  handler: custom
  params:
    mode:
      type: enum
      values: [library, spec]
      required: true
      description: Operation mode to switch to
    library:
      type: string
      description: 'Library name to use in library mode (from list_library_collections libraryName). Use "__local__" to select current file local styles/variables.'
  response:
    type: object
    fields:
      mode:
        type: enum
        values: [library, spec]
        required: true
      description:
        type: string
        required: true
  examples:
    - mode: "library"
      description: "Using Figma shared library as token source. Lint checks variable/style bindings."

get_design_guidelines:
  description: >-
    Get design quality guidelines for the current mode. Returns Design Guardian rules (library mode)
    or Design Creator rules (no library). Use this to understand design best practices before creating elements.
    Optionally specify a category to get focused rules.
  toolset: core
  write: false
  handler: custom
  params:
    category:
      type: enum
      values: [all, color, typography, spacing, layout, composition, content, accessibility, buttons, inputs]
      description: 'Rule category to return (default: "all")'
  response:
    type: object
    fields:
      mode:
        type: string
        required: true
      selectedLibrary:
        type: string
      category:
        type: string
      guidelines:
        type: string
        required: true
  examples:
    - mode: "Design Guardian (Library Mode)"
      selectedLibrary: "My Design System"
      guidelines: "# Design Guardian — Library Mode Rules..."

get_creation_guide:
  description: >-
    Get structural creation guidance by topic. Returns layout rules, multi-screen architecture,
    batching strategy, tool behavior patterns, Opinion Engine documentation, or UI type-specific
    templates with structure, key decisions, pitfalls, and tone variants.
    Use before creating complex UI to understand best practices.
  toolset: core
  write: false
  handler: custom
  params:
    topic:
      type: enum
      values: [layout, multi-screen, batching, tool-behavior, opinion-engine, ui-patterns, responsive, content-states, iconography, platform-ios, platform-android]
      required: true
      description: >-
        Topic: layout (structural rules), multi-screen (flow architecture),
        batching (context budget), tool-behavior (usage patterns),
        opinion-engine (auto-inference docs), ui-patterns (UI type templates),
        responsive (web breakpoints + auto-layout), content-states (empty/loading/error patterns),
        iconography (icon ordering, sizing, tool chain, design rules),
        platform-ios (iOS safe areas, SF Pro, HIG conventions),
        platform-android (Material Design 3, Roboto, navigation)
    uiType:
      type: string
      required: false
      description: >-
        UI type for ui-patterns topic. Available: login, signup, onboarding, dashboard,
        list-detail, settings, profile, card-grid, checkout. Omit to list all available types.
  response:
    type: string
  examples:
    - topic: layout
      description: "Returns numbered list of layout & structure prevention rules from Quality Engine"
    - topic: ui-patterns
      uiType: login
      description: "Returns login screen template with structure, key decisions, pitfalls, and tone variants"

audit_node:
  description: >-
    Run a deep quality audit on a single node. Combines all lint rules + design guideline checks
    into a structured report with severity, suggestions, and auto-fix availability.
    Use this for detailed inspection of a specific element before finalizing a design.
  toolset: core
  write: false
  handler: custom
  params:
    nodeId:
      type: string
      required: true
      description: The Figma node ID to audit
    categories:
      type: array
      items: string
      description: "Lint categories to check: token, layout, naming, wcag, component (default: all)"
    includeChildren:
      type: boolean
      description: "Also audit child nodes recursively (default: true)"
  response:
    type: object
    fields:
      nodeId:
        type: string
        required: true
      nodeName:
        type: string
        required: true
      nodeType:
        type: string
        required: true
      qualityScore:
        type: number
        required: true
      summary:
        type: object
        required: true
        fields:
          totalChecked:
            type: number
          violations:
            type: number
          errors:
            type: number
          warnings:
            type: number
          autoFixable:
            type: number
      violations:
        type: array
        items: object
      structuralNotes:
        type: array
        items: string
      recommendation:
        type: string
        required: true
  examples:
    - nodeId: "1:23"
      nodeName: "Login Button"
      nodeType: "FRAME"
      qualityScore: 85
      summary:
        totalChecked: 12
        violations: 2
        errors: 0
        warnings: 2
        autoFixable: 1
      violations: []
      structuralNotes: []
      recommendation: "Fix 1 auto-fixable warning, then review the remaining warning manually."

join_channel:
  description: >-
    Switch to a different Figma plugin channel. Each Figma document runs its
    own plugin instance with a unique channel ID. Use this to target a specific document.
  toolset: core
  write: false
  handler: custom
  params:
    channel:
      type: string
      required: true
      description: The channel ID shown in the Figma plugin UI
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      channel:
        type: string
      message:
        type: string
      error:
        type: string
  examples:
    - ok: true
      channel: "design-1"
      message: "Joined channel \"design-1\". Commands will now target this document."

get_channel:
  description: Get the current channel ID that the MCP Server is connected to.
  toolset: core
  write: false
  handler: custom
  params: {}
  response:
    type: object
    fields:
      channel:
        type: string
        required: true
      connected:
        type: boolean
        required: true
  examples:
    - channel: "design-1"
      connected: true

# ─── Read Nodes ───

get_current_page:
  description: >-
    Get the current page node tree (compressed).
    Returns page info and up to maxNodes top-level children with full style data.
    Use maxDepth to control tree traversal depth (default: 10).
    For large pages, use maxDepth=1 or 2 for a fast overview, then get_node_info for details.
  toolset: core
  write: false
  handler: custom
  params:
    maxNodes:
      type: number
      description: "Maximum number of top-level nodes to return (default: 200)"
    maxDepth:
      type: number
      description: "Maximum tree depth to traverse (default: 10). Use 1-2 for fast overview of large pages."
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      childCount:
        type: number
        required: true
      returnedNodes:
        type: number
        required: true
      truncated:
        type: boolean
      nodes:
        type: array
        required: true
        items:
          type: object
          fields:
            id:
              type: string
              required: true
            name:
              type: string
              required: true
            type:
              type: string
              required: true
      _error:
        type: string
      _sizeKB:
        type: number
      _limitKB:
        type: number
      method:
        type: string
      warning:
        type: string
      hints:
        type: array
        items: string
      _previewHint:
        type: string
  examples:
    - id: "0:1"
      name: "Page 1"
      childCount: 3
      returnedNodes: 2
      truncated: true
      nodes:
        - id: "1:10"
          name: "Dashboard"
          type: "FRAME"
        - id: "1:20"
          name: "Settings"
          type: "FRAME"

get_design_context:
  description: >-
    Extract structured design-to-code context from a node: full node tree PLUS resolved
    metadata for every variable, style, and component the tree references. The calling
    LLM uses this context to generate framework code. Does NOT generate code itself —
    that decoupling lets you target any framework while figcraft handles the Figma side.
    Self-built (does not require Figma Desktop MCP), so it works in remote agents,
    cloud IDEs, and claude.ai web sessions where Desktop MCP is unavailable.
  toolset: core
  write: false
  handler: bridge
  params:
    nodeId:
      type: string
      required: true
      description: Root node to extract context from
    framework:
      type: enum
      values: [react, vue, swiftui, compose, tailwind, unspecified]
      description: "Optional framework hint — adjusts frameworkHint string in response"
  response:
    type: object
    fields:
      framework:
        type: string
        required: true
      frameworkHint:
        type: string
        required: true
        description: "Short guidance string the calling LLM can lean on while generating code"
      tree:
        type: object
        required: true
        description: "Full node tree (boundVariables/styleIds preserved)"
      summary:
        type: object
        required: true
        fields:
          textNodes:
            type: number
            required: true
          imageNodes:
            type: number
            required: true
          variablesUsed:
            type: number
            required: true
          stylesUsed:
            type: number
            required: true
          componentsUsed:
            type: number
            required: true
      variables:
        type: array
        required: true
        items:
          type: object
          fields:
            id:
              type: string
              required: true
            name:
              type: string
              required: true
            type:
              type: string
              required: true
            collection:
              type: string
      styles:
        type: array
        required: true
        items:
          type: object
          fields:
            id:
              type: string
              required: true
            name:
              type: string
              required: true
            type:
              type: string
              required: true
      components:
        type: array
        required: true
        items:
          type: object
          fields:
            id:
              type: string
              required: true
            key:
              type: string
            name:
              type: string
              required: true
            isSet:
              type: boolean
              required: true
            remote:
              type: boolean
              required: true
            description:
              type: string
            propertyDefinitions:
              type: object
  examples:
    - framework: "react"
      frameworkHint: "React + TypeScript. Map auto-layout → Flexbox..."
      summary:
        textNodes: 3
        imageNodes: 1
        variablesUsed: 6
        stylesUsed: 2
        componentsUsed: 1
      variables:
        - id: "VariableID:1:30"
          name: "color/bg/primary"
          type: "COLOR"
          collection: "Color"
      styles:
        - id: "S:abc123"
          name: "Heading/Large"
          type: "TEXT"
      components:
        - id: "80:1"
          key: "abc..."
          name: "Button"
          isSet: true
          remote: true

get_document_info:
  description: >-
    Get document overview: name, current page, and list of all pages.
    NOTE: For most tasks, prefer get_current_page (with maxDepth=1 for overview) instead — it returns actual node data.
    Use get_document_info only when you need to list all pages or switch pages.
  toolset: core
  write: false
  handler: custom
  params: {}
  response:
    type: object
    fields:
      name:
        type: string
        required: true
      currentPage:
        type: string
        required: true
      pages:
        type: array
        required: true
        items:
          type: object
          fields:
            id:
              type: string
              required: true
            name:
              type: string
              required: true
            childCount:
              type: number
              required: true
  examples:
    - name: "Acme Product"
      currentPage: "Page 1"
      pages:
        - id: "0:1"
          name: "Page 1"
          childCount: 12
        - id: "0:2"
          name: "Components"
          childCount: 48

get_selection:
  description: Get the currently selected nodes in Figma with full compressed data.
  toolset: core
  write: false
  handler: bridge
  params: {}
  response:
    type: object
    fields:
      count:
        type: number
        required: true
      nodes:
        type: array
        required: true
        items:
          type: object
          fields:
            id:
              type: string
              required: true
            name:
              type: string
              required: true
            type:
              type: string
              required: true
  examples:
    - count: 2
      nodes:
        - id: "1:10"
          name: "CTA Button"
          type: "FRAME"
        - id: "1:11"
          name: "Headline"
          type: "TEXT"

list_fonts:
  description: >-
    List available font families in the Figma environment.
    Pass family to get all available styles for that family.
    Use before creating text to ensure the chosen font is available.
  toolset: core
  write: false
  handler: bridge
  params:
    family:
      type: string
      description: Font family name to get available styles for
  response:
    type: object
    fields:
      family:
        type: string
      styles:
        type: array
        items: string
      count:
        type: number
      families:
        type: array
        items: string
      total:
        type: number
  examples:
    - families:
        - "Inter"
        - "SF Pro Display"
        - "JetBrains Mono"
      total: 3
    - family: "Inter"
      styles:
        - "Regular"
        - "Medium"
        - "Bold"
      count: 3

# ─── Write Nodes ───

create_frame:
  # harness: guards=[design-preflight] transforms=[resolve-icons]
  #   enrichments=[content-warnings, auto-verify, resolve-icons-warnings]
  #   recovery=[token-not-found, connection-lost]
  #   session=[design-decisions, record-creation-debt]
  description: >-
    Create a frame node with optional auto-layout, fills, stroke, corner radius, and parent.
    Supports token auto-binding (fillVariableName, strokeVariableName), smart defaults,
    and inline children for building entire node trees in one call.

    Opinion Engine (automatic inferences — no manual handling needed):
    1. layoutMode → auto-inferred as VERTICAL when padding/spacing/alignment/children present
    2. layoutSizingHorizontal/Vertical → cross-axis FILL, primary-axis HUG inside auto-layout parent
    3. FILL ordering → internally sets FILL AFTER appendChild (avoids Figma API error)
    4. Parent promotion → when children declare FILL/HUG but parent has no layoutMode, auto-promotes to VERTICAL
    5. Cross-level FILL→HUG downgrade → when parent HUGs on cross-axis, child FILL is downgraded to HUG (prevents 0-collapse)
    6. FILL+width conflict detection → rejects contradictory params (e.g. FILL + explicit width)
    7. Token auto-binding → fillVariableName/strokeVariableName matched to library variables/styles
    8. Font preloading → all text fonts collected and loaded in parallel before creation
    9. Per-child error cleanup → failed child creation auto-removes orphan nodes
    10. Auto-focus → viewport scrolls to created node; use export_image for visual verification
    11. Primary-axis overflow shrink → when fixed-width children exceed parent, auto-shrinks proportionally to fit

    Use dryRun:true to preview all inferences BEFORE creating nodes.
  toolset: core
  write: true
  access: create
  handler: custom
  timeoutMs: 60000
  params:
    name:
      type: string
      description: 'Frame name (default: "Frame")'
    role:
      type: string
      description: "Semantic role (e.g. 'screen', 'button', 'input', 'header', 'container'). Stored as plugin data — lint rules use this for deterministic identification instead of name-regex guessing."
    x:
      type: number
      description: X position
    y:
      type: number
      description: Y position
    width:
      type: number
      description: "Width in px (omit to shrink-to-content via HUG when auto-layout)"
    height:
      type: number
      description: "Height in px (omit to shrink-to-content via HUG when auto-layout)"
    # ── Fill (5 formats: hex, variableName, styleName, Paint[], or omit for transparent) ──
    fill:
      type: string
      description: "Fill color as hex (e.g. '#FFFFFF') or variable/style name — auto-binds to matching token"
    fillVariableName:
      type: string
      description: "Bind fill to a color variable by name (e.g. 'bg/primary')"
    fillStyleName:
      type: string
      description: "Apply paint style by name (e.g. 'Surface/Primary')"
    gradient:
      type: object
      description: >-
        Gradient fill. {type:'LINEAR'|'RADIAL', stops:[{color:'#hex', position:0-1}, ...], angle?: degrees (LINEAR only, default 180=top-to-bottom)}.
        Example: {type:'LINEAR', stops:[{color:'#FF0000',position:0},{color:'#0000FF',position:1}], angle:90}
    # ── Stroke ──
    strokeColor:
      type: string
      description: "Stroke color hex — auto-binds to matching variable/style"
    strokeVariableName:
      type: string
      description: "Bind stroke to a color variable by name"
    strokeWeight:
      type: number
      description: "Stroke thickness (default: 1 when stroke specified)"
    strokeAlign:
      type: enum
      values: [INSIDE, OUTSIDE, CENTER]
      description: "Stroke position (default: INSIDE)"
    strokeDashes:
      type: array
      description: "Dash pattern array [dash, gap] (e.g. [10, 5] for dashed, [2, 2] for dotted)"
    strokeCap:
      type: enum
      values: [NONE, ROUND, SQUARE, ARROW_LINES, ARROW_EQUILATERAL]
      description: "Stroke end cap style"
    strokeJoin:
      type: enum
      values: [MITER, BEVEL, ROUND]
      description: "Stroke corner join style"
    # ── Layout ──
    layoutMode:
      type: enum
      values: [HORIZONTAL, VERTICAL, GRID]
      description: "Auto-layout direction. GRID enables CSS Grid-like layout with rows and columns. Smart default: auto-inferred as VERTICAL when padding/spacing/alignment params are present."
    itemSpacing:
      type: number
      description: Spacing between children
    padding:
      type: number
      description: "Shorthand — sets all 4 padding edges"
    paddingLeft:
      type: number
      description: Left padding
    paddingRight:
      type: number
      description: Right padding
    paddingTop:
      type: number
      description: Top padding
    paddingBottom:
      type: number
      description: Bottom padding
    cornerRadius:
      type: number
      description: Corner radius (number or variable name string) — sets all 4 corners uniformly
    topLeftRadius:
      type: number
      description: Top-left corner radius (overrides cornerRadius for this corner)
    topRightRadius:
      type: number
      description: Top-right corner radius (overrides cornerRadius for this corner)
    bottomRightRadius:
      type: number
      description: Bottom-right corner radius (overrides cornerRadius for this corner)
    bottomLeftRadius:
      type: number
      description: Bottom-left corner radius (overrides cornerRadius for this corner)
    parentId:
      type: string
      description: Parent node ID to append into
    layoutSizingHorizontal:
      type: enum
      values: [FIXED, HUG, FILL]
      description: "Horizontal sizing. Smart default: FILL on cross-axis, HUG on primary-axis when inside auto-layout parent."
    layoutSizingVertical:
      type: enum
      values: [FIXED, HUG, FILL]
      description: "Vertical sizing. Smart default: FILL on cross-axis, HUG on primary-axis when inside auto-layout parent."
    primaryAxisAlignItems:
      type: enum
      values: [MIN, CENTER, MAX, SPACE_BETWEEN]
      description: Primary axis alignment
    counterAxisAlignItems:
      type: enum
      values: [MIN, CENTER, MAX]
      description: Counter axis alignment
    layoutWrap:
      type: enum
      values: [NO_WRAP, WRAP]
      description: "Wrap children to new rows (HORIZONTAL layout only)"
    counterAxisSpacing:
      type: number
      description: "Gap between wrapped rows (requires layoutWrap: WRAP)"
    # ── Grid layout (layoutMode: GRID) ──
    gridRowCount:
      type: number
      description: "Number of rows in the grid (only when layoutMode: GRID)"
    gridColumnCount:
      type: number
      description: "Number of columns in the grid (only when layoutMode: GRID)"
    gridRowGap:
      type: number
      description: "Gap between rows in the grid (only when layoutMode: GRID)"
    gridColumnGap:
      type: number
      description: "Gap between columns in the grid (only when layoutMode: GRID)"
    # ── Appearance ──
    opacity:
      type: number
      description: "Opacity 0-1"
    visible:
      type: boolean
      description: "Show/hide (default: true)"
    rotation:
      type: number
      description: "Rotation in degrees"
    blendMode:
      type: enum
      values: [PASS_THROUGH, NORMAL, DARKEN, MULTIPLY, SCREEN, OVERLAY, SOFT_LIGHT, HARD_LIGHT]
      description: Layer blend mode
    effectStyleName:
      type: string
      description: "Effect style name for shadows/blurs"
    shadow:
      type: object
      description: "Drop shadow shorthand. {color?: hex (default '#00000040'), x?: offsetX (default 0), y?: offsetY (default 4), blur?: radius (default 12), spread?: (default 0)}. Ignored when effectStyleName is set."
    innerShadow:
      type: object
      description: "Inner shadow shorthand. {color?: hex (default '#0000001A'), x?: offsetX (default 0), y?: offsetY (default 2), blur?: radius (default 4), spread?: (default 0)}. Ignored when effectStyleName is set. Can coexist with shadow and blur."
    blur:
      type: number
      description: "Background blur radius for glassmorphism/frosted-glass effects. Ignored when effectStyleName is set. Can coexist with shadow and innerShadow."
    clipsContent:
      type: boolean
      description: "Clip children to frame bounds (default: true)"
    # ── Responsive constraints ──
    minWidth:
      type: number
      description: "Min width for responsive auto-layout"
    maxWidth:
      type: number
      description: "Max width for responsive auto-layout"
    minHeight:
      type: number
      description: "Min height for responsive auto-layout"
    maxHeight:
      type: number
      description: "Max height for responsive auto-layout"
    layoutPositioning:
      type: enum
      values: [AUTO, ABSOLUTE]
      description: "ABSOLUTE = floating inside auto-layout parent"
    # ── Image fill ──
    imageUrl:
      type: string
      description: "Image URL — public URL for image fill. Use image_search to find Pexels photos."
    imageScaleMode:
      type: enum
      values: [FILL, FIT, CROP, TILE]
      description: "How the image is scaled within the frame (default: FILL)"
    # ── Inline children (build entire node tree in one call) ──
    children:
      type: array
      items:
        type: object
        additionalProperties: true
        fields:
          type:
            type: enum
            values: [frame, text, rectangle, ellipse, star, polygon, instance, svg, icon]
            description: "Child node type"
      description: >-
        Inline child nodes to create recursively. Each item: {type:'frame'|'text'|'rectangle'|'ellipse'|'instance'|'svg'|'star'|'polygon'|'icon', ...params, children?}.
        Frame children accept all create_frame params. Text children accept all create_text params (incl. textCase, textDecoration).
        ⛔ Library mode: text children should use fontColorVariableName (e.g. 'text/primary-inverse')
        instead of fill:'#hex'. Omitting fill triggers auto-binding to library text color tokens.
        Rectangle/ellipse children accept: name, width, height, fill, fillVariableName, fillStyleName, strokeColor, strokeVariableName, strokeWeight, cornerRadius (rect only), opacity, rotation.
        Instance children accept: componentId (local node ID), componentKey (library component key), or componentSetKey (library component set key) — at least one required. Also: name, width, height, variantProperties, properties, layoutSizingHorizontal/Vertical. For library components, prefer componentKey or componentSetKey over componentId.
        SVG children accept: svg (required), name, width, height.
        Icon children accept: icon (required, "prefix:name" e.g. "lucide:home"), size (default: 24), fill (hex color), colorVariableName, name.
        Star children accept: name, width, height, fill, pointCount, innerRadius, opacity, rotation.
        Polygon children accept: name, width, height, fill, pointCount, opacity, rotation.
        Smart defaults apply: cross-axis FILL, primary-axis HUG inside auto-layout parents. Max depth: 10 levels.
    # ── Dry run (staging preview) ──
    dryRun:
      type: boolean
      description: >-
        When true, validates params and previews inferences WITHOUT creating any nodes.
        Returns {dryRun:true, valid, inferences?, ambiguous?, diff?, correctedPayload?}.
        Pre-validates: layoutMode conflicts, sizing conflicts (FILL+width), cross-level FILL/HUG collapse,
        spacer frame conversion, text overflow (WIDTH_AND_HEIGHT in fixed parent), invisible empty frames,
        fontSize below 12px mobile minimum. Use correctedPayload for the actual creation call to avoid ambiguity.
    noPreview:
      type: boolean
      description: "Skip _previewHint in response (default: false). When false, response includes a hint to call export_image for visual verification."
    # ── Batch mode ──
    items:
      type: array
      description: >-
        Batch mode: array of create_frame param objects. When provided, creates multiple frames in one call.
        Each item accepts the same params as create_frame (name, width, height, layoutMode, children, etc.).
        Pre-creation validation runs per item — conflicting items return error without blocking others.
        Max 20 frames per batch. Returns {created, total, items: [{id, name, ok, error?}]}.
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      type:
        type: string
        required: true
      width:
        type: number
        required: true
      height:
        type: number
        required: true
      visible:
        type: boolean
        required: true
      _libraryBindings:
        type: array
        description: "Token/style bindings applied during creation"
      _hints:
        type: array
        description: "Smart default inferences applied (sizing, layoutMode)"
      _warnings:
        type: array
        description: "Non-fatal issues during creation (e.g. image load failed, style not found)"
      _children:
        type: array
        description: "Created child node IDs (when children param used)"
      _inferences:
        type: array
        description: "Layout inferences applied during creation (deterministic or ambiguous)"
      _correctedPayload:
        type: object
        description: "Corrected params when ambiguous inferences detected — use this in your next call to avoid ambiguity"
      _diff:
        type: string
        description: "Git-style diff of ambiguous inferences (only present when ambiguity detected)"
      _lintSummary:
        type: object
        description: "Quick lint summary after creation (only present when children created and violations found). Run lint_fix_all to fix."
  examples:
    - id: "50:1"
      name: "Login Screen"
      type: "FRAME"
      width: 375
      height: 812
      visible: true


create_text:
  # harness: guards=[design-preflight] recovery=[connection-lost]
  description: >-
    Create a text node with specified content, font, size, and color.
    Supports token auto-binding (fontColorVariableName, textStyleName), smart defaults
    (auto FILL width + HEIGHT resize inside vertical auto-layout), and font fallback chain.
  toolset: core
  write: true
  access: create
  handler: bridge
  params:
    content:
      type: string
      description: Text content to display
    name:
      type: string
      description: Node name (defaults to content)
    x:
      type: number
      description: X position
    y:
      type: number
      description: Y position
    width:
      type: number
      description: "Fixed width in px — implies textAutoResize: HEIGHT"
    fontSize:
      type: number
      description: "Font size (default: 14)"
    fontFamily:
      type: string
      description: 'Font family (default: "Inter")'
    fontStyle:
      type: string
      description: 'Font style e.g. "Bold", "Italic" (default: "Regular")'
    fontWeight:
      type: number
      description: "100-900 (default: 400). Ignored when fontStyle is set."
    # ── Color (5 formats: hex, variableName, styleName, or omit for default) ──
    fill:
      type: string
      description: "Text color as hex (e.g. '#000000') or variable/style name — auto-binds"
    fontColorVariableName:
      type: string
      description: "Bind text color to a variable by name (e.g. 'text/primary')"
    fontColorStyleName:
      type: string
      description: "Apply paint style for text color"
    # ── Typography style ──
    textStyleName:
      type: string
      description: "Apply text style by name — overrides fontSize/fontWeight"
    lineHeight:
      type: number
      description: Line height in pixels
    letterSpacing:
      type: number
      description: Letter spacing in pixels
    textAlignHorizontal:
      type: enum
      values: [LEFT, CENTER, RIGHT, JUSTIFIED]
      description: Horizontal text alignment
    textAlignVertical:
      type: enum
      values: [TOP, CENTER, BOTTOM]
      description: Vertical text alignment
    textAutoResize:
      type: enum
      values: [NONE, WIDTH_AND_HEIGHT, HEIGHT, TRUNCATE]
      description: "NONE (fixed box), WIDTH_AND_HEIGHT (grow both), HEIGHT (fixed width, auto height), TRUNCATE (ellipsis)"
    textCase:
      type: enum
      values: [ORIGINAL, UPPER, LOWER, TITLE, SMALL_CAPS, SMALL_CAPS_FORCED]
      description: "Text case transform (UPPER=uppercase, LOWER=lowercase, TITLE=capitalize)"
    textDecoration:
      type: enum
      values: [NONE, UNDERLINE, STRIKETHROUGH]
      description: "Text decoration (underline or strikethrough)"
    # ── Layout sizing ──
    layoutSizingHorizontal:
      type: enum
      values: [FIXED, HUG, FILL]
      description: "Smart default: FILL inside vertical auto-layout parent"
    layoutSizingVertical:
      type: enum
      values: [FIXED, HUG, FILL]
      description: "Vertical sizing in auto-layout parent"
    parentId:
      type: string
      description: Parent node ID to append into
    # ── Appearance ──
    opacity:
      type: number
      description: "Opacity 0-1"
    visible:
      type: boolean
      description: "Show/hide (default: true)"
    # ── Batch mode ──
    items:
      type: array
      description: >-
        Batch mode: array of create_text param objects. When provided, creates multiple text nodes in one call.
        Each item accepts the same params as create_text (content, fontSize, fontFamily, fill, parentId, etc.).
        Max 50 text nodes per batch. Returns {created, total, items: [{id, name, ok, error?}]}.
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      type:
        type: string
        required: true
      width:
        type: number
        required: true
      height:
        type: number
        required: true
      visible:
        type: boolean
        required: true
      _libraryBindings:
        type: array
        description: "Token/style bindings applied during creation"
      _hints:
        type: array
        description: "Smart default inferences applied (sizing, textAutoResize)"
  examples:
    - id: "51:1"
      name: "Welcome back"
      type: "TEXT"
      width: 84
      height: 17
      visible: true

lint_fix_all:
  # harness: session=[record-verification]
  description: >-
    Run lint on the page/selection, then auto-fix all fixable violations in one call.
    Returns the lint report and fix results. Equivalent to lint_check + lint_fix.
  toolset: core
  write: true
  access: edit
  handler: custom
  params:
    nodeIds:
      type: array
      items: string
      description: "Node IDs to lint (default: selection or page)"
    rules:
      type: array
      items: string
      description: "Rule names to run (default: all)"
    categories:
      type: array
      items: string
      description: "Rule categories: token, layout, naming, wcag, component"
    useStoredTokens:
      type: string
      description: Name of cached token set to use
    annotate:
      type: boolean
      description: Add annotations to remaining (unfixable) violations
    maxViolations:
      type: number
      description: "Stop collecting after this many violations (performance optimization for large pages)"
  response:
    type: object
    fields:
      lint:
        type: object
        required: true
        fields:
          total:
            type: number
            required: true
          pass:
            type: number
            required: true
          violations:
            type: number
            required: true
          bySeverity:
            type: record
            valueType: unknown
      fixable:
        type: number
        required: true
      fixed:
        type: number
        required: true
      fixFailed:
        type: number
        required: true
      remaining:
        type: number
        required: true
      remainingFixCalls:
        type: array
        description: "Remaining violations with structured fixCall for AI follow-up (max 10). Each: {nodeId, nodeName, rule, severity, suggestion, fixCall: {tool, params}}"
  examples:
    - lint:
        total: 24
        pass: 20
        violations: 4
        bySeverity:
          warning: 3
          error: 1
      fixable: 3
      fixed: 3
      fixFailed: 0
      remaining: 1

# ─── Pages (core) ───

set_current_page:
  description: >-
    Switch to a different page by name or ID.
    Warning: this changes the context for all subsequent operations.
  toolset: core
  write: false
  handler: bridge
  params:
    nameOrId:
      type: string
      required: true
      description: Page name or page ID
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      pageId:
        type: string
      pageName:
        type: string
      error:
        type: string
  examples:
    - ok: true
      pageId: "0:2"
      pageName: "Components"

# ─── Export (core) ───

export_image:
  description: Export a Figma node as an image. Returns base64-encoded image data.
  toolset: core
  write: false
  handler: custom
  params:
    nodeId:
      type: string
      required: true
      description: The node ID to export
    format:
      type: enum
      values: [PNG, SVG, PDF, JPG]
      description: "Export format (default: PNG)"
    scale:
      type: number
      description: "Export scale for raster formats (default: 2)"
  response:
    type: object
    fields:
      format:
        type: string
        required: true
      size:
        type: number
        required: true
      base64:
        type: string
        required: true
  examples:
    - format: "PNG"
      size: 18432
      base64: "iVBORw0KGgoAAAANSUhEUgAAAAUA"

# ─── Version (core) ───

save_version_history:
  description: >-
    Save a named version history snapshot of the current Figma file.
    Use before making significant changes so you can restore if needed.
  toolset: core
  write: false
  handler: bridge
  params:
    title:
      type: string
      required: true
      description: 'Snapshot title (e.g. "Before refactor")'
    description:
      type: string
      description: Optional description of what was done
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      title:
        type: string
        required: true
      description:
        type: string
        required: true
  examples:
    - ok: true
      title: "Before refactor"
      description: "Checkpoint before layout cleanup"

# ─── Selection (core) ───

set_selection:
  description: >-
    Set the current selection to specific nodes and optionally scroll them into view.
    Nodes must be on the current page.
  toolset: core
  write: false
  handler: bridge
  params:
    nodeIds:
      type: array
      required: true
      items: string
      description: Node IDs to select
    scrollIntoView:
      type: boolean
      description: "Scroll viewport to show selected nodes (default: true)"
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      selectedCount:
        type: number
        required: true
      notFound:
        type: array
        required: true
        items: string
  examples:
    - ok: true
      selectedCount: 2
      notFound: []
    - ok: true
      selectedCount: 1
      notFound:
        - "999:1"

# ─── Execute JS (Plugin API sandbox) ───

execute_js:
  description: >-
    Execute arbitrary JavaScript in the Figma Plugin sandbox.
    This is the FigCraft equivalent of Figma MCP's use_figma tool.
    Code runs in an async context with top-level await support.
    Use `return` to send data back — the return value is JSON-serialized automatically.
    The `figma` global is available (Plugin API). Do NOT call figma.closePlugin()
    or wrap code in an async IIFE — this is handled for you.
    Colors are 0–1 range (not 0–255). Fills/strokes are read-only arrays — clone, modify, reassign.
    Font MUST be loaded before any text operation: await figma.loadFontAsync({family, style}).
    Failed scripts are NOT always atomic — partial nodes may remain after errors.
    Always inspect page state after a failed script and clean up orphan nodes.
  toolset: debug
  write: true
  access: edit
  handler: custom
  params:
    code:
      type: string
      required: true
      description: >-
        JavaScript code to execute in the Figma Plugin sandbox.
        Use top-level await freely. Use `return` to send data back.
        The `figma` global (Plugin API) is available.
    timeoutMs:
      type: number
      description: >-
        Execution timeout in milliseconds (default: 30000, max: 120000).
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      result:
        type: unknown
      error:
        type: string
      stack:
        type: string
      _warning:
        type: string
  examples:
    - ok: true
      result:
        pages:
          - "Page 1"
          - "Components"
    - ok: false
      error: "figma.notify is not a function"

# ═══════════════════════════════════════════════════════════════
# CORE: Icons (Iconify integration)
# ═══════════════════════════════════════════════════════════════

icon_search:
  description: >-
    Search icons by keyword across 200k+ open-source icons via Iconify.
    Common sets: lucide, mdi, tabler, heroicons, ph.
    Returns icon names in "prefix:name" format.
  toolset: core
  write: false
  handler: custom
  params:
    query:
      type: string
      required: true
      description: 'Search keyword (e.g. "home", "arrow", "user")'
    prefix:
      type: string
      description: 'Restrict to one icon set (e.g. "lucide", "mdi")'
    limit:
      type: number
      description: "Max results (default: 64)"
  response:
    type: object
    fields:
      icons:
        type: array
        items: string
      total:
        type: number

icon_collections:
  description: >-
    List available Iconify icon sets with name, total count, and category.
  toolset: core
  write: false
  handler: custom
  params:
    query:
      type: string
      description: "Filter by name or prefix"
    limit:
      type: number
      description: "Max results"
  response:
    type: object
    fields:
      collections:
        type: array
      total:
        type: number

icon_create:
  description: >-
    Create an icon node in Figma from an Iconify icon name.
    Fetches the SVG and inserts it as a vector node.
    Use icon_search to find icons first.
  toolset: core
  write: true
  access: create
  handler: custom
  params:
    icon:
      type: string
      required: true
      description: 'Icon name — "prefix:name" e.g. "lucide:home", "mdi:account"'
    size:
      type: number
      description: "Icon size in px (default: 24, square)"
    name:
      type: string
      description: "Layer name (default: icon name)"
    parentId:
      type: string
      description: "Parent node ID"
    x:
      type: number
      description: "X position"
    y:
      type: number
      description: "Y position"
    index:
      type: number
      description: "Insertion position in parent's children list (0 = first child, visually leftmost/topmost in auto-layout). Default: append to end."
    colorVariableName:
      type: string
      description: "Color variable for the icon (e.g. 'text/primary')"
    fill:
      type: string
      description: "Icon color as hex (e.g. '#FFFFFF'). Applied directly to fill/stroke vectors. Use colorVariableName for token binding instead."
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string

# ═══════════════════════════════════════════════════════════════
# CORE: Images (Pexels integration)
# ═══════════════════════════════════════════════════════════════

image_search:
  description: >-
    Search stock photos by keyword via Pexels.
    Returns photo metadata (id, alt, dimensions, photographer).
    To place a photo in Figma: use create_frame with set_image_fill.
    Requires PEXELS_API_KEY environment variable.
  toolset: core
  write: false
  handler: custom
  params:
    query:
      type: string
      required: true
      description: 'Search keyword (e.g. "sunset", "office", "nature")'
    orientation:
      type: enum
      values: [landscape, portrait, square]
      description: "Filter by photo orientation"
    size:
      type: enum
      values: [large, medium, small]
      description: "Minimum photo size"
    color:
      type: string
      description: "Filter by color — hex or named: red, blue, green, etc."
    page:
      type: number
      description: "Page number (default: 1)"
    per_page:
      type: number
      description: "Results per page (default: 15, max: 80)"
  response:
    type: object
    fields:
      photos:
        type: array
      total_results:
        type: number
      page:
        type: number

image_preview:
  description: >-
    Preview a Pexels photo by ID — returns the actual image so you can see it before placing.
  toolset: core
  write: false
  handler: custom
  params:
    id:
      type: number
      required: true
      description: "Photo ID from image_search results"
    size:
      type: enum
      values: [small, medium, large]
      description: "Preview size (default: medium)"
  response:
    type: object
    description: "Image content (base64) + photo metadata"

# ─── SVG Creation (core) ───

create_svg:
  # harness: guards=[design-preflight] recovery=[connection-lost]
  description: >-
    Create a vector node from raw SVG markup string.
    Figma converts the SVG to native vector nodes.
  toolset: core
  write: true
  access: create
  handler: bridge
  params:
    svg:
      type: string
      required: true
      description: "SVG markup string (e.g. '<svg>...</svg>')"
    name:
      type: string
      description: "Layer name (default: 'SVG')"
    parentId:
      type: string
      description: "Parent node ID"
    x:
      type: number
      description: "X position"
    y:
      type: number
      description: "Y position"
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string

# ─── Text Scan (core) ───

text_scan:
  description: >-
    Scan all text nodes within a subtree. Returns text content, font info, and optional layer path.
    Useful for inspecting text content before editing or for component text discovery.
  toolset: core
  write: false
  handler: bridge
  params:
    nodeId:
      type: string
      required: true
      description: "Root node ID to scan"
    limit:
      type: number
      description: "Max text nodes to return (default: 100)"
    includePath:
      type: boolean
      description: "Include layer hierarchy path (e.g. 'Frame > Card > Label')"
  response:
    type: object
    fields:
      nodeId:
        type: string
        required: true
      count:
        type: number
        required: true
      textNodes:
        type: array
        items:
          type: object
          fields:
            id:
              type: string
            name:
              type: string
            characters:
              type: string
            fontSize:
              type: number
            fontFamily:
              type: string
            path:
              type: string

# ─── Design System Search (core) ───

search_design_system:
  description: >-
    Search design system assets (components, variables, styles) across all
    subscribed team libraries by keyword. Returns matching results ranked by
    relevance. Use this to discover reusable design tokens, components, and
    styles before creating UI elements.
    Component results include full property metadata: variants, textProperties,
    booleanProperties, instanceSwapProperties (with preferredValues), and slotProperties.
  toolset: core
  write: false
  handler: custom
  params:
    query:
      type: string
      required: true
      description: 'Search keyword (e.g. "primary", "button", "heading")'
    types:
      type: array
      items: string
      description: 'Asset types to include: "components", "variables", "styles". Default: all three.'
    limit:
      type: number
      description: "Max results per type (default: 20)"
  response:
    type: object
    fields:
      query:
        type: string
        required: true
      components:
        type: array
        description: "Matching components with key, name, description"
      variables:
        type: array
        description: "Matching variables with key, name, resolvedType, collection"
      styles:
        type: array
        description: "Matching styles with key, name, styleType"
      summary:
        type: object
        fields:
          components:
            type: number
          variables:
            type: number
          styles:
            type: number

# ═══════════════════════════════════════════════════════════════
# TOOLSET: variables (18 tools)
# ═══════════════════════════════════════════════════════════════

set_explicit_variable_mode:
  description: >-
    Set an explicit variable mode on a node for a specific collection.
    This overrides the inherited mode.
  toolset: variables
  write: true
  access: edit
  handler: bridge
  params:
    nodeId:
      type: string
      required: true
      description: Node ID
    collectionId:
      type: string
      required: true
      description: Variable collection ID
    modeId:
      type: string
      required: true
      description: Mode ID to set (get available modes from list_collections)
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      error:
        type: string
  examples:
    - ok: true

rename_collection:
  description: Rename a variable collection.
  toolset: variables
  write: true
  access: edit
  handler: bridge
  params:
    collectionId:
      type: string
      required: true
      description: Collection ID
    name:
      type: string
      required: true
      description: New collection name
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      id:
        type: string
      name:
        type: string
      error:
        type: string
  examples:
    - ok: true
      id: "VariableCollectionId:1:2"
      name: "Semantic"

add_collection_mode:
  description: Add a new mode to a variable collection. Returns the new mode ID.
  toolset: variables
  write: true
  access: create
  handler: bridge
  params:
    collectionId:
      type: string
      required: true
      description: Collection ID
    name:
      type: string
      required: true
      description: 'Mode name (e.g. "Dark", "Compact")'
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      modeId:
        type: string
      name:
        type: string
      error:
        type: string
  examples:
    - ok: true
      modeId: "1:1"
