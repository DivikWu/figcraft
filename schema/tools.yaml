create_variable_alias:
  description: >-
    Set a variable's value to reference another variable (alias).
    Both variables must have the same resolved type.
    This is how Figma implements semantic tokens (e.g. "text/primary" → "gray/900").
  toolset: variables
  write: true
  access: edit
  handler: bridge
  params:
    variableId:
      type: string
      required: true
      description: Variable ID to set as alias
    targetVariableId:
      type: string
      required: true
      description: Target variable ID to reference
    modeId:
      type: string
      description: Mode ID (defaults to first mode)
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      variableId:
        type: string
      aliasTo:
        type: string
      error:
        type: string
  examples:
    - ok: true
      variableId: "VariableID:1:40"
      aliasTo: "color/brand/primary"

list_tokens:
  description: >-
    Parse a DTCG JSON file and list all design tokens.
    Resolves aliases and returns flat token list.
  toolset: tokens
  write: false
  handler: custom
  params:
    filePath:
      type: string
      required: true
      description: Path to DTCG JSON file
    type:
      type: string
      description: 'Filter by token type (e.g. "color", "typography")'
  response:
    type: object
    fields:
      total:
        type: number
        required: true
      showing:
        type: number
        required: true
      tokens:
        type: array
        required: true
        items:
          type: object
          fields:
            path:
              type: string
              required: true
            type:
              type: string
              required: true
            value:
              type: unknown
              required: true
            description:
              type: string
            extensions:
              type: object
  examples:
    - total: 2
      showing: 2
      tokens:
        - path: "color.brand.primary"
          type: "color"
          value: "#7c3aed"
          description: "Primary brand color"
        - path: "text.heading.l"
          type: "typography"
          value:
            fontFamily: "Inter"
            fontWeight: 700
            fontSize: 32

sync_tokens:
  # harness: enrichments=[next-steps] recovery=[file-not-found, parse-error]
  description: >-
    Sync DTCG tokens to Figma — creates/updates Variables for atomic tokens
    and Styles for composite types (typography, shadow). Idempotent.
  toolset: tokens
  write: true
  access: create
  handler: custom
  params:
    filePath:
      type: string
      required: true
      description: Path to DTCG JSON file
    collectionName:
      type: string
      description: 'Figma collection name (default: "Design Tokens")'
    modeName:
      type: string
      description: 'Mode name (default: "Default")'
  response:
    type: object
    fields:
      variables:
        type: object
        required: true
        fields:
          created:
            type: number
            required: true
          updated:
            type: number
            required: true
          skipped:
            type: number
            required: true
          failed:
            type: number
            required: true
          failures:
            type: array
            required: true
            items: object
      styles:
        type: object
        required: true
        fields:
          created:
            type: number
            required: true
          updated:
            type: number
            required: true
          skipped:
            type: number
            required: true
          failed:
            type: number
            required: true
          failures:
            type: array
            required: true
            items: object
      totalTokens:
        type: number
        required: true
  examples:
    - variables:
        created: 10
        updated: 2
        skipped: 1
        failed: 0
        failures: []
      styles:
        created: 2
        updated: 0
        skipped: 0
        failed: 0
        failures: []
      totalTokens: 15

sync_tokens_multi_mode:
  description: >-
    Sync DTCG tokens from multiple files into different modes of the same collection.
    Each entry maps a mode name to a DTCG file path.
    Modes are created automatically if they don't exist.
  toolset: tokens
  write: true
  access: create
  handler: custom
  params:
