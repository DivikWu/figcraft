create_line:
  description: Create a line node. Specify length and optional rotation.
  toolset: shapes-vectors
  write: true
  access: create
  handler: bridge
  params:
    name:
      type: string
      description: Node name
    x:
      type: number
      description: X position
    y:
      type: number
      description: Y position
    length:
      type: number
      description: "Line length in px (default: 100)"
    rotation:
      type: number
      description: "Rotation in degrees (0 = horizontal)"
    parentId:
      type: string
      description: Parent node ID
    stroke:
      type: string
      description: "Stroke color as hex (default: #000000)"
    strokeWeight:
      type: number
      description: "Stroke weight (default: 1)"
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      type:
        type: string
        required: true
      width:
        type: number
        required: true
      height:
        type: number
        required: true
      visible:
        type: boolean
        required: true
  examples:
    - id: "90:1"
      name: "Divider"
      type: "LINE"
      width: 320
      height: 0
      visible: true

create_star:
  description: Create a star shape node.
  toolset: shapes-vectors
  write: true
  access: create
  handler: bridge
  params:
    name:
      type: string
      description: Node name
    x:
      type: number
      description: X position
    y:
      type: number
      description: Y position
    width:
      type: number
      description: "Width (default: 100)"
    height:
      type: number
      description: "Height (default: 100)"
    pointCount:
      type: number
      description: "Number of points (default: 5)"
    innerRadius:
      type: number
      description: "Inner radius ratio 0-1 (default: 0.382)"
    fill:
      type: string
      description: Fill color as hex
    parentId:
      type: string
      description: Parent node ID
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      type:
        type: string
        required: true
      width:
        type: number
        required: true
      height:
        type: number
        required: true
      visible:
        type: boolean
        required: true
  examples:
    - id: "90:2"
      name: "Star"
      type: "STAR"
      width: 100
      height: 100
      visible: true

create_polygon:
  description: Create a regular polygon shape node.
  toolset: shapes-vectors
  write: true
  access: create
  handler: bridge
  params:
    name:
      type: string
      description: Node name
    x:
      type: number
      description: X position
    y:
      type: number
      description: Y position
    width:
      type: number
      description: "Width (default: 100)"
    height:
      type: number
      description: "Height (default: 100)"
    pointCount:
      type: number
      description: "Number of sides (default: 3 = triangle)"
    fill:
      type: string
      description: Fill color as hex
    parentId:
      type: string
      description: Parent node ID
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      type:
        type: string
        required: true
      width:
        type: number
        required: true
      height:
        type: number
        required: true
      visible:
        type: boolean
        required: true
  examples:
    - id: "90:3"
      name: "Triangle"
      type: "POLYGON"
      width: 100
      height: 100
      visible: true

create_section:
  description: >-
    Create a Figma Section node for organizing canvas content.
    Sections group frames without clipping and can be collapsed in Figma.
    Optionally move existing nodes inside by providing childIds.
  toolset: shapes-vectors
  write: true
  access: create
  handler: bridge
  params:
    name:
      type: string
      description: 'Section name (default: "Section")'
    x:
      type: number
      description: X position
    y:
      type: number
      description: Y position
    childIds:
      type: array
      items: string
      description: Node IDs to move inside the section
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      x:
        type: number
        required: true
      y:
        type: number
        required: true
  examples:
    - id: "91:1"
      name: "Onboarding"
      x: 0
      y: 0

flatten_node:
  description: >-
    Flatten a node (or group) into a single vector.
    Useful for converting complex shapes into a single editable path.
  toolset: shapes-vectors
  write: true
  access: edit
  handler: bridge
  params:
    nodeId:
      type: string
      required: true
      description: Node ID to flatten
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      type:
        type: string
        required: true
      width:
        type: number
        required: true
      height:
        type: number
        required: true
      visible:
        type: boolean
        required: true
      error:
        type: string
  examples:
    - id: "92:1"
      name: "Flattened Shape"
      type: "VECTOR"
      width: 120
      height: 120
      visible: true

boolean_operation:
  description: >-
    Apply a boolean operation to two or more vector/shape nodes.
    UNION merges shapes, SUBTRACT removes overlap from the first shape,
    INTERSECT keeps only the overlapping area, EXCLUDE keeps non-overlapping areas.
    All nodes must share the same parent. Returns the resulting BooleanOperation node.
  toolset: shapes-vectors
  write: true
  access: edit
  handler: bridge
  params:
    nodeIds:
      type: array
      required: true
      items: string
      description: Node IDs to combine (at least 2, order matters for SUBTRACT)
    operation:
      type: enum
      values: [UNION, SUBTRACT, INTERSECT, EXCLUDE]
      required: true
      description: Boolean operation type
    name:
      type: string
      description: Name for the resulting node
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      type:
        type: string
        required: true
      width:
        type: number
        required: true
      height:
        type: number
        required: true
      visible:
        type: boolean
        required: true
  examples:
    - id: "93:1"
      name: "Merged Shape"
      type: "BOOLEAN_OPERATION"
      width: 160
      height: 120
      visible: true

# ═══════════════════════════════════════════════════════════════
# TOOLSET: annotations (6 tools)
# ═══════════════════════════════════════════════════════════════

get_annotations:
  description: >-
    Get all annotations on the current page or a specific node.
    Returns each annotated node with its annotation labels.
  toolset: annotations
  write: false
  handler: bridge
  params:
    nodeId:
      type: string
      description: Node ID to inspect; omit to scan the entire current page
  response:
    type: object
    fields:
      nodes:
        type: array
        required: true
        items:
          type: object
          fields:
            nodeId:
              type: string
              required: true
            nodeName:
              type: string
              required: true
            annotations:
              type: array
              required: true
              items: object
      count:
        type: number
        required: true
  examples:
    - nodes:
        - nodeId: "100:1"
          nodeName: "Login Form"
          annotations:
            - label: "Check spacing"
              properties:
                - type: "design"
      count: 1

set_annotation:
  description: >-
    Add or replace an annotation on a node.
    Use replace=true to overwrite existing annotations; omit or set false to append.
  toolset: annotations
  write: true
  access: create
  handler: bridge
  params:
    nodeId:
      type: string
      required: true
      description: Target node ID
    label:
      type: string
      required: true
      description: Annotation text (Markdown supported)
    replace:
      type: boolean
      description: "If true, replaces all existing annotations on the node (default: false = append)"
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      nodeId:
        type: string
        required: true
      count:
        type: number
        required: true
  examples:
    - ok: true
      nodeId: "100:1"
      count: 2

set_multiple_annotations:
  description: Batch annotate multiple nodes in a single call. Each item can independently append or replace.
  toolset: annotations
  write: true
  access: create
  handler: bridge
  params:
    items:
      type: array
      required: true
      items:
        type: object
        fields:
          nodeId:
            type: string
            required: true
            description: Target node ID
          label:
            type: string
            required: true
            description: Annotation text
          replace:
            type: boolean
            description: If true, replaces existing annotations on this node
      description: List of annotation operations
  response:
    type: object
    fields:
      succeeded:
        type: number
        required: true
      failed:
        type: number
        required: true
      results:
        type: array
        required: true
        items: object
  examples:
    - succeeded: 2
      failed: 0
      results:
        - nodeId: "100:1"
          ok: true
        - nodeId: "100:2"
          ok: true

clear_annotations:
  description: Remove all figcraft lint annotations from specified nodes or the whole page.
  toolset: annotations
  write: true
  access: edit
  handler: bridge
  params:
    nodeIds:
      type: array
      items: string
      description: "Node IDs to clear (default: all on page)"
  response:
    type: object
    fields:
      cleared:
        type: number
        required: true
  examples:
    - cleared: 3

get_reactions:
  description: >-
    Get prototype reactions (interactions) on a specific node or all nodes on the current page.
    Returns trigger types and action types. Useful for analyzing prototype flows.
  toolset: annotations
  write: false
  handler: bridge
  params:
    nodeId:
      type: string
      description: Node ID to inspect; omit to scan the entire current page
  response:
    type: object
    fields:
      nodes:
        type: array
        required: true
        items:
          type: object
          fields:
            nodeId:
              type: string
              required: true
            nodeName:
              type: string
              required: true
            reactions:
              type: array
              required: true
              items: object
      count:
        type: number
        required: true
  examples:
    - nodes:
        - nodeId: "101:1"
          nodeName: "CTA Button"
          reactions:
            - trigger:
                type: "ON_CLICK"
              actions:
                - type: "NODE"
                  destinationId: "101:2"
      count: 1

analyze_prototype_flow:
  description: >-
    Analyze prototype interactions on the current page (or a subtree) and produce a structured flow graph.
    Returns: directed graph, entry points, dead ends, loops, trigger/action stats, Mermaid diagram, and Markdown docs.
  toolset: annotations
  write: false
  handler: custom
  params:
    nodeId:
      type: string
      description: Root node ID to analyze; omit to scan the entire current page
    format:
      type: enum
      values: [graph, mermaid, markdown, all]
      description: 'Output format (default: "all")'
  response:
    type: object
    fields:
      graph:
        type: object
      mermaid:
        type: string
      markdown:
        type: string
      message:
        type: string
      hint:
        type: string
  examples:
    - graph:
        stats:
          totalScreens: 2
          totalInteractions: 1
        nodes: []
        edges: []
      mermaid: "graph TD\n  A --> B"
      markdown: "# Prototype Flow Documentation"

# ═══════════════════════════════════════════════════════════════
# TOOLSET: lint (4 tools)
# ═══════════════════════════════════════════════════════════════

lint_check:
  description: >-
    Run design lint rules on selected nodes or the current page.
    Checks colors, typography, spacing, border radius against tokens,
    and WCAG contrast/target-size compliance.
    TIP: For a one-step check+fix, use lint_fix_all instead.
  toolset: lint
  write: false
  handler: custom
  params:
    nodeIds:
      type: array
      items: string
      description: "Node IDs to lint (default: selection or page)"
    rules:
      type: array
      items: string
      description: "Rule names to run (default: all)"
    categories:
      type: array
      items: string
      description: "Rule categories to run: token, layout, naming, wcag, component"
    offset:
      type: number
      description: Pagination offset
    limit:
      type: number
      description: Pagination limit
    maxViolations:
      type: number
      description: Stop after collecting this many violations
    annotate:
      type: boolean
      description: Add annotations to violated nodes in Figma
    useStoredTokens:
      type: string
      description: Name of cached token set to use
    minSeverity:
      type: enum
      values: [error, warning, info, hint]
      description: "Minimum severity to include (default: all). Use 'warning' to hide hints/info."
  response:
    type: object
    fields:
      summary:
        type: object
        required: true
        fields:
          total:
            type: number
            required: true
          pass:
            type: number
            required: true
          violations:
            type: number
            required: true
      categories:
        type: array
        required: true
        items:
          type: object
          fields:
            rule:
              type: string
              required: true
            count:
              type: number
              required: true
            nodes:
              type: array
              required: true
              items: object
      pagination:
        type: object
      scope:
        type: object
  examples:
    - summary:
        total: 10
        pass: 8
        violations: 2
      categories:
        - rule: "default-name"
          count: 1
          nodes:
            - nodeId: "1:2"
              nodeName: "Frame 1"
              suggestion: "Rename the frame semantically."
              autoFixable: false
      scope:
        type: "page"
        count: 1
        pageName: "Page 1"

lint_fix:
  description: >-
    Auto-fix lint violations that are marked as autoFixable.
    Pass the violations array from a lint_check result.
  toolset: lint
  write: true
  access: edit
  handler: custom
  params:
    violations:
      type: array
      required: true
      items: object
      description: Violations to fix (from lint_check result)
  response:
    type: object
    fields:
      fixed:
        type: number
        required: true
      failed:
        type: number
        required: true
      errors:
        type: array
        required: true
        items:
          type: object
          fields:
            nodeId:
              type: string
              required: true
            error:
              type: string
              required: true
  examples:
    - fixed: 2
      failed: 0
      errors: []

lint_rules:
  description: List all available lint rules with descriptions.
  toolset: lint
  write: false
  handler: bridge
  params: {}
  response:
    type: object
    fields:
      rules:
        type: array
        required: true
        items:
          type: object
          fields:
            name:
              type: string
              required: true
            description:
              type: string
              required: true
            category:
              type: string
              required: true
            severity:
              type: string
              required: true
  examples:
    - rules:
        - name: "default-name"
          description: "Flags default Figma layer names."
          category: "naming"
          severity: "warning"

compliance_report:
  description: >-
    Generate a comprehensive design system compliance report.
    Combines lint results, component audit, and token coverage into a single report.
  toolset: lint
  write: false
  handler: custom
  params:
    nodeIds:
      type: array
      items: string
      description: "Scope to specific nodes (default: entire page)"
    useStoredTokens:
      type: string
      description: Name of cached token set for lint
  response:
    type: object
    fields:
      overallScore:
        type: number
        required: true
      lint:
        type: object
        required: true
      components:
        type: object
        required: true
  examples:
    - overallScore: 92
      lint:
        score: 95
        nodesChecked: 20
        passed: 19
        violations: 1
      components:
        score: 89
        total: 8
        issues: 1

# ═══════════════════════════════════════════════════════════════
# TOOLSET: auth (3 tools)
# ═══════════════════════════════════════════════════════════════

figma_login:
  description: >-
    Start Figma OAuth 2.0 login. Returns an authorization URL for the user to open in their browser.
    Requires FIGMA_CLIENT_ID env var.
  toolset: auth
  write: false
  handler: custom
  params: {}
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      url:
        type: string
        required: true
      message:
        type: string
        required: true
  examples:
    - ok: true
      url: "https://www.figma.com/oauth?client_id=example"
      message: "Please open this URL in your browser to authorize figcraft with Figma."

figma_logout:
  description: Clear stored Figma OAuth credentials.
  toolset: auth
  write: false
  handler: custom
  params: {}
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      message:
        type: string
        required: true
  examples:
    - ok: true
      message: "Figma credentials cleared."

figma_auth_status:
  description: >-
    Check current Figma authentication status (pat, oauth, or none).
    NOTE: Auth status is NOT required before most operations — the plugin handles auth.
  toolset: auth
  write: false
  handler: custom
  params: {}
  response:
    type: object
    fields:
      method:
        type: string
        required: true
      expiresAt:
        type: number
  examples:
    - method: "oauth"
      expiresAt: 1893456000000

# ═══════════════════════════════════════════════════════════════
