# FigCraft Tool Schema — Single Source of Truth
#
# Defines ALL tools with metadata (toolset, write flag, access level, description, params).
# Tools with `handler: bridge` get auto-generated TypeScript (Zod + bridge.request).
# Tools with `handler: custom` keep their hand-written TypeScript but still
# contribute to the generated registry (CORE_TOOLS, TOOLSETS, WRITE_TOOLS).
#
# Run: npm run schema
#
# Access levels (3-tier access control via FIGCRAFT_ACCESS env var):
#   read   — read-only tools (write: false). Always allowed.
#   create — tools that add NEW content without modifying existing nodes.
#            Allowed when FIGCRAFT_ACCESS=create or edit (default).
#   edit   — tools that modify or delete EXISTING content.
#            Allowed only when FIGCRAFT_ACCESS=edit (default).
#
# The `access` field is only meaningful when `write: true`.
# If `write: true` and `access` is omitted, defaults to `edit` (most restrictive).
#
# Param types: string, number, boolean, enum, array, object, record, unknown, tuple, ref
#   enum   → values: [A, B, C]
#   array  → items: { type: string }  (or shorthand items: string)
#   object → fields: { key: { type: ..., description: ... } }
#   record → valueType: unknown
#   tuple  → items: [number, number]
#   ref    → ref: shared_definition_name

_param_definitions:
  node_role:
    type: enum
    values: [screen, header, hero, nav, content, list, row, stats, card, form, field, input, button, footer, actions, social_row, system_bar]
  node_type:
    type: enum
    values: [frame, text, rectangle, ellipse, line, vector, instance]
  node_spec:
    type: object
    fields:
      type:
        type: ref
        ref: node_type
        required: true
      name:
        type: string
      role:
        type: ref
        ref: node_role
      props:
        type: record
        valueType: unknown
      children:
        type: array
        items:
          type: ref
          ref: node_spec

# ═══════════════════════════════════════════════════════════════
# CORE TOOLS (~33 always enabled)
# ═══════════════════════════════════════════════════════════════

# ─── Connection & Mode ───

ping:
  description: >-
    Test connectivity to the Figma plugin through the WebSocket relay.
    Returns connection status, round-trip latency, and version check.
  toolset: core
  write: false
  handler: custom
  params:
    channel:
      type: string
      description: Channel ID (defaults to current channel)
  response:
    type: object
    fields:
      connected:
        type: boolean
        required: true
      latency:
        type: string
      serverVersion:
        type: string
      pluginVersion:
        type: string
      versionWarning:
        type: string
      error:
        type: string
      _hint:
        type: string
      result:
        type: record
        valueType: unknown
  examples:
    - connected: true
      latency: "18ms"
      serverVersion: "0.1.0"
      pluginVersion: "0.1.0"
      _hint: "Connection OK. Proceed with your task — do NOT stop here."
      result:
        ok: true
        channel: "design-1"
    - connected: false
      error: "Not connected to relay. Start the relay (npm run dev:relay) and open the Figma plugin."

get_mode:
  description: >-
    Get current mode, selected library, design context, and library components.
    Also verifies plugin connectivity (built-in ping).
    IMPORTANT: Call this before creating elements to get available design tokens and components.
    Returns { connected, mode, selectedLibrary, designContext, libraryComponents? }.
    designContext contains grouped tokens (text/surface/fill/border) and defaults mapping.
    libraryComponents (when library file URL is configured) lists available components with keys for create_instance.
  toolset: core
  write: false
  handler: custom
  params: {}
  response:
    type: object
    fields:
      connected:
        type: boolean
        required: true
      latency:
        type: string
      versionWarning:
        type: string
      mode:
        type: enum
        values: [library, spec]
      selectedLibrary:
        type: string
      designContext:
        type: record
        valueType: unknown
      libraryComponents:
        type: array
        items:
          type: object
          fields:
            key:
              type: string
              required: true
            name:
              type: string
              required: true
            description:
              type: string
              required: true
      libraryComponentsError:
        type: string
      libraryComponentsUnavailable:
        type: boolean
      _hint:
        type: string
      error:
        type: string
  examples:
    - connected: true
      latency: "24ms"
      mode: "library"
      selectedLibrary: "Acme DS"
      designContext:
        source: "library"
        collections:
          - name: "Color"
            key: "VariableCollectionId:1:2"
      libraryComponents:
        - key: "component-key"
          name: "Button / Primary"
          description: "Primary CTA button"
      _hint: "Library mode — tokens and components loaded. NEXT: Reply to user to gather missing preferences (UI type, platform). Do NOT call any more tools. If user provided everything, reply with design proposal instead."
    - connected: false
      error: "Not connected to Figma. Open the FigCraft plugin in Figma and try again."

set_mode:
  description: >-
    Switch operation mode between "library" (Figma shared library)
    and "spec" (DTCG design spec documents). Also updates the Plugin UI toggle.
    In library mode, optionally specify which library to use.
  toolset: core
  write: true
  access: create
  handler: custom
  params:
    mode:
      type: enum
      values: [library, spec]
      required: true
      description: Operation mode to switch to
    library:
      type: string
      description: 'Library name to use in library mode (from list_library_collections libraryName). Use "__local__" to select current file local styles/variables.'
  response:
    type: object
    fields:
      mode:
        type: enum
        values: [library, spec]
        required: true
      description:
        type: string
        required: true
  examples:
    - mode: "library"
      description: "Using Figma shared library as token source. Lint checks variable/style bindings."

join_channel:
  description: >-
    Switch to a different Figma plugin channel. Each Figma document runs its
    own plugin instance with a unique channel ID. Use this to target a specific document.
  toolset: core
  write: false
  handler: custom
  params:
    channel:
      type: string
      required: true
      description: The channel ID shown in the Figma plugin UI
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      channel:
        type: string
      message:
        type: string
      error:
        type: string
  examples:
    - ok: true
      channel: "design-1"
      message: "Joined channel \"design-1\". Commands will now target this document."

get_channel:
  description: Get the current channel ID that the MCP Server is connected to.
  toolset: core
  write: false
  handler: custom
  params: {}
  response:
    type: object
    fields:
      channel:
        type: string
        required: true
      connected:
        type: boolean
        required: true
  examples:
    - channel: "design-1"
      connected: true

# ─── Read Nodes ───

get_node_info:
  description: >-
    Get detailed information about a specific Figma node by ID,
    including layout, styles, variable bindings, and children.
  toolset: core
  write: false
  handler: custom
  params:
    nodeId:
      type: string
      required: true
      description: 'The Figma node ID (e.g. "1:23")'
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      type:
        type: string
        required: true
      x:
        type: number
      y:
        type: number
      width:
        type: number
      height:
        type: number
      children:
        type: array
        items:
          type: object
          fields:
            id:
              type: string
              required: true
            name:
              type: string
              required: true
            type:
              type: string
              required: true
      _error:
        type: string
      _sizeKB:
        type: number
      _limitKB:
        type: number
      method:
        type: string
      warning:
        type: string
      hints:
        type: array
        items: string
      _preview:
        type: string
  examples:
    - id: "1:23"
      name: "Login Screen"
      type: "FRAME"
      width: 402
      height: 874
      children:
        - id: "1:24"
          name: "Login Form"
          type: "FRAME"

get_current_page:
  description: >-
    Get the current page node tree (compressed).
    Returns page info and up to maxNodes top-level children with full style data.
    Use maxDepth to control tree traversal depth (default: 10).
    For large pages, use maxDepth=1 or 2 for a fast overview, then get_node_info for details.
  toolset: core
  write: false
  handler: custom
  params:
    maxNodes:
      type: number
      description: "Maximum number of top-level nodes to return (default: 200)"
    maxDepth:
      type: number
      description: "Maximum tree depth to traverse (default: 10). Use 1-2 for fast overview of large pages."
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      childCount:
        type: number
        required: true
      returnedNodes:
        type: number
        required: true
      truncated:
        type: boolean
      nodes:
        type: array
        required: true
        items:
          type: object
          fields:
            id:
              type: string
              required: true
            name:
              type: string
              required: true
            type:
              type: string
              required: true
      _error:
        type: string
      _sizeKB:
        type: number
      _limitKB:
        type: number
      method:
        type: string
      warning:
        type: string
      hints:
        type: array
        items: string
      _preview:
        type: string
  examples:
    - id: "0:1"
      name: "Page 1"
      childCount: 3
      returnedNodes: 2
      truncated: true
      nodes:
        - id: "1:10"
          name: "Dashboard"
          type: "FRAME"
        - id: "1:20"
          name: "Settings"
          type: "FRAME"

get_document_info:
  description: >-
    Get document overview: name, current page, and list of all pages.
    NOTE: For most tasks, prefer get_current_page (with maxDepth=1 for overview) instead — it returns actual node data.
    Use get_document_info only when you need to list all pages or switch pages.
  toolset: core
  write: false
  handler: custom
  params: {}
  response:
    type: object
    fields:
      name:
        type: string
        required: true
      currentPage:
        type: string
        required: true
      pages:
        type: array
        required: true
        items:
          type: object
          fields:
            id:
              type: string
              required: true
            name:
              type: string
              required: true
            childCount:
              type: number
              required: true
  examples:
    - name: "Acme Product"
      currentPage: "Page 1"
      pages:
        - id: "0:1"
          name: "Page 1"
          childCount: 12
        - id: "0:2"
          name: "Components"
          childCount: 48

get_selection:
  description: Get the currently selected nodes in Figma with full compressed data.
  toolset: core
  write: false
  handler: bridge
  params: {}
  response:
    type: object
    fields:
      count:
        type: number
        required: true
      nodes:
        type: array
        required: true
        items:
          type: object
          fields:
            id:
              type: string
              required: true
            name:
              type: string
              required: true
            type:
              type: string
              required: true
  examples:
    - count: 2
      nodes:
        - id: "1:10"
          name: "CTA Button"
          type: "FRAME"
        - id: "1:11"
          name: "Headline"
          type: "TEXT"

search_nodes:
  description: >-
    Search for nodes by name on the current page.
    Optionally filter by node type (FRAME, TEXT, RECTANGLE, etc.).
  toolset: core
  write: false
  handler: custom
  params:
    query:
      type: string
      required: true
      description: Search query (matches node name, case-insensitive)
    types:
      type: array
      items: string
      description: 'Filter by node types (e.g. ["FRAME", "TEXT"])'
    limit:
      type: number
      description: "Maximum results to return (default: 50)"
  response:
    type: object
    fields:
      count:
        type: number
        required: true
      nodes:
        type: array
        required: true
        items:
          type: object
          fields:
            id:
              type: string
              required: true
            name:
              type: string
              required: true
            type:
              type: string
              required: true
      _error:
        type: string
      _sizeKB:
        type: number
      _limitKB:
        type: number
      method:
        type: string
      warning:
        type: string
      hints:
        type: array
        items: string
      _preview:
        type: string
  examples:
    - count: 2
      nodes:
        - id: "1:10"
          name: "Login Button"
          type: "FRAME"
        - id: "1:11"
          name: "Login Title"
          type: "TEXT"

list_fonts:
  description: >-
    List available font families in the Figma environment.
    Pass family to get all available styles for that family.
    Use before create_text to ensure the chosen font is available.
  toolset: core
  write: false
  handler: bridge
  params:
    family:
      type: string
      description: Font family name to get available styles for
  response:
    type: object
    fields:
      family:
        type: string
      styles:
        type: array
        items: string
      count:
        type: number
      families:
        type: array
        items: string
      total:
        type: number
  examples:
    - families:
        - "Inter"
        - "SF Pro Display"
        - "JetBrains Mono"
      total: 3
    - family: "Inter"
      styles:
        - "Regular"
        - "Medium"
        - "Bold"
      count: 3

# ─── Write Nodes (primary) ───

create_document:
  description: >-
    Batch-create a tree of nodes in one call.
    PREFERRED over multiple create_frame/create_text calls — minimizes round-trips and is much faster.
    Supports 7 levels of nesting (screen → section → card → row → component → element → content)
    and 7 node types: frame, text, rectangle, ellipse, line, vector, instance.
    Use vector type with props.svg to inline SVG icons directly in the batch tree.
    Use instance type with props.componentKey or props.componentId to inline component instances
    (supports props.properties for variant overrides).
    Frame props support layoutSizingHorizontal/layoutSizingVertical (FIXED/HUG/FILL) for intuitive sizing control.
    Use role on semantic frames (screen/header/hero/nav/content/list/row/stats/card/form/button/input/footer/etc.) to reduce name-based misclassification.
    Explicit roles apply the same shared safety defaults used by create_screen, and marginHorizontal / marginLeft / marginRight
    are converted into transparent inset wrappers automatically.
    By default, FigCraft runs a scoped post-create lint/fix pass on the newly created root nodes.
    Treat this as the raw tree path. For complete screens, prefer create_screen; use create_document for partial inserts or
    low-level control.
    PREREQUISITE: You MUST call get_mode first to load design tokens. Without it, elements will lack token bindings.
  toolset: core
  write: true
  access: create
  handler: custom
  params:
    parentId:
      type: string
      description: Parent node ID. Omit to add to current page.
    nodes:
      type: array
      required: true
      items:
        type: ref
        ref: node_spec
      description: Array of node specs (supports 7 levels of nesting)
    autoLint:
      type: boolean
      description: Run scoped post-create lint/fix on the created root nodes (default true)
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      error:
        type: string
      created:
        type: array
        items:
          type: object
          fields:
            id:
              type: string
              required: true
            name:
              type: string
              required: true
            type:
              type: string
              required: true
      truncated:
        type: boolean
      warnings:
        type: array
        items: string
      errors:
        type: array
        items:
          type: object
          fields:
            index:
              type: number
              required: true
            name:
              type: string
            type:
              type: string
              required: true
            error:
              type: string
              required: true
      postCreateLint:
        type: record
        valueType: unknown
  examples:
    - ok: true
      created:
        - id: "12:34"
          name: "Auth Screen"
          type: "FRAME"
      postCreateLint:
        scopedNodeIds: ["12:34"]
        initial:
          violations: 0
        final:
          violations: 0
    - ok: false
      error: "nodes array must not be empty"

create_screen:
  description: >-
    Create a full screen progressively: first the screen shell, then each section,
    then a final scoped lint/fix pass.
    Preferred for complete screens when quality matters more than a single raw tree call.
    The shell defaults to role=screen and gets platform size presets when width/height are omitted.
    Supports semantic sections like hero/content/card and inset wrapper helpers for filled children.
    This is the default high-level screen workflow used by the generation benchmark and release gate.
  toolset: core
  write: true
  access: create
  handler: custom
  params:
    name:
      type: string
      description: 'Screen name (default: "Screen")'
    parentId:
      type: string
      description: Parent node ID. Omit to add to current page.
    platform:
      type: enum
      values: [ios, android, web]
      description: Platform preset for the screen shell
    hasSystemBar:
      type: boolean
      description: Apply full-bleed system bar shell defaults
    wrapInSection:
      type: boolean
      description: Create a Figma Section around the finished screen
    shell:
      type: ref
      ref: node_spec
      description: Root screen node spec. Defaults to a frame with role=screen if omitted.
    sections:
      type: array
      items:
        type: ref
        ref: node_spec
      description: Section node specs appended to the screen root one by one
    autoLint:
      type: boolean
      description: Run scoped lint/fix after shell and each section (default true)
    finalLint:
      type: boolean
      description: Run one final scoped lint/fix pass on the complete screen root (default true)
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      error:
        type: string
      failedStage:
        type: string
      screenRootId:
        type: string
      screen:
        type: record
        valueType: unknown
      canvasSection:
        type: record
        valueType: unknown
      sections:
        type: array
        items:
          type: object
          fields:
            index:
              type: number
              required: true
            name:
              type: string
            ok:
              type: boolean
              required: true
            result:
              type: record
              valueType: unknown
      pipelineStages:
        type: array
        items:
          type: object
          fields:
            stage:
              type: string
              required: true
            ok:
              type: boolean
              required: true
            createdCount:
              type: number
              required: true
            nodeIds:
              type: array
              items: string
            lint:
              type: record
              valueType: unknown
            warningCount:
              type: number
            patchCallCount:
              type: number
            patchNodeCount:
              type: number
            patchRules:
              type: array
              items: string
            structuralErrors:
              type: array
              items: object
            debugStats:
              type: record
              valueType: unknown
      pipelineSummary:
        type: record
        valueType: unknown
      finalLint:
        type: record
        valueType: unknown
  examples:
    - ok: true
      screenRootId: "20:1"
      screen:
        ok: true
        created:
          - id: "20:1"
            name: "Marketing Hero"
            type: "FRAME"
      sections:
        - index: 0
          name: "Hero Section"
          ok: true
          result:
            ok: true
            created:
              - id: "20:2"
                name: "Hero Content"
                type: "FRAME"
      pipelineStages:
        - stage: "shell"
          ok: true
          createdCount: 1
          nodeIds:
            - "20:1"
          warningCount: 0
          patchCallCount: 0
          patchNodeCount: 0
          patchRules: []
          structuralErrors: []
          debugStats: {}
        - stage: "section:1"
          ok: true
          createdCount: 1
          nodeIds:
            - "20:2"
          warningCount: 0
          patchCallCount: 0
          patchNodeCount: 0
          patchRules: []
          structuralErrors: []
          debugStats: {}
      pipelineSummary:
        stageCount: 2
        createdCount: 2
        warningCount: 0
        remaining: 0
      finalLint:
        scopedNodeIds:
          - "20:1"
        remaining: 0
    - ok: false
      error: "create_screen could not determine the created screen root"

create_frame:
  description: >-
    Create a new frame (optionally with auto layout). Returns the created node data.
    When a design library is selected and fill is not specified, auto-binds the default surface color token.
  toolset: core
  write: true
  access: create
  handler: bridge
  params:
    name:
      type: string
      description: Frame name
    x:
      type: number
      description: X position
    y:
      type: number
      description: Y position
    width:
      type: number
      description: "Width in px (default: 100)"
    height:
      type: number
      description: "Height in px (default: 100)"
    parentId:
      type: string
      description: Parent node ID to append to
    autoLayout:
      type: boolean
      description: Enable auto layout
    layoutDirection:
      type: enum
      values: [HORIZONTAL, VERTICAL]
      description: Auto layout direction
    itemSpacing:
      type: number
      description: Spacing between items
    padding:
      type: number
      description: Uniform padding
    paddingLeft:
      type: number
      description: Left padding (overrides uniform padding)
    paddingRight:
      type: number
      description: Right padding (overrides uniform padding)
    paddingTop:
      type: number
      description: Top padding (overrides uniform padding)
    paddingBottom:
      type: number
      description: Bottom padding (overrides uniform padding)
    primaryAxisAlignItems:
      type: enum
      values: [MIN, CENTER, MAX, SPACE_BETWEEN]
      description: "Main axis alignment (default: MIN)"
    counterAxisAlignItems:
      type: enum
      values: [MIN, CENTER, MAX]
      description: "Cross axis alignment (default: MIN). Use CENTER to vertically center children in HORIZONTAL layout."
    layoutSizingHorizontal:
      type: enum
      values: [FIXED, HUG, FILL]
      description: "Horizontal sizing mode. FIXED=use explicit width, HUG=shrink to content, FILL=expand to fill parent. More intuitive than layoutAlign/layoutGrow. Default: FIXED if width set, HUG otherwise."
    layoutSizingVertical:
      type: enum
      values: [FIXED, HUG, FILL]
      description: "Vertical sizing mode. FIXED=use explicit height, HUG=shrink to content, FILL=expand to fill parent. More intuitive than layoutAlign/layoutGrow. Default: FIXED if height set, HUG otherwise."
    fill:
      type: string
      description: 'Fill color as hex (e.g. "#FF0000")'
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      type:
        type: string
        required: true
      x:
        type: number
      y:
        type: number
      width:
        type: number
      height:
        type: number
      layoutMode:
        type: string
      itemSpacing:
        type: number
      autoBound:
        type: string
      colorHint:
        type: string
      warnings:
        type: array
        items: string
  examples:
    - id: "30:1"
      name: "Card Frame"
      type: "FRAME"
      x: 64
      y: 120
      width: 320
      height: 180
      layoutMode: "VERTICAL"
      itemSpacing: 16
      autoBound: "surface/default"

create_text:
  description: >-
    Create a text node with specified content and font.
    When a design library is selected: auto-applies matching Text Style if discovered in current page,
    falls back to typography variable binding (fontSize/fontFamily/fontWeight/lineHeight),
    and auto-binds text/primary color if fill not specified.
  toolset: core
  write: true
  access: create
  handler: bridge
  params:
    content:
      type: string
      required: true
      description: Text content
    name:
      type: string
      description: Node name
    x:
      type: number
      description: X position
    y:
      type: number
      description: Y position
    fontSize:
      type: number
      description: "Font size (default: 16)"
    fontFamily:
      type: string
      description: "Font family (default: Inter)"
    fontStyle:
      type: string
      description: "Font style (default: Regular)"
    fill:
      type: string
      description: Text color as hex
    parentId:
      type: string
      description: Parent node ID
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      type:
        type: string
        required: true
      x:
        type: number
      y:
        type: number
      width:
        type: number
      height:
        type: number
      characters:
        type: string
      fontSize:
        type: number
      autoBound:
        type: record
        valueType: unknown
      colorHint:
        type: string
  examples:
    - id: "30:2"
      name: "Hero Title"
      type: "TEXT"
      x: 88
      y: 164
      width: 220
      height: 40
      characters: "Ship Faster"
      fontSize: 32
      autoBound:
        color: "text/primary"
        typography: "style:Heading/L"
    - id: "30:3"
      name: "Body Copy"
      type: "TEXT"
      characters: "Build polished screens with AI."
      fontSize: 16

patch_nodes:
  description: >-
    Update properties on one or more existing nodes.
    Supports: x, y, name, visible, opacity, cornerRadius, resize, fills (hex string), strokes (hex string), strokeWeight,
    effects (raw Figma effect array), layoutMode (NONE/HORIZONTAL/VERTICAL), layoutAlign, layoutGrow,
    primaryAxisAlignItems, counterAxisAlignItems, itemSpacing, paddingLeft/Right/Top/Bottom,
    layoutSizingHorizontal (FIXED/HUG/FILL), layoutSizingVertical (FIXED/HUG/FILL),
    fontSize, fontName ({family,style}), rotation, constraints ({horizontal,vertical}),
    blendMode, isMask (boolean), clipsContent (boolean), minWidth, minHeight.
  toolset: core
  write: true
  access: edit
  handler: bridge
  params:
    patches:
      type: array
      required: true
      items:
        type: object
        fields:
          nodeId:
            type: string
            required: true
            description: Node ID
          props:
            type: record
            required: true
            valueType: unknown
            description: Properties to update
      description: Array of node patches
  response:
    type: object
    fields:
      results:
        type: array
        required: true
        items:
          type: object
          fields:
            nodeId:
              type: string
              required: true
            ok:
              type: boolean
              required: true
            error:
              type: string
  examples:
    - results:
        - nodeId: "30:1"
          ok: true
        - nodeId: "30:2"
          ok: false
          error: "Node not found"

delete_nodes:
  description: Delete multiple nodes by ID in one call. Preferred over multiple delete_node calls.
  toolset: core
  write: true
  access: edit
  handler: bridge
  params:
    nodeIds:
      type: array
      required: true
      items: string
      description: Array of node IDs to delete
  response:
    type: object
    fields:
      results:
        type: array
        required: true
        items:
          type: object
          fields:
            nodeId:
              type: string
              required: true
            ok:
              type: boolean
              required: true
            error:
              type: string
  examples:
    - results:
        - nodeId: "30:1"
          ok: true
        - nodeId: "999:1"
          ok: false
          error: "Node not found"

set_text_content:
  description: Update the text content of an existing text node.
  toolset: core
  write: true
  access: edit
  handler: bridge
  params:
    nodeId:
      type: string
      required: true
      description: Text node ID
    content:
      type: string
      required: true
      description: New text content
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      error:
        type: string
  examples:
    - ok: true

clone_node:
  description: Clone a node and return the new copy.
  toolset: core
  write: true
  access: create
  handler: bridge
  params:
    nodeId:
      type: string
      required: true
      description: Node ID to clone
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      type:
        type: string
        required: true
      x:
        type: number
      y:
        type: number
      width:
        type: number
      height:
        type: number
  examples:
    - id: "60:1"
      name: "Cloned Card"
      type: "FRAME"
      width: 320
      height: 180

insert_child:
  description: Move a node into a parent container, optionally at a specific index.
  toolset: core
  write: true
  access: edit
  handler: bridge
  params:
    parentId:
      type: string
      required: true
      description: Parent node ID (must be a container like Frame)
    childId:
      type: string
      required: true
      description: Child node ID to insert
    index:
      type: number
      description: Insert position (0-based). Omit to append at end.
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      error:
        type: string
  examples:
    - ok: true

# ─── Components (read — core) ───

list_components:
  description: List all components on the current page.
  toolset: core
  write: false
  handler: bridge
  params: {}
  response:
    type: object
    fields:
      count:
        type: number
        required: true
      components:
        type: array
        required: true
        items:
          type: object
          fields:
            id:
              type: string
              required: true
            name:
              type: string
              required: true
            description:
              type: string
            key:
              type: string
  examples:
    - count: 2
      components:
        - id: "12:1"
          name: "Button / Primary"
          description: "Main call-to-action button"
          key: "button-primary-key"
        - id: "12:2"
          name: "Input / Default"
          key: "input-default-key"

list_library_components:
  description: >-
    List published components from a library file via REST API.
    Returns component key, name, description. Use the key with create_instance.
    Requires library file URL to be configured in the plugin panel, or provide fileKey directly.
  toolset: core
  write: false
  handler: custom
  params:
    fileKey:
      type: string
      description: "Figma file key. If omitted, uses the key from the selected library's configured URL."
  response:
    type: object
    fields:
      count:
        type: number
        required: true
      components:
        type: array
        required: true
        items:
          type: object
          fields:
            key:
              type: string
              required: true
            name:
              type: string
              required: true
            description:
              type: string
  examples:
    - count: 2
      components:
        - key: "library-button-primary"
          name: "Button / Primary"
          description: "Primary CTA button"
        - key: "library-input-default"
          name: "Input / Default"
          description: "Default text field"

list_component_properties:
  description: >-
    List all properties and variant options exposed by a component or component set.
    Use this to discover available variant values before calling create_instance with properties.
  toolset: core
  write: false
  handler: bridge
  params:
    nodeId:
      type: string
      required: true
      description: Component or ComponentSet node ID
  response:
    type: object
    fields:
      properties:
        type: array
        required: true
        items:
          type: object
          fields:
            key:
              type: string
              required: true
            type:
              type: string
              required: true
            defaultValue:
              type: unknown
            variantOptions:
              type: array
              items: string
  examples:
    - properties:
        - key: "State"
          type: "VARIANT"
          defaultValue: "Default"
          variantOptions: ["Default", "Pressed", "Disabled"]
        - key: "Has Icon"
          type: "BOOLEAN"
          defaultValue: false

get_component:
  description: Get full details of a component by node ID.
  toolset: core
  write: false
  handler: bridge
  params:
    nodeId:
      type: string
      required: true
      description: Component node ID
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      type:
        type: string
        required: true
      width:
        type: number
      height:
        type: number
      description:
        type: string
      key:
        type: string
      children:
        type: array
        items:
          type: object
          fields:
            id:
              type: string
              required: true
            name:
              type: string
              required: true
            type:
              type: string
              required: true
      componentPropertyDefinitions:
        type: record
        valueType: unknown
  examples:
    - id: "12:1"
      name: "Button / Primary"
      type: "COMPONENT"
      width: 160
      height: 48
      description: "Main call-to-action button"
      key: "button-primary-key"
      componentPropertyDefinitions:
        State#1:
          type: "VARIANT"
          defaultValue: "Default"

create_instance:
  description: >-
    Create an instance of a component.
    Can use either a local component ID or a library component key.
  toolset: core
  write: true
  access: create
  handler: bridge
  params:
    componentId:
      type: string
      description: Local component node ID
    componentKey:
      type: string
      description: Library component key (for imports)
    properties:
      type: record
      valueType: string
      description: Variant/property overrides
    parentId:
      type: string
      description: Parent node ID to append to
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      type:
        type: string
        required: true
      x:
        type: number
      y:
        type: number
      width:
        type: number
      height:
        type: number
      componentPropertyReferences:
        type: record
        valueType: string
      error:
        type: string
  examples:
    - id: "40:1"
      name: "Button / Primary"
      type: "INSTANCE"
      width: 160
      height: 48

# ─── Lint (batch — core) ───

lint_fix_all:
  description: >-
    Run lint on the page/selection, then auto-fix all fixable violations in one call.
    Returns the lint report and fix results. Equivalent to lint_check + lint_fix.
  toolset: core
  write: true
  access: create
  handler: custom
  params:
    nodeIds:
      type: array
      items: string
      description: "Node IDs to lint (default: selection or page)"
    rules:
      type: array
      items: string
      description: "Rule names to run (default: all)"
    categories:
      type: array
      items: string
      description: "Rule categories: token, layout, naming, wcag, component"
    useStoredTokens:
      type: string
      description: Name of cached token set to use
    annotate:
      type: boolean
      description: Add annotations to remaining (unfixable) violations
    maxViolations:
      type: number
      description: "Stop collecting after this many violations (performance optimization for large pages)"
  response:
    type: object
    fields:
      lint:
        type: object
        required: true
        fields:
          total:
            type: number
            required: true
          pass:
            type: number
            required: true
          violations:
            type: number
            required: true
          bySeverity:
            type: record
            valueType: unknown
      fixable:
        type: number
        required: true
      fixed:
        type: number
        required: true
      fixFailed:
        type: number
        required: true
      remaining:
        type: number
        required: true
  examples:
    - lint:
        total: 24
        pass: 20
        violations: 4
        bySeverity:
          warning: 3
          error: 1
      fixable: 3
      fixed: 3
      fixFailed: 0
      remaining: 1

# ─── Pages (core) ───

set_current_page:
  description: >-
    Switch to a different page by name or ID.
    Warning: this changes the context for all subsequent operations.
  toolset: core
  write: false
  handler: bridge
  params:
    nameOrId:
      type: string
      required: true
      description: Page name or page ID
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      pageId:
        type: string
      pageName:
        type: string
      error:
        type: string
  examples:
    - ok: true
      pageId: "0:2"
      pageName: "Components"

# ─── Export (core) ───

export_image:
  description: Export a Figma node as an image. Returns base64-encoded image data.
  toolset: core
  write: false
  handler: custom
  params:
    nodeId:
      type: string
      required: true
      description: The node ID to export
    format:
      type: enum
      values: [PNG, SVG, PDF, JPG]
      description: "Export format (default: PNG)"
    scale:
      type: number
      description: "Export scale for raster formats (default: 2)"
  response:
    type: object
    fields:
      format:
        type: string
        required: true
      size:
        type: number
        required: true
      base64:
        type: string
        required: true
  examples:
    - format: "PNG"
      size: 18432
      base64: "iVBORw0KGgoAAAANSUhEUgAAAAUA"

# ─── Version (core) ───

save_version_history:
  description: >-
    Save a named version history snapshot of the current Figma file.
    Use before making significant changes so you can restore if needed.
  toolset: core
  write: true
  access: create
  handler: bridge
  params:
    title:
      type: string
      required: true
      description: 'Snapshot title (e.g. "Before refactor")'
    description:
      type: string
      description: Optional description of what was done
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      title:
        type: string
        required: true
      description:
        type: string
        required: true
  examples:
    - ok: true
      title: "Before refactor"
      description: "Checkpoint before layout cleanup"

# ─── Selection (core) ───

set_selection:
  description: >-
    Set the current selection to specific nodes and optionally scroll them into view.
    Nodes must be on the current page.
  toolset: core
  write: false
  handler: bridge
  params:
    nodeIds:
      type: array
      required: true
      items: string
      description: Node IDs to select
    scrollIntoView:
      type: boolean
      description: "Scroll viewport to show selected nodes (default: true)"
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      selectedCount:
        type: number
        required: true
      notFound:
        type: array
        required: true
        items: string
  examples:
    - ok: true
      selectedCount: 2
      notFound: []
    - ok: true
      selectedCount: 1
      notFound:
        - "999:1"

# ─── Shapes & Vectors (core) ───

create_rectangle:
  description: Create a rectangle node. Supports fill, corner radius, and stroke.
  toolset: core
  write: true
  access: create
  handler: bridge
  params:
    name:
      type: string
      description: Node name
    x:
      type: number
      description: X position
    y:
      type: number
      description: Y position
    width:
      type: number
      description: "Width in px (default: 100)"
    height:
      type: number
      description: "Height in px (default: 100)"
    parentId:
      type: string
      description: Parent node ID
    fill:
      type: string
      description: Fill color as hex
    cornerRadius:
      type: number
      description: Corner radius
    stroke:
      type: string
      description: Stroke color as hex
    strokeWeight:
      type: number
      description: "Stroke weight (default: 1)"
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      type:
        type: string
        required: true
      x:
        type: number
      y:
        type: number
      width:
        type: number
      height:
        type: number
      cornerRadius:
        type: unknown
      autoBound:
        type: string
      colorHint:
        type: string
  examples:
    - id: "50:1"
      name: "Card Background"
      type: "RECTANGLE"
      width: 320
      height: 180
      cornerRadius: 24
      autoBound: "surface/default"

create_ellipse:
  description: Create an ellipse (circle) node. Supports fill and stroke.
  toolset: core
  write: true
  access: create
  handler: bridge
  params:
    name:
      type: string
      description: Node name
    x:
      type: number
      description: X position
    y:
      type: number
      description: Y position
    width:
      type: number
      description: "Width in px (default: 100)"
    height:
      type: number
      description: "Height in px (default: 100, same as width for circle)"
    parentId:
      type: string
      description: Parent node ID
    fill:
      type: string
      description: Fill color as hex
    stroke:
      type: string
      description: Stroke color as hex
    strokeWeight:
      type: number
      description: "Stroke weight (default: 1)"
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      type:
        type: string
        required: true
      x:
        type: number
      y:
        type: number
      width:
        type: number
      height:
        type: number
      autoBound:
        type: string
      colorHint:
        type: string
  examples:
    - id: "50:2"
      name: "Avatar Dot"
      type: "ELLIPSE"
      width: 40
      height: 40
      autoBound: "surface/accent"

create_vector:
  description: >-
    Create a vector node from an SVG string.
    Accepts a complete SVG element (e.g. '<svg>...</svg>').
    The SVG is parsed and converted to Figma vector paths.
  toolset: core
  write: true
  access: create
  handler: bridge
  params:
    svg:
      type: string
      required: true
      description: 'Complete SVG string (e.g. "<svg width=\"24\" height=\"24\">...</svg>")'
    name:
      type: string
      description: 'Node name (default: "Vector")'
    x:
      type: number
      description: X position
    y:
      type: number
      description: Y position
    resize:
      type: tuple
      items: [number, number]
      description: Resize to [width, height] after creation
    parentId:
      type: string
      description: Parent node ID
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      type:
        type: string
        required: true
      x:
        type: number
      y:
        type: number
      width:
        type: number
      height:
        type: number
  examples:
    - id: "70:1"
      name: "Arrow Icon"
      type: "FRAME"
      width: 24
      height: 24

set_image_fill:
  description: >-
    Set a node's fill to an image. Provide base64-encoded image data (PNG/JPG).
    Use export_image to get image data from another node, or provide external image data.
  toolset: core
  write: true
  access: edit
  handler: bridge
  params:
    nodeId:
      type: string
      required: true
      description: Target node ID
    imageData:
      type: string
      required: true
      description: Base64-encoded image data (PNG or JPG)
    scaleMode:
      type: enum
      values: [FILL, FIT, CROP, TILE]
      description: "Image scale mode (default: FILL)"
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      imageHash:
        type: string
      error:
        type: string
  examples:
    - ok: true
      imageHash: "b2f7c1d4a9"

# ═══════════════════════════════════════════════════════════════
# TOOLSET: variables (18 tools)
# ═══════════════════════════════════════════════════════════════

list_variables:
  description: >-
    List all local Figma variables, optionally filtered by collection or type.
    Returns variable name, type, scopes, and values per mode.
  toolset: variables
  write: false
  handler: bridge
  params:
    collectionId:
      type: string
      description: Filter by variable collection ID
    type:
      type: string
      description: "Filter by resolved type: COLOR, FLOAT, STRING, BOOLEAN"
  response:
    type: object
    fields:
      count:
        type: number
        required: true
      variables:
        type: array
        required: true
        items:
          type: object
          fields:
            id:
              type: string
              required: true
            name:
              type: string
              required: true
            resolvedType:
              type: string
              required: true
            description:
              type: string
            collectionId:
              type: string
              required: true
            collectionName:
              type: string
              required: true
            scopes:
              type: array
              required: true
              items: string
            valuesByMode:
              type: record
              required: true
              valueType: unknown
  examples:
    - count: 1
      variables:
        - id: "VariableID:1:12"
          name: "color/brand/primary"
          resolvedType: "COLOR"
          description: "Primary brand color"
          collectionId: "VariableCollectionId:1:2"
          collectionName: "Primitives"
          scopes: ["ALL_FILLS"]
          valuesByMode:
            Default: "#7c3aed"

get_variable:
  description: >-
    Get detailed info for a specific variable by ID,
    including values per mode, scopes, and code syntax.
  toolset: variables
  write: false
  handler: bridge
  params:
    variableId:
      type: string
      required: true
      description: The Figma variable ID
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      resolvedType:
        type: string
        required: true
      description:
        type: string
      collectionId:
        type: string
        required: true
      collectionName:
        type: string
      scopes:
        type: array
        required: true
        items: string
      codeSyntax:
        type: unknown
      valuesByMode:
        type: record
        required: true
        valueType: unknown
      error:
        type: string
  examples:
    - id: "VariableID:1:12"
      name: "color/brand/primary"
      resolvedType: "COLOR"
      description: "Primary brand color"
      collectionId: "VariableCollectionId:1:2"
      collectionName: "Primitives"
      scopes: ["ALL_FILLS"]
      codeSyntax:
        WEB: "var(--color-brand-primary)"
      valuesByMode:
        Default: "#7c3aed"

list_collections:
  description: List all local variable collections with their modes and variable counts.
  toolset: variables
  write: false
  handler: bridge
  params: {}
  response:
    type: array
    items:
      type: object
      fields:
        id:
          type: string
          required: true
        name:
          type: string
          required: true
        modes:
          type: array
          required: true
          items:
            type: object
            fields:
              modeId:
                type: string
                required: true
              name:
                type: string
                required: true
        variableCount:
          type: number
          required: true
  examples:
    - - id: "VariableCollectionId:1:2"
        name: "Primitives"
        modes:
          - modeId: "1:0"
            name: "Default"
        variableCount: 12

get_node_variables:
  description: Get all variable bindings on a node — shows which variables are bound to which properties.
  toolset: variables
  write: false
  handler: bridge
  params:
    nodeId:
      type: string
      required: true
      description: Node ID to inspect for variable bindings
  response:
    type: object
    fields:
      nodeId:
        type: string
        required: true
      bindings:
        type: object
        required: true
      error:
        type: string
  examples:
    - nodeId: "1:24"
      bindings:
        fills:
          - variableId: "VariableID:1:12"
            variableName: "color/brand/primary"
            collectionId: "VariableCollectionId:1:2"

set_variable_binding:
  description: 'Bind a variable to a specific property on a node (e.g. fills, cornerRadius, itemSpacing).'
  toolset: variables
  write: true
  access: edit
  handler: bridge
  params:
    nodeId:
      type: string
      required: true
      description: Target node ID
    field:
      type: string
      required: true
      description: 'Property field to bind (e.g. "fills", "cornerRadius", "itemSpacing")'
    variableId:
      type: string
      required: true
      description: Variable ID to bind
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      error:
        type: string
  examples:
    - ok: true

set_explicit_variable_mode:
  description: >-
    Set an explicit variable mode on a node for a specific collection.
    This overrides the inherited mode.
  toolset: variables
  write: true
  access: edit
  handler: bridge
  params:
    nodeId:
      type: string
      required: true
      description: Node ID
    collectionId:
      type: string
      required: true
      description: Variable collection ID
    modeId:
      type: string
      required: true
      description: Mode ID to set (get available modes from list_collections)
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      error:
        type: string
  examples:
    - ok: true

create_variable:
  description: Create a new Figma variable in a collection.
  toolset: variables
  write: true
  access: create
  handler: bridge
  params:
    name:
      type: string
      required: true
      description: Variable name
    collectionId:
      type: string
      required: true
      description: Target variable collection ID
    resolvedType:
      type: enum
      values: [COLOR, FLOAT, STRING, BOOLEAN]
      required: true
      description: Variable type
    value:
      type: unknown
      description: Initial value for the default mode
    modeId:
      type: string
      description: Mode ID to set the value for (defaults to first mode)
    description:
      type: string
      description: Variable description
    scopes:
      type: array
      items: string
      description: "Variable scopes (e.g. ALL_FILLS, CORNER_RADIUS)"
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      resolvedType:
        type: string
        required: true
      error:
        type: string
  examples:
    - id: "VariableID:1:30"
      name: "spacing/md"
      resolvedType: "FLOAT"

update_variable:
  description: Update properties of an existing variable (name, description, scopes, value).
  toolset: variables
  write: true
  access: edit
  handler: bridge
  params:
    variableId:
      type: string
      required: true
      description: Variable ID to update
    name:
      type: string
      description: New variable name
    description:
      type: string
      description: New description
    scopes:
      type: array
      items: string
      description: New scopes array
    value:
      type: unknown
      description: New value (requires modeId)
    modeId:
      type: string
      description: Mode ID for the value update
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      id:
        type: string
      error:
        type: string
  examples:
    - ok: true
      id: "VariableID:1:30"

delete_variable:
  description: Delete a variable by ID.
  toolset: variables
  write: true
  access: edit
  handler: bridge
  params:
    variableId:
      type: string
      required: true
      description: Variable ID to delete
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      error:
        type: string
  examples:
    - ok: true

create_collection:
  description: Create a new variable collection. Returns the collection ID and default mode.
  toolset: variables
  write: true
  access: create
  handler: bridge
  params:
    name:
      type: string
      required: true
      description: Collection name
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      modes:
        type: array
        required: true
        items:
          type: object
          fields:
            modeId:
              type: string
              required: true
            name:
              type: string
              required: true
  examples:
    - id: "VariableCollectionId:1:2"
      name: "Semantic"
      modes:
        - modeId: "1:0"
          name: "Mode 1"

delete_collection:
  description: Delete a variable collection by ID.
  toolset: variables
  write: true
  access: edit
  handler: bridge
  params:
    collectionId:
      type: string
      required: true
      description: Collection ID to delete
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      error:
        type: string
  examples:
    - ok: true

rename_collection:
  description: Rename a variable collection.
  toolset: variables
  write: true
  access: edit
  handler: bridge
  params:
    collectionId:
      type: string
      required: true
      description: Collection ID
    name:
      type: string
      required: true
      description: New collection name
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      id:
        type: string
      name:
        type: string
      error:
        type: string
  examples:
    - ok: true
      id: "VariableCollectionId:1:2"
      name: "Semantic"

add_collection_mode:
  description: Add a new mode to a variable collection. Returns the new mode ID.
  toolset: variables
  write: true
  access: create
  handler: bridge
  params:
    collectionId:
      type: string
      required: true
      description: Collection ID
    name:
      type: string
      required: true
      description: 'Mode name (e.g. "Dark", "Compact")'
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      modeId:
        type: string
      name:
        type: string
      error:
        type: string
  examples:
    - ok: true
      modeId: "1:1"
      name: "Dark"

rename_collection_mode:
  description: Rename an existing mode in a variable collection.
  toolset: variables
  write: true
  access: edit
  handler: bridge
  params:
    collectionId:
      type: string
      required: true
      description: Collection ID
    modeId:
      type: string
      required: true
      description: Mode ID to rename
    name:
      type: string
      required: true
      description: New mode name
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      error:
        type: string
  examples:
    - ok: true

remove_collection_mode:
  description: Remove a mode from a variable collection. Cannot remove the last remaining mode.
  toolset: variables
  write: true
  access: edit
  handler: bridge
  params:
    collectionId:
      type: string
      required: true
      description: Collection ID
    modeId:
      type: string
      required: true
      description: Mode ID to remove
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      error:
        type: string
  examples:
    - ok: true

create_variable_alias:
  description: >-
    Set a variable's value to reference another variable (alias).
    Both variables must have the same resolved type.
    This is how Figma implements semantic tokens (e.g. "text/primary" → "gray/900").
  toolset: variables
  write: true
  access: edit
  handler: bridge
  params:
    variableId:
      type: string
      required: true
      description: Variable ID to set as alias
    targetVariableId:
      type: string
      required: true
      description: Target variable ID to reference
    modeId:
      type: string
      description: Mode ID (defaults to first mode)
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      variableId:
        type: string
      aliasTo:
        type: string
      error:
        type: string
  examples:
    - ok: true
      variableId: "VariableID:1:40"
      aliasTo: "color/brand/primary"

export_variables:
  description: >-
    Export all Figma variables as DTCG-compatible flat list.
    Resolves aliases to {path} references. Use this for reverse sync (Figma → DTCG file).
  toolset: variables
  write: false
  handler: bridge
  params:
    collectionId:
      type: string
      description: Filter by collection ID. Omit to export all.
  response:
    type: object
    fields:
      count:
        type: number
        required: true
      variables:
        type: array
        required: true
        items:
          type: object
          fields:
            path:
              type: string
              required: true
            type:
              type: string
              required: true
            valuesByMode:
              type: record
              required: true
              valueType: unknown
            description:
              type: string
            scopes:
              type: array
              items: string
            aliasOf:
              type: record
              valueType: string
  examples:
    - count: 1
      variables:
        - path: "color.brand.primary"
          type: "color"
          valuesByMode:
            Default: "#7c3aed"
          description: "Primary brand color"
          scopes: ["ALL_FILLS"]

batch_create_variables:
  description: >-
    Create multiple variables at once from an in-memory array.
    Faster than calling create_variable repeatedly.
    Automatically creates the collection if it doesn't exist.
  toolset: variables
  write: true
  access: create
  handler: bridge
  params:
    collectionName:
      type: string
      required: true
      description: Collection name (created if not exists)
    modeName:
      type: string
      description: 'Mode name (default: "Default")'
    variables:
      type: array
      required: true
      items:
        type: object
        fields:
          name:
            type: string
            required: true
            description: 'Variable name (slash-separated path, e.g. "color/brand/primary")'
          type:
            type: enum
            values: [COLOR, FLOAT, STRING, BOOLEAN]
            required: true
            description: Variable type
          value:
            type: unknown
            required: true
            description: Variable value
          description:
            type: string
          scopes:
            type: array
            items: string
  response:
    type: object
    fields:
      created:
        type: number
        required: true
      skipped:
        type: number
        required: true
      failed:
        type: number
        required: true
      errors:
        type: array
        required: true
        items:
          type: object
          fields:
            name:
              type: string
              required: true
            error:
              type: string
              required: true
      collectionId:
        type: string
        required: true
  examples:
    - created: 2
      skipped: 0
      failed: 0
      errors: []
      collectionId: "VariableCollectionId:1:2"
      description: Array of variables to create

# ═══════════════════════════════════════════════════════════════
# TOOLSET: tokens (11 tools)
# ═══════════════════════════════════════════════════════════════

list_tokens:
  description: >-
    Parse a DTCG JSON file and list all design tokens.
    Resolves aliases and returns flat token list.
  toolset: tokens
  write: false
  handler: custom
  params:
    filePath:
      type: string
      required: true
      description: Path to DTCG JSON file
    type:
      type: string
      description: 'Filter by token type (e.g. "color", "typography")'
  response:
    type: object
    fields:
      total:
        type: number
        required: true
      showing:
        type: number
        required: true
      tokens:
        type: array
        required: true
        items:
          type: object
          fields:
            path:
              type: string
              required: true
            type:
              type: string
              required: true
            value:
              type: unknown
              required: true
            description:
              type: string
            extensions:
              type: object
  examples:
    - total: 2
      showing: 2
      tokens:
        - path: "color.brand.primary"
          type: "color"
          value: "#7c3aed"
          description: "Primary brand color"
        - path: "text.heading.l"
          type: "typography"
          value:
            fontFamily: "Inter"
            fontWeight: 700
            fontSize: 32

sync_tokens:
  description: >-
    Sync DTCG tokens to Figma — creates/updates Variables for atomic tokens
    and Styles for composite types (typography, shadow). Idempotent.
  toolset: tokens
  write: true
  access: create
  handler: custom
  params:
    filePath:
      type: string
      required: true
      description: Path to DTCG JSON file
    collectionName:
      type: string
      description: 'Figma collection name (default: "Design Tokens")'
    modeName:
      type: string
      description: 'Mode name (default: "Default")'
  response:
    type: object
    fields:
      variables:
        type: object
        required: true
        fields:
          created:
            type: number
            required: true
          updated:
            type: number
            required: true
          skipped:
            type: number
            required: true
          failed:
            type: number
            required: true
          failures:
            type: array
            required: true
            items: object
      styles:
        type: object
        required: true
        fields:
          created:
            type: number
            required: true
          updated:
            type: number
            required: true
          skipped:
            type: number
            required: true
          failed:
            type: number
            required: true
          failures:
            type: array
            required: true
            items: object
      totalTokens:
        type: number
        required: true
  examples:
    - variables:
        created: 10
        updated: 2
        skipped: 1
        failed: 0
        failures: []
      styles:
        created: 2
        updated: 0
        skipped: 0
        failed: 0
        failures: []
      totalTokens: 15

sync_tokens_multi_mode:
  description: >-
    Sync DTCG tokens from multiple files into different modes of the same collection.
    Each entry maps a mode name to a DTCG file path.
    Modes are created automatically if they don't exist.
  toolset: tokens
  write: true
  access: create
  handler: custom
  params:
    modes:
      type: record
      required: true
      valueType: string
      description: Map of mode name → DTCG file path
    collectionName:
      type: string
      description: 'Collection name (default: "Design Tokens")'
  response:
    type: object
    fields:
      collectionId:
        type: string
        required: true
      modes:
        type: array
        required: true
        items:
          type: object
          fields:
            modeId:
              type: string
              required: true
            name:
              type: string
              required: true
      results:
        type: object
        required: true
  examples:
    - collectionId: "VariableCollectionId:1:2"
      modes:
        - modeId: "1:0"
          name: "Light"
        - modeId: "1:1"
          name: "Dark"
      results:
        Light:
          variables:
            created: 8
            updated: 0
            skipped: 0
            failed: 0
            failures: []
          styles:
            created: 2
            updated: 0
            skipped: 0
            failed: 0
            failures: []
          totalTokens: 10

diff_tokens:
  description: >-
    Compare DTCG tokens against current Figma variables.
    Shows which tokens are in-sync, ahead, behind, or missing.
  toolset: tokens
  write: false
  handler: custom
  params:
    filePath:
      type: string
      required: true
      description: Path to DTCG JSON file
    collectionName:
      type: string
      description: Collection to compare against
  response:
    type: object
    fields:
      summary:
        type: object
        required: true
        fields:
          inSync:
            type: number
            required: true
          dtcgAhead:
            type: number
            required: true
          missingInFigma:
            type: number
            required: true
          missingInDtcg:
            type: number
            required: true
      diff:
        type: array
        required: true
        items:
          type: object
          fields:
            path:
              type: string
              required: true
            status:
              type: string
              required: true
            dtcgValue:
              type: unknown
            figmaValue:
              type: unknown
  examples:
    - summary:
        inSync: 8
        dtcgAhead: 1
        missingInFigma: 2
        missingInDtcg: 0
      diff:
        - path: "color.brand.primary"
          status: "in-sync"
          dtcgValue: "#7c3aed"
          figmaValue: "#7c3aed"
        - path: "spacing.lg"
          status: "missing-in-figma"
          dtcgValue: 24

reverse_sync_tokens:
  description: >-
    Export Figma variables to a DTCG JSON file (reverse sync).
    Reads all variables from Figma, converts to W3C DTCG format with nested groups,
    and writes to the specified file path.
  toolset: tokens
  write: false
  handler: custom
  params:
    filePath:
      type: string
      required: true
      description: Output file path for DTCG JSON
    collectionId:
      type: string
      description: Export only this collection. Omit for all.
    modeName:
      type: string
      description: "Mode to export values from (default: first mode)"
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      filePath:
        type: string
        required: true
      tokenCount:
        type: number
        required: true
  examples:
    - ok: true
      filePath: "/tmp/tokens.json"
      tokenCount: 24

cache_tokens:
  description: >-
    Parse a DTCG file and cache the tokens in Figma clientStorage.
    Cached tokens can be used by lint and generate tools without re-reading the file.
  toolset: tokens
  write: true
  access: create
  handler: custom
  params:
    filePath:
      type: string
      required: true
      description: Path to DTCG JSON file
    name:
      type: string
      description: "Cache entry name (default: file basename)"
  response:
    type: object
    fields:
      cached:
        type: number
        required: true
      name:
        type: string
        required: true
  examples:
    - cached: 24
      name: "tokens-light"

list_cached_tokens:
  description: List all cached token entries in Figma clientStorage.
  toolset: tokens
  write: false
  handler: bridge
  bridgeMethod: list_spec_tokens
  params: {}
  response:
    type: object
    fields:
      entries:
        type: array
        required: true
        items: string
  examples:
    - entries:
        - "tokens-light"
        - "tokens-dark"

delete_cached_tokens:
  description: Delete a cached token entry from Figma clientStorage.
  toolset: tokens
  write: true
  access: edit
  handler: bridge
  bridgeMethod: delete_spec_tokens
  params:
    name:
      type: string
      required: true
      description: Cache entry name to delete
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
  examples:
    - ok: true

scan_styles:
  description: Scan all local styles (paint, text, effect) and return a summary with counts and details.
  toolset: tokens
  write: false
  handler: bridge
  params: {}
  response:
    type: object
    fields:
      paint:
        type: array
        required: true
        items:
          type: object
          fields:
            id:
              type: string
              required: true
            name:
              type: string
              required: true
            paints:
              type: number
              required: true
      text:
        type: array
        required: true
        items:
          type: object
          fields:
            id:
              type: string
              required: true
            name:
              type: string
              required: true
            fontSize:
              type: number
              required: true
            fontName:
              type: unknown
      effect:
        type: array
        required: true
        items:
          type: object
          fields:
            id:
              type: string
              required: true
            name:
              type: string
              required: true
            effects:
              type: number
              required: true
      summary:
        type: object
        required: true
        fields:
          paintCount:
            type: number
            required: true
          textCount:
            type: number
            required: true
          effectCount:
            type: number
            required: true
  examples:
    - paint:
        - id: "Style:1"
          name: "Color/Brand/Primary"
          paints: 1
      text:
        - id: "Style:2"
          name: "Text/Heading/L"
          fontSize: 32
          fontName:
            family: "Inter"
            style: "Bold"
      effect:
        - id: "Style:3"
          name: "Shadow/Card/Default"
          effects: 1
      summary:
        paintCount: 1
        textCount: 1
        effectCount: 1

export_tokens:
  description: Export all local Figma variables as DTCG-format tokens, grouped by collection.
  toolset: tokens
  write: false
  handler: bridge
  params: {}
  response:
    type: object
  examples:
    - Design Tokens:
        color/brand/primary:
          $value: "#7c3aed"
          $type: "color"
          $description: "Primary brand color"

diff_styles:
  description: >-
    Compare DTCG tokens against current Figma variables.
    Shows in-sync, value-mismatch, and missing tokens in both directions.
  toolset: tokens
  write: false
  handler: bridge
  params:
    tokens:
      type: array
      required: true
      items:
        type: object
        fields:
          path:
            type: string
            required: true
            description: Token path
          type:
            type: string
            required: true
            description: Token type
          value:
            type: unknown
            required: true
            description: Token value
      description: DTCG tokens to compare against Figma variables
  response:
    type: object
    fields:
      diff:
        type: array
        required: true
        items:
          type: object
          fields:
            path:
              type: string
              required: true
            status:
              type: string
              required: true
            dtcgValue:
              type: unknown
            figmaValue:
              type: unknown
      total:
        type: number
        required: true
      error:
        type: string
  examples:
    - diff:
        - path: "color.brand.primary"
          status: "in-sync"
          dtcgValue: "#7c3aed"
          figmaValue: "#7c3aed"
      total: 1

# ═══════════════════════════════════════════════════════════════
# TOOLSET: styles (10 tools)
# ═══════════════════════════════════════════════════════════════

list_styles:
  description: >-
    List all local Figma styles (paint, text, effect, grid).
    Optionally filter by type.
  toolset: styles
  write: false
  handler: bridge
  params:
    type:
      type: string
      description: "Filter by style type: PAINT, TEXT, EFFECT, GRID"
  response:
    type: object
    fields:
      count:
        type: number
        required: true
      styles:
        type: array
        required: true
        items:
          type: object
          fields:
            id:
              type: string
              required: true
            name:
              type: string
              required: true
            type:
              type: string
              required: true
            description:
              type: string
            paints:
              type: array
              items: object
            fontName:
              type: unknown
            fontSize:
              type: number
            letterSpacing:
              type: unknown
            lineHeight:
              type: unknown
            textCase:
              type: string
            textDecoration:
              type: string
            effects:
              type: array
              items: object
  examples:
    - count: 2
      styles:
        - id: "Style:1"
          name: "Color/Brand/Primary"
          type: "PAINT"
          description: "Primary brand color"
          paints:
            - type: "SOLID"
              visible: true
              opacity: 1
              color: "#7c3aed"
        - id: "Style:2"
          name: "Text/Heading/L"
          type: "TEXT"
          fontName:
            family: "Inter"
            style: "Bold"
          fontSize: 32

get_style:
  description: Get detailed info for a specific style by ID.
  toolset: styles
  write: false
  handler: bridge
  params:
    styleId:
      type: string
      required: true
      description: The Figma style ID
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      type:
        type: string
        required: true
      description:
        type: string
      paints:
        type: array
        items: object
      fontName:
        type: unknown
      fontSize:
        type: number
      letterSpacing:
        type: unknown
      lineHeight:
        type: unknown
      textCase:
        type: string
      textDecoration:
        type: string
      effects:
        type: array
        items: object
      error:
        type: string
  examples:
    - id: "Style:1"
      name: "Color/Brand/Primary"
      type: "PAINT"
      description: "Primary brand color"
      paints:
        - type: "SOLID"
          visible: true
          opacity: 1
          color: "#7c3aed"

sync_styles:
  description: >-
    Sync composite design tokens (typography, shadow) to Figma Styles.
    For atomic tokens (color, number, etc.), use sync_tokens instead.
  toolset: styles
  write: true
  access: create
  handler: bridge
  params:
    tokens:
      type: array
      required: true
      items:
        type: object
        fields:
          path:
            type: string
            required: true
            description: 'Token path (e.g. "heading/h1")'
          type:
            type: string
            required: true
            description: 'Token type: "typography" or "shadow"'
          value:
            type: unknown
            required: true
            description: Token value object
          description:
            type: string
            description: Token description
      description: Array of composite design tokens to sync
  response:
    type: object
    fields:
      created:
        type: number
        required: true
      updated:
        type: number
        required: true
      skipped:
        type: number
        required: true
      failed:
        type: number
        required: true
      failures:
        type: array
        required: true
        items:
          type: object
          fields:
            path:
              type: string
              required: true
            error:
              type: string
              required: true
  examples:
    - created: 2
      updated: 1
      skipped: 0
      failed: 0
      failures: []

create_paint_style:
  description: Create a new paint style with a solid color fill.
  toolset: styles
  write: true
  access: create
  handler: bridge
  params:
    name:
      type: string
      required: true
      description: Style name
    color:
      type: string
      required: true
      description: 'Hex color (e.g. "#FF0000")'
    description:
      type: string
      description: Style description
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
  examples:
    - id: "Style:10"
      name: "Color/Brand/Primary"

delete_style:
  description: Delete a style by ID.
  toolset: styles
  write: true
  access: edit
  handler: bridge
  params:
    styleId:
      type: string
      required: true
      description: Style ID to delete
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      error:
        type: string
  examples:
    - ok: true

update_paint_style:
  description: "Update an existing paint style. Can change name, description, and/or color."
  toolset: styles
  write: true
  access: edit
  handler: bridge
  params:
    styleId:
      type: string
      required: true
      description: Paint style ID
    name:
      type: string
      description: New name
    description:
      type: string
      description: New description
    color:
      type: string
      description: 'New hex color (e.g. "#FF0000")'
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      error:
        type: string
  examples:
    - id: "Style:10"
      name: "Color/Brand/Accent"

update_text_style:
  description: "Update an existing text style. Can change name, description, font, size, line height, letter spacing."
  toolset: styles
  write: true
  access: edit
  handler: custom
  params:
    styleId:
      type: string
      required: true
      description: Text style ID
    name:
      type: string
      description: New name
    description:
      type: string
      description: New description
    fontFamily:
      type: string
      description: Font family
    fontStyle:
      type: string
      description: 'Font style (e.g. "Bold")'
    fontSize:
      type: number
      description: Font size in px
    lineHeight:
      type: unknown
      description: 'Line height: number (px), "AUTO", or {value, unit}'
    letterSpacing:
      type: unknown
      description: "Letter spacing: number (px) or {value, unit}"
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      fontSize:
        type: number
      error:
        type: string
  examples:
    - id: "Style:11"
      name: "Text/Heading/L"
      fontSize: 32

update_effect_style:
  description: "Update an existing effect style. Can change name, description, and effects array."
  toolset: styles
  write: true
  access: edit
  handler: bridge
  params:
    styleId:
      type: string
      required: true
      description: Effect style ID
    name:
      type: string
      description: New name
    description:
      type: string
      description: New description
    effects:
      type: array
      items:
        type: record
        valueType: unknown
      description: New effects array (raw Figma effect objects)
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      error:
        type: string
  examples:
    - id: "Style:12"
      name: "Shadow/Card/Default"

register_library_styles:
  description: >-
    Register Text/Paint/Effect styles from a library for auto-application to new elements.
    Stored per-library in clientStorage, persists across sessions.
    create_text will auto-apply matching Text Style by fontSize.
  toolset: styles
  write: true
  access: create
  handler: custom
  params:
    library:
      type: string
      required: true
      description: Library name (must match the selected library name)
    styles:
      type: object
      required: true
      description: Style data with textStyles, paintStyles, effectStyles arrays
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      registered:
        type: object
        required: true
        fields:
          textStyles:
            type: number
            required: true
          paintStyles:
            type: number
            required: true
          effectStyles:
            type: number
            required: true
  examples:
    - ok: true
      registered:
        textStyles: 8
        paintStyles: 12
        effectStyles: 3

get_registered_styles:
  description: Get previously registered styles for a library. Returns null if not registered.
  toolset: styles
  write: false
  handler: bridge
  params:
    library:
      type: string
      required: true
      description: Library name
  response:
    type: object
    fields:
      textStyles:
        type: array
        required: true
        items:
          type: object
          fields:
            key:
              type: string
              required: true
            name:
              type: string
              required: true
            fontSize:
              type: number
              required: true
            fontFamily:
              type: string
              required: true
            fontWeight:
              type: string
              required: true
      paintStyles:
        type: array
        required: true
        items:
          type: object
          fields:
            key:
              type: string
              required: true
            name:
              type: string
              required: true
            hex:
              type: string
              required: true
      effectStyles:
        type: array
        required: true
        items:
          type: object
          fields:
            key:
              type: string
              required: true
            name:
              type: string
              required: true
            effectType:
              type: string
              required: true
      _loaded:
        type: object
        fields:
          text:
            type: number
            required: true
          paint:
            type: number
            required: true
          effect:
            type: number
            required: true
  examples:
    - textStyles:
        - key: "S:1"
          name: "Text/Heading/L"
          fontSize: 32
          fontFamily: "Inter"
          fontWeight: "Bold"
      paintStyles:
        - key: "S:2"
          name: "Color/Brand/Primary"
          hex: "#7c3aed"
      effectStyles:
        - key: "S:3"
          name: "Shadow/Card/Default"
          effectType: "DROP_SHADOW"
      _loaded:
        text: 1
        paint: 1
        effect: 1

# ═══════════════════════════════════════════════════════════════
# TOOLSET: components-advanced (13 tools)
# ═══════════════════════════════════════════════════════════════

create_component:
  description: Create a new component with specified dimensions.
  toolset: components-advanced
  write: true
  access: create
  handler: bridge
  params:
    name:
      type: string
      description: 'Component name (default: "Component")'
    width:
      type: number
      description: "Width in px (default: 100)"
    height:
      type: number
      description: "Height in px (default: 100)"
    description:
      type: string
      description: Component description
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      type:
        type: string
        required: true
      width:
        type: number
        required: true
      height:
        type: number
        required: true
      visible:
        type: boolean
        required: true
  examples:
    - id: "80:1"
      name: "Button / Primary"
      type: "COMPONENT"
      width: 160
      height: 48
      visible: true

create_component_set:
  description: Combine multiple existing components into a variant set (ComponentSet).
  toolset: components-advanced
  write: true
  access: create
  handler: bridge
  params:
    componentIds:
      type: array
      required: true
      items: string
      description: Component node IDs to combine into a variant set
    name:
      type: string
      description: Name for the variant set
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      type:
        type: string
        required: true
      width:
        type: number
        required: true
      height:
        type: number
        required: true
      visible:
        type: boolean
        required: true
  examples:
    - id: "81:1"
      name: "Button"
      type: "COMPONENT_SET"
      width: 320
      height: 48
      visible: true

update_component:
  description: "Update a component's name, description, or size."
  toolset: components-advanced
  write: true
  access: edit
  handler: bridge
  params:
    nodeId:
      type: string
      required: true
      description: Component node ID
    name:
      type: string
      description: New component name
    description:
      type: string
      description: New component description
    width:
      type: number
      description: New width in px
    height:
      type: number
      description: New height in px
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      type:
        type: string
        required: true
      width:
        type: number
        required: true
      height:
        type: number
        required: true
      visible:
        type: boolean
        required: true
  examples:
    - id: "80:1"
      name: "Button / Secondary"
      type: "COMPONENT"
      width: 160
      height: 48
      visible: true

delete_component:
  description: Delete a component node.
  toolset: components-advanced
  write: true
  access: edit
  handler: bridge
  params:
    nodeId:
      type: string
      required: true
      description: Component node ID to delete
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
  examples:
    - ok: true

swap_instance:
  description: Swap an existing instance to a different component.
  toolset: components-advanced
  write: true
  access: edit
  handler: bridge
  params:
    instanceId:
      type: string
      required: true
      description: Instance node ID
    componentKey:
      type: string
      required: true
      description: New component key to swap to
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      type:
        type: string
        required: true
      width:
        type: number
        required: true
      height:
        type: number
        required: true
      visible:
        type: boolean
        required: true
      error:
        type: string
  examples:
    - id: "82:1"
      name: "Button / Primary"
      type: "INSTANCE"
      width: 160
      height: 48
      visible: true

detach_instance:
  description: Detach an instance from its component, converting it to a frame.
  toolset: components-advanced
  write: true
  access: edit
  handler: bridge
  params:
    instanceId:
      type: string
      required: true
      description: Instance node ID
  response:
    type: object
    fields:
      id:
        type: string
        required: true
      name:
        type: string
        required: true
      type:
        type: string
        required: true
      width:
        type: number
        required: true
      height:
        type: number
        required: true
      visible:
        type: boolean
        required: true
      error:
        type: string
  examples:
    - id: "83:1"
      name: "Button / Primary"
      type: "FRAME"
      width: 160
      height: 48
      visible: true

reset_instance_overrides:
  description: Reset all overrides on an instance back to the component defaults.
  toolset: components-advanced
  write: true
  access: edit
  handler: bridge
  params:
    instanceId:
      type: string
      required: true
      description: Instance node ID
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
  examples:
    - ok: true

get_instance_overrides:
  description: Get the current override properties of a component instance (values that differ from component defaults).
  toolset: components-advanced
  write: false
  handler: bridge
  params:
    nodeId:
      type: string
      required: true
      description: Instance node ID
  response:
    type: object
    fields:
      nodeId:
        type: string
        required: true
      nodeName:
        type: string
        required: true
      properties:
        type: array
        required: true
        items:
          type: object
          fields:
            key:
              type: string
              required: true
            type:
              type: string
              required: true
            value:
              type: unknown
  examples:
    - nodeId: "82:1"
      nodeName: "Button / Primary"
      properties:
        - key: "State"
          type: "VARIANT"
          value: "Default"

set_instance_overrides:
  description: >-
    Copy override properties from a source instance to one or more target instances.
    Use get_instance_overrides first to inspect the source, then propagate to targets.
  toolset: components-advanced
  write: true
  access: edit
  handler: bridge
  params:
    sourceId:
      type: string
      required: true
      description: Source instance node ID to copy overrides from
    targetIds:
      type: array
      required: true
      items: string
      description: Target instance node IDs to apply overrides to
  response:
    type: object
    fields:
      succeeded:
        type: number
        required: true
      failed:
        type: number
        required: true
  examples:
    - succeeded: 3
      failed: 0

add_component_property:
  description: >-
    Add a new property to a component or component set.
    Supported types: BOOLEAN, TEXT, INSTANCE_SWAP, VARIANT.
  toolset: components-advanced
  write: true
  access: create
  handler: bridge
  params:
    nodeId:
      type: string
      required: true
      description: Component or ComponentSet node ID
    propertyName:
      type: string
      required: true
      description: Property name
    type:
      type: enum
      values: [BOOLEAN, TEXT, INSTANCE_SWAP, VARIANT]
      required: true
      description: Property type
    defaultValue:
      type: unknown
      required: true
      description: Default value
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      properties:
        type: array
        items: string
      error:
        type: string
  examples:
    - ok: true
      properties: ["State", "Label"]

update_component_property:
  description: Update an existing component property (rename or change default value).
  toolset: components-advanced
  write: true
  access: edit
  handler: bridge
  params:
    nodeId:
      type: string
      required: true
      description: Component or ComponentSet node ID
    propertyName:
      type: string
      required: true
      description: Current property name
    newName:
      type: string
      description: New property name
    defaultValue:
      type: unknown
      description: New default value
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      properties:
        type: array
        items: string
      error:
        type: string
  examples:
    - ok: true
      properties: ["State", "Label"]

delete_component_property:
  description: Remove a property from a component or component set.
  toolset: components-advanced
  write: true
  access: edit
  handler: bridge
  params:
    nodeId:
      type: string
      required: true
      description: Component or ComponentSet node ID
    propertyName:
      type: string
      required: true
      description: Property name to delete
  response:
    type: object
    fields:
      ok:
        type: boolean
        required: true
      properties:
        type: array
        items: string
      error:
        type: string
  examples:
    - ok: true
      properties: ["State"]

audit_components:
  description: >-
    Audit all components on the current page for structural health.
    Reports: missing descriptions, unexposed text nodes, empty components,
    single-variant sets, and property counts. Use for design system maintenance.
  toolset: components-advanced
  write: false
  handler: bridge
  params:
    nodeIds:
      type: array
      items: string
      description: "Specific node IDs to audit (default: entire page)"
  response:
    type: object
    fields:
      summary:
        type: object
        required: true
        fields:
          totalComponents:
            type: number
            required: true
          totalIssues:
            type: number
            required: true
      components:
        type: array
        required: true
        items: object
      issues:
        type: array
        required: true
        items:
          type: object
          fields:
            nodeId:
              type: string
              required: true
            name:
              type: string
              required: true
            issue:
              type: string
              required: true
  examples:
    - summary:
        totalComponents: 4
        totalIssues: 1
      components:
        - id: "80:1"
          name: "Button / Primary"
          propertyCount: 2
      issues:
        - nodeId: "80:1"
          name: "Button / Primary"
          issue: "Missing description"

