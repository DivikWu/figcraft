components:
  description: >-
    Component operations — list, get, create instances, and manage properties.
    Core methods are always available. Advanced methods require load_toolset("components-advanced").
  toolset: core
  handler: endpoint
  methods:
    list:
      description: List all components on the current page
      maps_to: list_components
      write: false
      response:
        type: object
        fields:
          count:
            type: number
            required: true
          components:
            type: array
            required: true
            items:
              type: object
              fields:
                id:
                  type: string
                  required: true
                name:
                  type: string
                  required: true
                description:
                  type: string
                key:
                  type: string
      examples:
        - count: 1
          components:
            - id: "12:1"
              name: "Button / Primary"
              key: "button-primary-key"
      params: {}
    list_library:
      description: List published components from a library file via REST API
      maps_to: list_library_components
      write: false
      response:
        type: object
        fields:
          count:
            type: number
            required: true
          components:
            type: array
            required: true
            items:
              type: object
              fields:
                key:
                  type: string
                  required: true
                name:
                  type: string
                  required: true
                description:
                  type: string
      examples:
        - count: 1
          components:
            - key: "library-button-primary"
              name: "Button / Primary"
              description: "Primary CTA button"
      params:
        fileKey:
          type: string
          description: Figma file key
    get:
      description: Get full details of a component by node ID
      maps_to: get_component
      write: false
      response:
        type: object
        fields:
          id:
            type: string
            required: true
          name:
            type: string
            required: true
          type:
            type: string
            required: true
          description:
            type: string
          key:
            type: string
          componentPropertyDefinitions:
            type: record
            valueType: unknown
      examples:
        - id: "12:1"
          name: "Button / Primary"
          type: "COMPONENT"
          description: "Main call-to-action button"
          key: "button-primary-key"
      params:
        nodeId:
          type: string
          required: true
          description: Component node ID
    create_instance:
      description: Create an instance of a component
      maps_to: create_instance
      write: true
      access: create
      response:
        type: object
        fields:
          id:
            type: string
            required: true
          name:
            type: string
            required: true
          type:
            type: string
            required: true
          width:
            type: number
          height:
            type: number
          error:
            type: string
      examples:
        - id: "40:1"
          name: "Button / Primary"
          type: "INSTANCE"
          width: 160
          height: 48
      params:
        componentId:
          type: string
          description: Local component node ID
        componentKey:
          type: string
          description: Library component key
        properties:
          type: record
          valueType: string
          description: Variant/property overrides
        parentId:
          type: string
          description: Parent node ID
    list_properties:
      description: List all properties and variant options of a component
      maps_to: list_component_properties
      write: false
      response:
        type: object
        fields:
          properties:
            type: array
            required: true
            items:
              type: object
              fields:
                key:
                  type: string
                  required: true
                type:
                  type: string
                  required: true
                defaultValue:
                  type: unknown
                variantOptions:
                  type: array
                  items: string
      examples:
        - properties:
            - key: "State"
              type: "VARIANT"
              defaultValue: "Default"
              variantOptions: ["Default", "Pressed"]
      params:
        nodeId:
          type: string
          required: true
          description: Component or ComponentSet node ID

variables_ep:
  description: >-
    Variable operations — list, get, create, update, delete variables, collections, and modes.
  toolset: variables
  handler: endpoint
  methods:
    list:
      description: List all local Figma variables
      maps_to: list_variables
      write: false
      response:
        type: object
        fields:
          count:
            type: number
            required: true
          variables:
            type: array
            required: true
            items:
              type: object
              fields:
                id:
                  type: string
                  required: true
                name:
                  type: string
                  required: true
                resolvedType:
                  type: string
                  required: true
                description:
                  type: string
                collectionId:
                  type: string
                  required: true
                collectionName:
                  type: string
                  required: true
                scopes:
                  type: array
                  required: true
                  items: string
                valuesByMode:
                  type: record
                  required: true
                  valueType: unknown
      examples:
        - count: 1
          variables:
            - id: "VariableID:1:12"
              name: "color/brand/primary"
              resolvedType: "COLOR"
              description: "Primary brand color"
              collectionId: "VariableCollectionId:1:2"
              collectionName: "Primitives"
              scopes: ["ALL_FILLS"]
              valuesByMode:
                Default: "#7c3aed"
      params:
        collectionId:
          type: string
          description: Filter by collection ID
        type:
          type: string
          description: 'Filter by type: COLOR, FLOAT, STRING, BOOLEAN'
    get:
      description: Get detailed info for a specific variable
      maps_to: get_variable
      write: false
      response:
        type: object
        fields:
          id:
            type: string
            required: true
          name:
            type: string
            required: true
          resolvedType:
            type: string
            required: true
          description:
            type: string
          collectionId:
            type: string
            required: true
          collectionName:
            type: string
          scopes:
            type: array
            required: true
            items: string
          codeSyntax:
            type: unknown
          valuesByMode:
            type: record
            required: true
            valueType: unknown
          error:
            type: string
      examples:
        - id: "VariableID:1:12"
          name: "color/brand/primary"
          resolvedType: "COLOR"
          description: "Primary brand color"
          collectionId: "VariableCollectionId:1:2"
          collectionName: "Primitives"
          scopes: ["ALL_FILLS"]
          codeSyntax:
            WEB: "var(--color-brand-primary)"
          valuesByMode:
            Default: "#7c3aed"
      params:
        variableId:
          type: string
          required: true
    list_collections:
      description: List all local variable collections
      maps_to: list_collections
      write: false
      response:
        type: array
        items:
          type: object
          fields:
            id:
              type: string
              required: true
            name:
              type: string
              required: true
            modes:
              type: array
              required: true
              items:
                type: object
                fields:
                  modeId:
                    type: string
                    required: true
                  name:
                    type: string
                    required: true
            variableCount:
              type: number
              required: true
      examples:
        - - id: "VariableCollectionId:1:2"
            name: "Primitives"
            modes:
              - modeId: "1:0"
                name: "Default"
            variableCount: 12
      params: {}
    get_bindings:
      description: Get all variable bindings on a node
      maps_to: get_node_variables
      write: false
      response:
        type: object
        fields:
          nodeId:
            type: string
            required: true
          bindings:
            type: object
            required: true
          error:
            type: string
      examples:
        - nodeId: "1:24"
          bindings:
            fills:
              - variableId: "VariableID:1:12"
                variableName: "color/brand/primary"
                collectionId: "VariableCollectionId:1:2"
      params:
        nodeId:
          type: string
          required: true
    set_binding:
      description: Bind a variable to a node property
      maps_to: set_variable_binding
      write: true
      access: edit
      response:
        type: object
        fields:
          ok:
            type: boolean
            required: true
          error:
            type: string
      examples:
        - ok: true
      params:
        nodeId:
          type: string
          required: true
        field:
          type: string
          required: true
        variableId:
          type: string
          required: true
    create:
      description: Create a new Figma variable
      maps_to: create_variable
      write: true
      access: create
      response:
        type: object
        fields:
          id:
            type: string
            required: true
          name:
            type: string
            required: true
          resolvedType:
            type: string
            required: true
          error:
            type: string
      examples:
        - id: "VariableID:1:30"
          name: "spacing/md"
          resolvedType: "FLOAT"
      params:
        name:
          type: string
          required: true
        collectionId:
          type: string
          required: true
        resolvedType:
          type: enum
          values: [COLOR, FLOAT, STRING, BOOLEAN]
          required: true
        value:
          type: unknown
        modeId:
          type: string
        description:
          type: string
        scopes:
          type: array
          items: string
    update:
      description: Update an existing variable
      maps_to: update_variable
      write: true
      access: edit
      response:
        type: object
        fields:
          ok:
            type: boolean
            required: true
          id:
            type: string
          error:
            type: string
      examples:
        - ok: true
          id: "VariableID:1:30"
      params:
        variableId:
          type: string
          required: true
        name:
          type: string
        description:
          type: string
        scopes:
          type: array
          items: string
        value:
          type: unknown
        modeId:
          type: string
    delete:
      description: Delete a variable by ID
      maps_to: delete_variable
      write: true
      access: edit
      response:
        type: object
        fields:
          ok:
            type: boolean
            required: true
          error:
            type: string
      examples:
        - ok: true
      params:
        variableId:
          type: string
          required: true
    create_collection:
      description: Create a new variable collection
      maps_to: create_collection
      write: true
      access: create
      response:
        type: object
        fields:
          id:
            type: string
            required: true
          name:
            type: string
            required: true
          modes:
            type: array
            required: true
            items:
              type: object
              fields:
                modeId:
                  type: string
                  required: true
                name:
                  type: string
                  required: true
      examples:
        - id: "VariableCollectionId:1:2"
          name: "Semantic"
          modes:
            - modeId: "1:0"
              name: "Mode 1"
      params:
        name:
          type: string
          required: true
    delete_collection:
      description: Delete a variable collection
      maps_to: delete_collection
      write: true
      access: edit
      response:
        type: object
        fields:
          ok:
            type: boolean
            required: true
          error:
            type: string
      examples:
        - ok: true
      params:
        collectionId:
          type: string
          required: true
    batch_create:
      description: Create multiple variables at once
      maps_to: batch_create_variables
      write: true
      access: create
      response:
        type: object
        fields:
          created:
            type: number
            required: true
          skipped:
            type: number
            required: true
          failed:
            type: number
            required: true
          errors:
            type: array
            required: true
            items:
              type: object
              fields:
                name:
                  type: string
                  required: true
                error:
                  type: string
                  required: true
          collectionId:
            type: string
            required: true
      examples:
        - created: 2
          skipped: 0
          failed: 0
          errors: []
          collectionId: "VariableCollectionId:1:2"
      params:
        collectionName:
          type: string
          required: true
        modeName:
          type: string
        variables:
          type: array
          required: true
          items: object
    export:
      description: Export all Figma variables as DTCG-compatible flat list
      maps_to: export_variables
      write: false
      response:
        type: object
        fields:
          count:
            type: number
            required: true
          variables:
            type: array
            required: true
            items:
              type: object
              fields:
                path:
                  type: string
                  required: true
                type:
                  type: string
                  required: true
                valuesByMode:
                  type: record
                  required: true
                  valueType: unknown
                description:
                  type: string
                scopes:
                  type: array
                  items: string
                aliasOf:
                  type: record
                  valueType: string
      examples:
        - count: 1
          variables:
            - path: "color.brand.primary"
              type: "color"
              valuesByMode:
                Default: "#7c3aed"
              description: "Primary brand color"
              scopes: ["ALL_FILLS"]
      params:
        collectionId:
          type: string

