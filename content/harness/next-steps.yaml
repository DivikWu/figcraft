# Harness next-steps — tool→subsequent steps mapping.
# After a tool succeeds, these steps are injected as _nextSteps
# to guide AI through multi-step workflows.
#
# Fields:
#   tool: MCP tool name
#   steps: ordered list of follow-up actions
#
# Edit this file and run: npm run content

- tool: sync_tokens
  steps:
    - Run lint_fix_all to check compliance with synced tokens.
    - Use export_image on modified screens to verify visual changes.
    - Run verify_design for a final quality audit.

- tool: set_mode
  steps:
    - Call get_mode to refresh workflow instructions for the new mode.

- tool: get_mode
  steps:
    - >-
      ⛔ SKILL ROUTING: This project uses figcraft-* skills (NOT external figma-* skills).
      Use figcraft-generate-design for screen assembly, figcraft-generate-library for design system building,
      figcraft-use before use_figma calls, figcraft-implement-design for Figma-to-code,
      figcraft-code-connect for Code Connect, figcraft-create-design-system-rules for rules generation.
      Do NOT load external skills: baseline-ui, ui-ux-pro-max, web-design-guidelines.

- tool: create_component
  steps:
    - >-
      Size variants (Large/Medium/Small buttons, etc.): create SEPARATE base components
      with different `textStyleName` values — do NOT try to derive a smaller variant
      from a larger base by using text.set_range to change fontSize. set_range on fontSize
      or fontName silently DETACHES the text style binding (Figma API behavior, not a bug),
      leaving the variant unable to inherit body-md/body-xl properly.
    - >-
      If a text style binding was accidentally detached by prior set_range calls, re-bind
      via nodes(method:"update", patches:[{nodeId, props:{textStyleId:"S:..."}}]) — this
      is the direct rebind path and respects font preloading.
    - >-
      For color / variable binding on a component or its children, pass strings — NEVER
      objects. Correct: fillVariableId:"VariableID:123:456" or fillVariableName:"button/emphasis".
      Wrong: fill:{variableId:"..."} or fill:{variable:"..."} — these are now rejected
      upfront with a self-correcting error, but the correct shape avoids the rejection entirely.
    - >-
      P2 — BOOLEAN visibility binding is now inline in create_component. Declare the property
      in `properties:[]` AND reference it from the child via componentPropertyReferences. Example:
      properties:[{type:"BOOLEAN", propertyName:"Icon", defaultValue:false}], children:[
      {type:"icon", name:"Icon", icon:"lucide:arrow-right", componentPropertyReferences:{visible:"Icon"}}].
      Declaring the BOOLEAN property alone WITHOUT the child reference leaves it orphaned
      (create_component now warns about this); declaring the reference without the property is
      equally a no-op and also warned. For post-creation wiring on an existing component, call
      bind_component_property (core tool) — pass the `bindings` array to batch. Do NOT fall back
      to execute_js — that path bypasses Opinion Engine and hint aggregation.
    - >-
      Variant matrices (≥8 variants, e.g. Button with 4 Type × 2 Size × 4 State = 32):
      DO NOT clone + rename loop. Use create_component's `items:[]` batch mode — one call
      creates up to 20 components with individual params, inline children (icons resolve
      automatically), and inline `properties:[]` arrays. Then create_component_set combines
      them into a variant set. For binding the same variable to many nodes after creation,
      use variables_ep(method:"batch_bind", bindings:[...]). The clone-and-modify path costs
      3-5× more tool calls and trips Opinion Engine re-inference edge cases.
    - >-
      Icon children in create_component work the same as in create_frame:
      pass {type:"icon", icon:"lucide:chevron-right", size:24, colorVariableName:"text/primary"}
      inline in `children`. The harness resolves them to SVG before the Plugin sees them.
      DO NOT call icon_create then nodes.update to splice the icon in — that's 2 extra calls
      plus manual parenting. If an icon child fails, the response's _warnings array reports
      which icon and why; the SVG placeholder keeps creation from breaking.
      NOTE: colorVariableName only works for FILL-based icons. For stroke-based icons
      (lucide, tabler, etc.), colorVariableName is silently skipped due to scope mismatch —
      use post-creation bind_component_property with nodeProperty:"iconColor" instead
      (see the ⛔ ICON COLOR BINDING step in this list).
    - >-
      For post-creation variable binding (e.g. binding existing node fills to variables by ID),
      call variables_ep(method:"batch_bind") — NOT nodes(method:"update", patches:[{props:{fillVariableId:...}}]).
      patch_nodes only accepts raw Figma props (fills, strokes arrays, etc.); variable binding
      goes through variables_ep. This is now surfaced as a self-correcting error if you try
      the wrong path.
    - >-
      ⛔ ICON COLOR BINDING — `colorVariableName` on icon children is SILENTLY SKIPPED when
      the variable's scopes don't include STROKE_COLOR (most text/* variables only have
      TEXT_FILL/SHAPE_FILL). Stroke-based icons (lucide, tabler, etc.) need stroke binding,
      not fill binding. The ONLY reliable path for icon color is POST-CREATION binding via
      bind_component_property with nodeProperty:"iconColor" — this walks Vector descendants
      and rebinds fills AND strokes regardless of scope. You MUST call this after
      create_component_set, grouped by Type using variantFilter. Separate std and Loading
      variants because they have different child names: for std variants (Default/Active/Disabled),
      bind Icon-left and Icon-right; for Loading variants, bind Spinner. Example (std):
      bind_component_property({nodeId:"<setId>", variantFilter:{Type:"Emphasis"},
      bindings:[{targetNodeSelector:"Icon-left", nodeProperty:"iconColor",
      value:"<textInverse ID from get_mode defaults>"},
      {targetNodeSelector:"Icon-right", nodeProperty:"iconColor",
      value:"<same ID>"}]}).
      Example (loading):
      bind_component_property({nodeId:"<setId>", variantFilter:{Type:"Emphasis", State:"Loading"},
      bindings:[{targetNodeSelector:"Spinner", nodeProperty:"iconColor",
      value:"<same ID>"}]}).
      Check _tokenBindingFailures in the create_component response — if ANY icon color
      bindings were skipped, this step is mandatory.
    - >-
      ⛔ EXPLICIT PARAMS IN BATCH — When using create_component items:[] batch mode,
      ALWAYS explicitly declare itemSpacing, padding (paddingLeft/Right/Top/Bottom),
      and cornerRadius in EVERY item. Do NOT rely on Opinion Engine inference across
      batches — different items may receive different inferred values (e.g. itemSpacing
      inferred as 8 in one batch vs 4 in another), causing inconsistency within the
      same ComponentSet. Rule of thumb: if a property should be identical across all
      variants, it must be explicitly set in every item.
    - >-
      ⛔ FULL-WIDTH BUTTONS IN COMPONENT SETS — ComponentSet uses absolute positioning
      internally, so variants CANNOT use layoutSizingHorizontal:"FILL". For buttons
      designed to be full-width (e.g. Core/CTA buttons), set an explicit fixed width
      (e.g. width:360) on each variant to visually represent the intended full-width
      behavior. Consumers will override with FILL when placing instances inside
      auto-layout parents.
