# Harness next-steps — tool→subsequent steps mapping.
# After a tool succeeds, these steps are injected as _nextSteps
# to guide AI through multi-step workflows.
#
# Fields:
#   tool: MCP tool name
#   steps: ordered list of follow-up actions
#
# Edit this file and run: npm run content

- tool: sync_tokens
  steps:
    - Run lint_fix_all to check compliance with synced tokens.
    - Use export_image on modified screens to verify visual changes.
    - Run verify_design for a final quality audit.

- tool: set_mode
  steps:
    - Call get_mode to refresh workflow instructions for the new mode.

- tool: get_mode
  steps:
    - >-
      ⛔ SKILL ROUTING: This project uses figcraft-* skills (NOT external figma-* skills).
      Use figcraft-generate-design for screen assembly, figcraft-generate-library for design system building,
      figcraft-use before use_figma calls, figcraft-implement-design for Figma-to-code,
      figcraft-code-connect for Code Connect, figcraft-create-design-system-rules for rules generation.
      Do NOT load external skills: baseline-ui, ui-ux-pro-max, web-design-guidelines.

- tool: create_component
  steps:
    - >-
      ⛔ SIZE VARIANTS — Create SEPARATE base components with different textStyleName
      values. Do NOT derive smaller variants via text.set_range on fontSize/fontName —
      this silently DETACHES the text style binding (Figma API behavior). If accidentally
      detached, rebind via nodes(method:"update", patches:[{nodeId, props:{textStyleId:"S:..."}}]).
    - >-
      ⛔ ICON COLOR BINDING — colorVariableName on stroke-based icons (lucide, tabler)
      is SILENTLY SKIPPED (scope mismatch: most text/* variables lack STROKE_COLOR).
      The ONLY reliable path: POST-CREATION bind_component_property with
      nodeProperty:"iconColor" and variantFilter. Group by Type; separate std vs Loading
      variants (different child names). Check _tokenBindingFailures — if any icon color
      bindings were skipped, this step is mandatory.
    - >-
      ⛔ BATCH EXPLICIT PARAMS — In items:[] batch mode, ALWAYS explicitly set
      itemSpacing, padding*, and cornerRadius in EVERY item. Opinion Engine inference
      may vary across items (different children → different layoutSizing), causing
      inconsistency within the same ComponentSet.
    - >-
      ⛔ FULL-WIDTH IN COMPONENT SETS — ComponentSet uses absolute positioning, so
      variants CANNOT use layoutSizingHorizontal:"FILL". Use explicit fixed width
      (e.g. width:360) on each variant. Consumers apply FILL when placing instances.
