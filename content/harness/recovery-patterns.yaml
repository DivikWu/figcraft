# Harness error recovery patterns — error→suggestion mapping.
# Each entry defines: when an error matches specific patterns,
# what recovery suggestion to provide to AI.
#
# Fields:
#   name: unique rule identifier
#   tools: which MCP tools this applies to (use '*' for all)
#   patterns: regex patterns to match against error messages (case-insensitive)
#   errorType: classification label
#   suggestion: recovery guidance for AI
#   retryHint: (optional) params to modify on retry
#   doNotRetry: (optional) if true, AI should not retry
#
# Edit this file and run: npm run content

- name: connection-lost
  tools: ["*"]
  patterns:
    - "bridge not connected"
    - "connection closed"
    - "connection to relay timed out"
    - "websocket.*closed"
    - "connection.*refused"
  errorType: connection_lost
  doNotRetry: true
  suggestion: >-
    STOP — FigCraft plugin is not connected. Do NOT fall back to other MCP servers
    (figma-desktop, figma-remote) — they lack the tools this workflow requires.
    Tell user: open Figma → Plugins → FigCraft → wait for connection, then retry.

# Split from connection-lost (2026-04-11): handler-request timeouts are NOT
# connection failures — they mean the handler did too much work inside 30s
# (e.g. unbounded tree walk, full enumeration). Suggesting "restart the plugin"
# for these was actively misleading. See bridge.ts:388 for the message format.
- name: request-timeout
  tools: ["*"]
  patterns:
    - "^request .* timed out after"
    - "request timed out after .* \\(progress was received\\)"
  errorType: request_timeout
  suggestion: >-
    The request exceeded the 30s bridge timeout. This usually means the handler
    did too much work — not a connection problem. Narrow the scope: pass a
    specific nodeId instead of walking the whole page, tighten types/query
    filters, lower maxDepth, or use a more targeted endpoint
    (variables_ep for variables, styles_ep for styles, search_design_system
    for library components). Restarting the plugin will NOT help.

- name: token-not-found
  tools: [create_frame, create_text, create_svg, create_rectangle, create_ellipse, create_component, create_component_set, nodes, variables_ep]
  patterns:
    - "variable.*not found"
    - "token.*not found"
    - "no matching.*variable"
    - "cannot find.*variable"
  errorType: token_not_found
  suggestion: >-
    The requested variable/token was not found.
    Call search_design_system(query:"<token name>") to find available tokens,
    or omit the variable name to use a hardcoded value as fallback.
  retryHint:
    fillVariableName: null
    strokeVariableName: null

- name: node-deleted
  tools: ["*"]
  patterns:
    - "node.*does not exist"
    - "node.*not found"
    - "cannot find node"
    - "invalid.*node.*id"
  errorType: node_deleted
  suggestion: >-
    The referenced node no longer exists (may have been deleted or moved).
    Call nodes(method:"list") or get_current_page() to get current node IDs.

- name: file-not-found
  tools: [sync_tokens]
  patterns:
    - "ENOENT"
    - "no such file"
    - "file not found"
    - "cannot read file"
  errorType: file_not_found
  suggestion: >-
    Token file not found. Check the file path — use an absolute path.
    Ensure the DTCG JSON file exists at the specified location.

- name: parse-error
  tools: [sync_tokens]
  patterns:
    - "json.*parse"
    - "syntax.*error.*json"
    - "unexpected.*token"
    - "invalid.*json"
  errorType: parse_error
  suggestion: >-
    Token file contains invalid JSON.
    The file must be a valid DTCG JSON format with $type and $value fields.

- name: create-frame-failure
  tools: [create_frame]
  patterns:
    - "error"
  errorType: create_frame_failure
  suggestion: >-
    create_frame failed. Before retrying, review ALL remaining planned payloads
    for the same pattern — the same mistake likely affects other calls.
    Use dryRun:true to preview Opinion Engine inferences before committing.

- name: response-too-large
  tools: ["*"]
  patterns:
    - "too large"
    - "response.*exceed"
    - "context overflow"
  errorType: response_too_large
  suggestion: >-
    Response exceeded the size limit. Narrow the scope:
    use a specific nodeId instead of fetching the full page,
    reduce maxDepth, or use detail:"summary".
